<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Exercise Swap Tool | The Dream Body Blueprint</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0d0d0d; --surface: #161616; --surface2: #1e1e1e;
    --border: rgba(255,255,255,0.08); --border-hover: rgba(255,255,255,0.16);
    --accent: #ff3b3b; --accent-dim: rgba(255,59,59,0.1); --accent-border: rgba(255,59,59,0.28);
    --text: #f0f0f0; --text-secondary: #888; --text-muted: #555;
    --danger-bg: rgba(255,80,80,0.1); --danger: #ff6b6b;
    --warning-bg: rgba(255,180,50,0.1); --warning: #ffb432;
    --success-bg: rgba(80,210,120,0.1); --success: #50d278;
    --radius: 10px; --radius-lg: 14px;
  }
  html { scroll-behavior: smooth; }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; line-height: 1.6; }
  nav { display: flex; align-items: center; justify-content: space-between; padding: 1.1rem 2rem; border-bottom: 1px solid var(--border); position: sticky; top: 0; background: rgba(13,13,13,0.92); backdrop-filter: blur(12px); z-index: 100; }
  .nav-brand { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 15px; color: var(--text); text-decoration: none; letter-spacing: -0.01em; }
  .nav-brand span { color: var(--accent); }
  .nav-pill { font-size: 11px; font-weight: 500; letter-spacing: 0.06em; text-transform: uppercase; padding: 5px 12px; border: 1px solid var(--border); border-radius: 999px; color: var(--text-secondary); }
  .hero { max-width: 620px; margin: 0 auto; padding: 3.5rem 1.5rem 2rem; text-align: center; }
  .hero-tag { display: inline-block; font-size: 11px; font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase; color: var(--accent); background: var(--accent-dim); padding: 5px 14px; border-radius: 999px; margin-bottom: 1.25rem; border: 1px solid var(--accent-border); }
  .hero h1 { font-family: 'Syne', sans-serif; font-size: clamp(26px, 5vw, 38px); font-weight: 700; line-height: 1.15; letter-spacing: -0.02em; color: var(--text); margin-bottom: 0.75rem; }
  .hero h1 em { color: var(--accent); font-style: normal; }
  .hero p { font-size: 15px; color: var(--text-secondary); max-width: 420px; margin: 0 auto; line-height: 1.65; }
  .main { max-width: 620px; margin: 0 auto; padding: 0 1.5rem 5rem; }
  .search-wrap { margin-bottom: 1rem; position: relative; }
  .search-wrap input { width: 100%; padding: 15px 120px 15px 18px; font-size: 16px; font-family: 'DM Sans', sans-serif; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); color: var(--text); outline: none; transition: border-color 0.15s; }
  .search-wrap input:focus { border-color: var(--border-hover); }
  .search-wrap input::placeholder { color: var(--text-muted); }
  .search-wrap button { position: absolute; right: 8px; top: 50%; transform: translateY(-50%); padding: 8px 18px; font-size: 13px; font-weight: 600; font-family: 'Syne', sans-serif; background: var(--accent); color: #fff; border: none; border-radius: var(--radius); cursor: pointer; transition: opacity 0.15s; white-space: nowrap; }
  .search-wrap button:hover { opacity: 0.88; }
  .no-result { font-size: 14px; color: var(--text-secondary); background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 1.25rem 1.5rem; display: none; line-height: 1.6; }
  .no-result strong { color: var(--text); font-weight: 500; }
  .results-wrap { display: none; }
  .results-label { font-size: 11px; font-weight: 500; letter-spacing: 0.07em; text-transform: uppercase; color: var(--text-muted); margin-bottom: 12px; }
  .swap-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 1.2rem 1.4rem; margin-bottom: 10px; cursor: pointer; transition: border-color 0.15s; position: relative; overflow: hidden; }
  .swap-card::before { content: ''; position: absolute; top: 0; left: 0; width: 3px; height: 100%; background: var(--accent); opacity: 0; transition: opacity 0.2s; }
  .swap-card:hover { border-color: var(--border-hover); }
  .swap-card:hover::before, .swap-card.open::before { opacity: 1; }
  .card-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; }
  .card-name { font-family: 'Syne', sans-serif; font-size: 15px; font-weight: 600; color: var(--text); margin-bottom: 4px; letter-spacing: -0.01em; }
  .card-why { font-size: 13px; color: var(--text-secondary); line-height: 1.55; }
  .diff-badge { font-size: 10px; font-weight: 600; letter-spacing: 0.05em; text-transform: uppercase; padding: 4px 10px; border-radius: 999px; white-space: nowrap; flex-shrink: 0; margin-top: 1px; }
  .diff-easier { background: var(--success-bg); color: var(--success); border: 1px solid rgba(80,210,120,0.2); }
  .diff-similar { background: var(--warning-bg); color: var(--warning); border: 1px solid rgba(255,180,50,0.2); }
  .diff-harder { background: var(--danger-bg); color: var(--danger); border: 1px solid rgba(255,107,107,0.2); }
  .card-detail { margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--border); }
  .card-detail-body { font-size: 13px; color: var(--text-secondary); line-height: 1.65; margin-bottom: 10px; }
  .watch-btn { display: inline-flex; align-items: center; gap: 7px; font-size: 12px; font-weight: 500; font-family: 'DM Sans', sans-serif; color: var(--accent); background: var(--accent-dim); border: 1px solid var(--accent-border); border-radius: var(--radius); padding: 7px 13px; text-decoration: none; transition: opacity 0.15s; }
  .watch-btn:hover { opacity: 0.8; }
  .swap-card { cursor: default; }
  .more-swaps-wrap { text-align: center; margin-top: 18px; }
  .more-swaps-btn { display: inline-flex; align-items: center; gap: 8px; font-family: 'Syne', sans-serif; font-size: 13px; font-weight: 600; color: var(--text-secondary); background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 11px 22px; cursor: pointer; transition: border-color 0.15s, color 0.15s; }
  .more-swaps-btn:hover { border-color: var(--border-hover); color: var(--text); }
  .more-swaps-btn svg { transition: transform 0.3s; }
  .more-swaps-btn:hover svg { transform: rotate(180deg); }
  footer { border-top: 1px solid var(--border); text-align: center; padding: 1.5rem; font-size: 12px; color: var(--text-muted); margin-top: 2rem; }
  footer a { color: var(--text-muted); text-decoration: none; }
  footer a:hover { color: var(--text-secondary); }
  @media (max-width: 520px) {
    nav { padding: 1rem 1.25rem; }
    .hero { padding: 2.5rem 1.25rem 1.75rem; }
    .main { padding: 0 1.25rem 4rem; }
    .search-wrap input { padding-right: 110px; font-size: 15px; }
  }
</style>
</head>

// ─── SEARCH ENGINE ───────────────────────────────────────────────────────────
function normalise(s) {
  return s.toLowerCase()
    .replace(/dumbbell/g,'db').replace(/dumbbells/g,'db')
    .replace(/barbell/g,'bb').replace(/barbells/g,'bb')
    .replace(/[^a-z0-9 ]/g,' ').replace(/\s+/g,' ').trim();
}

function findSwaps(query) {
  const q = normalise(query);
  // 1. Exact match
  for (const entry of DB) {
    for (const name of entry.names) {
      if (normalise(name) === q) return entry;
    }
  }
  // 2. Contains match
  for (const entry of DB) {
    for (const name of entry.names) {
      const n = normalise(name);
      if (n.includes(q) || q.includes(n)) return entry;
    }
  }
  // 3. Word overlap (≥60%)
  const qWords = new Set(q.split(' ').filter(w => w.length > 2));
  let bestEntry = null, bestScore = 0;
  for (const entry of DB) {
    for (const name of entry.names) {
      const nWords = normalise(name).split(' ').filter(w => w.length > 2);
      let hits = 0;
      nWords.forEach(w => { if (qWords.has(w)) hits++; });
      const score = hits / Math.max(qWords.size, nWords.length, 1);
      if (score > bestScore) { bestScore = score; bestEntry = entry; }
    }
  }
  return bestScore >= 0.5 ? bestEntry : null;
}

// ─── STATE ────────────────────────────────────────────────────────────────────
let currentResult = null;
let currentPage = 0;
let currentQuery = '';

// ─── UI ───────────────────────────────────────────────────────────────────────
document.getElementById('exerciseInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') doSwap();
});

function doSwap() {
  const query = document.getElementById('exerciseInput').value.trim();
  const noResult = document.getElementById('noResult');
  const resultsWrap = document.getElementById('resultsWrap');

  noResult.style.display = 'none';
  resultsWrap.style.display = 'none';
  currentQuery = query;

  if (!query) {
    noResult.innerHTML = 'Enter an exercise name above.';
    noResult.style.display = 'block';
    return;
  }

  const result = findSwaps(query);

  if (!result) {
    noResult.innerHTML = `No swaps found for <strong>"${query}"</strong>. Try a slightly different name — e.g. "barbell squat" instead of "squats".`;
    noResult.style.display = 'block';
    return;
  }

  currentResult = result;
  currentPage = 0;
  renderSwaps(result, 0);
}

function renderSwaps(result, page) {
  const container = document.getElementById('cardsContainer');
  const label = document.getElementById('resultsLabel');
  const resultsWrap = document.getElementById('resultsWrap');

  const perPage = 5;

  // Build the full swap pool: primary entry + swaps from related entries (same muscle group)
  // Related = any DB entry whose swaps overlap with this entry's swap names
  function buildPool(entry) {
    const primaryNames = new Set(entry.swaps.map(s => s.name));
    let extra = [];
    for (const other of DB) {
      if (other === entry) continue;
      // Check if any of this entry's swaps appear as a swap in the other entry (same area)
      const overlap = other.swaps.some(s => primaryNames.has(s.name));
      if (overlap) {
        for (const s of other.swaps) {
          if (!primaryNames.has(s.name) && !extra.find(e => e.name === s.name)) {
            extra.push(s);
          }
        }
      }
    }
    return [...entry.swaps, ...extra];
  }

  const allSwaps = buildPool(result);
  const start = page * perPage;
  const swaps = allSwaps.slice(start, start + perPage);

  const diffMap = {
    easier: { label: 'Easier', cls: 'diff-easier' },
    similar: { label: 'Similar level', cls: 'diff-similar' },
    harder: { label: 'Harder', cls: 'diff-harder' },
    different: { label: 'Different', cls: 'diff-similar' }
  };

  const pageLabel = page === 0 ? '5 swaps for:' : `${swaps.length} more swaps for:`;
  label.textContent = `${pageLabel} ${currentQuery}`;
  container.innerHTML = '';

  swaps.forEach((swap, i) => {
    const d = diffMap[swap.diff] || { label: 'Similar', cls: 'diff-similar' };
    const card = document.createElement('div');
    card.className = 'swap-card';
    card.innerHTML = `
      <div class="card-top">
        <div style="flex:1;min-width:0;">
          <div class="card-name">${swap.name}</div>
        </div>
        <span class="diff-badge ${d.cls}">${d.label}</span>
      </div>
      <div class="card-detail">
        <p class="card-detail-body">${swap.tip}</p>
        <a class="watch-btn" href="${swap.url}" target="_blank" rel="noopener">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><circle cx="7" cy="7" r="6.5" stroke="currentColor" stroke-width="1"/><path d="M5.5 4.5l4 2.5-4 2.5V4.5z" fill="currentColor"/></svg>
          Watch tutorial
        </a>
      </div>
    `;
    container.appendChild(card);
  });

  // More Swaps button — only show if there's a next page
  if (allSwaps.length > start + perPage) {
    const moreWrap = document.createElement('div');
    moreWrap.className = 'more-swaps-wrap';
    moreWrap.innerHTML = `
      <button class="more-swaps-btn" onclick="loadMoreSwaps()">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M7 1v12M1 7l6 6 6-6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
        More Swaps
      </button>
    `;
    container.appendChild(moreWrap);
  }

  resultsWrap.style.display = 'block';
  if (page === 0) resultsWrap.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function loadMoreSwaps() {
  currentPage++;
  renderSwaps(currentResult, currentPage);
}
