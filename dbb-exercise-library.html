<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>DBB Exercise Library</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&family=Barlow:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --red:#E8192C;--red-glow:rgba(232,25,44,0.15);
  --bg:#0D0D0D;--bg-2:#141414;--bg-3:#1C1C1C;--bg-4:#242424;
  --border:rgba(255,255,255,0.07);--border-hover:rgba(232,25,44,0.4);
  --text:#F0F0F0;--text-muted:#8A8E94;--text-dim:#444;
  --silver:#B0B8C1;
}
html{scroll-behavior:smooth;-webkit-tap-highlight-color:transparent;}
body{background:var(--bg);color:var(--text);font-family:'Barlow',sans-serif;font-size:15px;line-height:1.6;min-height:100vh;overflow-x:hidden;}

/* HEADER */
header{background:var(--bg-2);border-bottom:1px solid var(--border);padding:0 16px;position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:space-between;height:54px;}
.logo{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:20px;letter-spacing:0.04em;text-transform:uppercase;}
.logo span{color:var(--red);}
.header-count{font-family:'Barlow Condensed',sans-serif;font-size:12px;letter-spacing:0.1em;text-transform:uppercase;color:var(--text-muted);}
.header-count strong{color:var(--red);}

/* HERO */
.hero{background:var(--bg-2);border-bottom:1px solid var(--border);padding:32px 16px 28px;text-align:center;position:relative;overflow:hidden;}
.hero::before{content:'';position:absolute;top:-40px;left:50%;transform:translateX(-50%);width:400px;height:160px;background:var(--red-glow);filter:blur(60px);pointer-events:none;}
.hero h1{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:clamp(32px,8vw,56px);letter-spacing:0.02em;text-transform:uppercase;line-height:1;position:relative;}
.hero h1 span{color:var(--red);}
.hero p{color:var(--silver);font-size:14px;margin-top:8px;position:relative;}

/* SEARCH */
.search-wrap{padding:16px 16px 0;position:relative;}
.search-wrap svg{position:absolute;left:28px;top:50%;transform:translateY(-50%);color:var(--text-muted);pointer-events:none;}
input[type="text"]{width:100%;background:var(--bg-3);border:1.5px solid var(--border);border-radius:12px;padding:14px 16px 14px 46px;font-family:'Barlow',sans-serif;font-size:16px;color:var(--text);outline:none;transition:border-color 0.2s;-webkit-appearance:none;}
input[type="text"]::placeholder{color:var(--text-dim);}
input[type="text"]:focus{border-color:var(--red);}

/* FILTER STRIP */
.filter-strip-wrap{padding:12px 0 0;overflow:hidden;}
.filter-strip{display:flex;gap:8px;overflow-x:auto;padding:4px 16px 12px;scrollbar-width:none;-ms-overflow-style:none;}
.filter-strip::-webkit-scrollbar{display:none;}
.filter-btn{font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;padding:10px 18px;border-radius:8px;border:1.5px solid var(--border);background:var(--bg-3);color:var(--text-muted);cursor:pointer;transition:all 0.18s;white-space:nowrap;flex-shrink:0;-webkit-appearance:none;}
.filter-btn:active{transform:scale(0.96);}
.filter-btn.active{background:var(--red);border-color:var(--red);color:#fff;}

/* RECENTLY VIEWED */
.recently-viewed{padding:0 16px 4px;}
.recently-viewed.hidden{display:none;}
.rv-label{font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--text-muted);margin-bottom:8px;display:flex;align-items:center;gap:8px;}
.rv-label button{font-family:'Barlow Condensed',sans-serif;font-size:11px;letter-spacing:0.06em;text-transform:uppercase;color:var(--text-dim);background:none;border:none;cursor:pointer;padding:0;margin-left:auto;}
.rv-strip{display:flex;gap:10px;overflow-x:auto;scrollbar-width:none;-ms-overflow-style:none;padding-bottom:4px;}
.rv-strip::-webkit-scrollbar{display:none;}
.rv-chip{display:flex;align-items:center;gap:8px;background:var(--bg-3);border:1px solid var(--border);border-radius:8px;padding:8px 12px;cursor:pointer;flex-shrink:0;transition:border-color 0.18s;min-width:0;max-width:200px;}
.rv-chip:active{transform:scale(0.97);}
.rv-chip:hover{border-color:var(--border-hover);}
.rv-thumb{width:40px;height:28px;border-radius:4px;object-fit:cover;flex-shrink:0;}
.rv-name{font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}

/* RESULTS BAR */
.results-bar{padding:16px 16px 4px;display:flex;align-items:center;justify-content:space-between;}
.results-bar span{font-family:'Barlow Condensed',sans-serif;font-size:13px;letter-spacing:0.06em;text-transform:uppercase;color:var(--text-muted);}
.results-bar strong{color:var(--red);}

/* SECTION HEADERS — sticky */
.section-header{position:sticky;top:54px;z-index:50;background:var(--bg);padding:12px 16px 10px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--border);}
.section-header h2{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:18px;letter-spacing:0.06em;text-transform:uppercase;}
.count-badge{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:var(--red);background:var(--red-glow);border:1px solid rgba(232,25,44,0.25);padding:2px 8px;border-radius:4px;}
.section-line{flex:1;height:1px;background:var(--border);}

/* CARD LIST */
.card-list{padding:0 16px 8px;}

/* CARD — full width, horizontal layout */
.card{display:flex;align-items:stretch;background:var(--bg-3);border:1px solid var(--border);border-radius:12px;overflow:hidden;cursor:pointer;transition:border-color 0.18s;margin-bottom:10px;min-height:76px;}
.card:active{transform:scale(0.99);}
.card:hover{border-color:var(--border-hover);}

.card-thumb{position:relative;width:120px;min-width:120px;background:var(--bg-4);flex-shrink:0;}
@media(min-width:480px){.card-thumb{width:150px;min-width:150px;}}
.card-thumb img{width:100%;height:100%;object-fit:cover;display:block;}
.play-btn{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,0.3);}
.play-circle{width:38px;height:38px;background:var(--red);border-radius:50%;display:flex;align-items:center;justify-content:center;}
.play-circle svg{margin-left:3px;}

.card-body{padding:12px 14px;flex:1;display:flex;flex-direction:column;justify-content:center;gap:4px;min-width:0;}
.card-muscle{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--red);}
.card-name{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:16px;line-height:1.2;color:var(--text);}
.card-yt{display:inline-flex;align-items:center;gap:4px;margin-top:6px;font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:600;letter-spacing:0.06em;text-transform:uppercase;color:var(--text-muted);text-decoration:none;background:var(--bg-4);border:1px solid var(--border);padding:4px 8px;border-radius:5px;width:fit-content;transition:color 0.15s,border-color 0.15s;}
.card-yt:hover{color:var(--red);border-color:var(--border-hover);}
.card-yt svg{flex-shrink:0;}

/* MODAL */
.modal-backdrop{position:fixed;inset:0;background:rgba(0,0,0,0.92);z-index:200;display:none;align-items:flex-end;justify-content:center;}
@media(min-width:600px){.modal-backdrop{align-items:center;padding:20px;}}
.modal-backdrop.open{display:flex;}
.modal{background:var(--bg-2);border:1px solid var(--border);border-radius:16px 16px 0 0;width:100%;overflow:hidden;}
@media(min-width:600px){.modal{border-radius:14px;max-width:820px;}}
.modal-drag{width:36px;height:4px;background:var(--border);border-radius:2px;margin:10px auto 6px;}
@media(min-width:600px){.modal-drag{display:none;}}
.modal-video{aspect-ratio:16/9;width:100%;background:#000;}
.modal-video iframe{width:100%;height:100%;border:none;display:block;}
.modal-info{padding:16px 18px 24px;display:flex;align-items:flex-start;justify-content:space-between;gap:12px;}
.modal-muscle{font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--red);margin-bottom:3px;}
.modal-name{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:22px;letter-spacing:0.02em;text-transform:uppercase;line-height:1.15;}
.modal-actions{display:flex;align-items:center;gap:8px;margin-top:10px;}
.modal-yt-btn{display:inline-flex;align-items:center;gap:6px;font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;color:var(--text-muted);text-decoration:none;background:var(--bg-4);border:1px solid var(--border);padding:8px 14px;border-radius:8px;transition:color 0.15s,border-color 0.15s;}
.modal-yt-btn:hover{color:var(--red);border-color:var(--border-hover);}
.modal-close{background:var(--bg-4);border:1px solid var(--border);border-radius:8px;width:40px;height:40px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text-muted);flex-shrink:0;transition:background 0.2s,color 0.2s;-webkit-appearance:none;}
.modal-close:hover{background:var(--red);color:#fff;border-color:var(--red);}

/* NO RESULTS */
.no-results{text-align:center;padding:60px 24px;display:none;}
.no-results.show{display:block;}
.no-results h3{font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:700;color:var(--text-muted);margin-bottom:8px;}
.no-results p{color:var(--text-dim);font-size:14px;}

/* FOOTER */
footer{border-top:1px solid var(--border);padding:20px 16px;text-align:center;font-size:13px;color:var(--text-dim);font-family:'Barlow Condensed',sans-serif;letter-spacing:0.06em;text-transform:uppercase;margin-top:16px;}
footer strong{color:var(--red);}

/* SAFE AREA */
@supports(padding:max(0px)){
  .modal-info{padding-bottom:max(24px,env(safe-area-inset-bottom));}
  footer{padding-bottom:max(20px,env(safe-area-inset-bottom));}
}
</style>
</head>

var MUSCLE_ORDER=["Chest","Back","Shoulders","Biceps","Triceps","Forearms","Legs","Glutes","Calves","Core"];
var activeFilter='all';
var searchQuery='';
var recentKey='dbb_recent_v1';
var MAX_RECENT=8;

// Recently Viewed
function getRecent(){try{return JSON.parse(localStorage.getItem(recentKey)||'[]');}catch(e){return[];}}
function addRecent(ex){
  var list=getRecent();
  list=list.filter(function(x){return x.videoId!==ex.videoId;});
  list.unshift({name:ex.name,muscle:ex.muscle,videoId:ex.videoId});
  if(list.length>MAX_RECENT)list=list.slice(0,MAX_RECENT);
  try{localStorage.setItem(recentKey,JSON.stringify(list));}catch(e){}
  renderRecent();
}
function clearRecent(){try{localStorage.removeItem(recentKey);}catch(e){}renderRecent();}
function renderRecent(){
  var list=getRecent();
  var sec=document.getElementById('rv-section');
  var strip=document.getElementById('rv-strip');
  if(!list.length){sec.classList.add('hidden');return;}
  sec.classList.remove('hidden');
  strip.innerHTML='';
  list.forEach(function(ex){
    var chip=document.createElement('div');
    chip.className='rv-chip';
    chip.innerHTML='<img class="rv-thumb" src="https://img.youtube.com/vi/'+ex.videoId+'/mqdefault.jpg" alt="'+ex.name+'" loading="lazy"><span class="rv-name">'+ex.name+'</span>';
    chip.addEventListener('click',function(){
      var full=EXERCISES.find(function(e){return e.videoId===ex.videoId;});
      if(full)openModal(full);
    });
    strip.appendChild(chip);
  });
}

function getThumb(id){return 'https://img.youtube.com/vi/'+id+'/mqdefault.jpg';}
function getEmbed(id){return 'https://www.youtube.com/embed/'+id+'?autoplay=1&rel=0';}
function getYTLink(id){return 'https://www.youtube.com/watch?v='+id;}

function openModal(ex){
  addRecent(ex);
  document.getElementById('modal-iframe').src=getEmbed(ex.videoId);
  document.getElementById('modal-muscle').textContent=ex.muscle;
  document.getElementById('modal-name').textContent=ex.name;
  document.getElementById('modal-yt-link').href=getYTLink(ex.videoId);
  document.getElementById('modal').classList.add('open');
  document.body.style.overflow='hidden';
}
function closeModal(e){if(e.target===document.getElementById('modal'))closeModalBtn();}
function closeModalBtn(){
  document.getElementById('modal').classList.remove('open');
  document.getElementById('modal-iframe').src='';
  document.body.style.overflow='';
}
document.addEventListener('keydown',function(e){if(e.key==='Escape')closeModalBtn();});

// Swipe down to close modal on mobile
var touchStartY=0;
document.getElementById('modal-box').addEventListener('touchstart',function(e){touchStartY=e.touches[0].clientY;},{passive:true});
document.getElementById('modal-box').addEventListener('touchend',function(e){
  if(e.changedTouches[0].clientY-touchStartY>80)closeModalBtn();
},{passive:true});

function buildCard(ex){
  var d=document.createElement('div');
  d.className='card';
  d.setAttribute('role','button');
  d.setAttribute('tabindex','0');
  d.addEventListener('click',function(e){
    if(e.target.closest('.card-yt'))return;
    openModal(ex);
  });
  d.addEventListener('keydown',function(e){if(e.key==='Enter')openModal(ex);});
  d.innerHTML=
    '<div class="card-thumb">'+
      '<img src="'+getThumb(ex.videoId)+'" alt="'+ex.name+'" loading="lazy">'+
      '<div class="play-btn"><div class="play-circle"><svg width="14" height="14" viewBox="0 0 24 24" fill="white"><polygon points="5 3 19 12 5 21 5 3"/></svg></div></div>'+
    '</div>'+
    '<div class="card-body">'+
      '<div class="card-muscle">'+ex.muscle+'</div>'+
      '<div class="card-name">'+ex.name+'</div>'+
      '<a class="card-yt" href="'+getYTLink(ex.videoId)+'" target="_blank" rel="noopener">'+
        '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>'+
        'YouTube'+
      '</a>'+
    '</div>';
  return d;
}

function render(){
  var wrap=document.getElementById('library-wrap');
  wrap.innerHTML='';
  var q=searchQuery.toLowerCase().trim();
  var filtered=EXERCISES.filter(function(ex){
    var mok=activeFilter==='all'||ex.muscle===activeFilter;
    var sok=!q||ex.name.toLowerCase().indexOf(q)!==-1||ex.muscle.toLowerCase().indexOf(q)!==-1;
    return mok&&sok;
  });
  var n=filtered.length;
  document.getElementById('count').textContent=n;
  document.getElementById('header-count').textContent=n;
  if(!n){document.getElementById('no-results').classList.add('show');return;}
  document.getElementById('no-results').classList.remove('show');
  var seen={};
  filtered.forEach(function(ex){seen[ex.muscle]=true;});
  var muscles=MUSCLE_ORDER.filter(function(m){return seen[m];});
  muscles.forEach(function(muscle){
    var group=filtered.filter(function(ex){return ex.muscle===muscle;});
    var h=document.createElement('div');h.className='section-header';
    h.innerHTML='<h2>'+muscle+'</h2><span class="count-badge">'+group.length+'</span><div class="section-line"></div>';
    wrap.appendChild(h);
    var list=document.createElement('div');list.className='card-list';
    group.forEach(function(ex){list.appendChild(buildCard(ex));});
    wrap.appendChild(list);
  });
}

document.getElementById('filters').addEventListener('click',function(e){
  var btn=e.target.closest('.filter-btn');
  if(!btn)return;
  document.querySelectorAll('.filter-btn').forEach(function(b){b.classList.remove('active');});
  btn.classList.add('active');
  activeFilter=btn.getAttribute('data-filter');
  render();
});

var st;
document.getElementById('search').addEventListener('input',function(e){
  clearTimeout(st);
  var v=e.target.value;
  st=setTimeout(function(){searchQuery=v;render();},150);
});

renderRecent();
render();
</script>
