 warmed and golden. Serve immediately."},{"id":"dbb0451","name":"Ratatouille","calories":287,"protein":9,"carbs":29,"fats":15,"category":"dinner","time":"45 mins","serves":4,"book":"Book 28","ingredients":["2 red peppers","2 tablespoon olive oil","2 garlic cloves sliced","4 courgettes cut into small chunks","400g baby plum tomatoes","25g fresh basil chopped","25g flat leaf parsley chopped"],"method":"Preheat oven 200C. Roast peppers on baking tray 30-35 minutes turning halfway, until well-blackened. Transfer to bowl, cover tightly. Once cool enough to handle, chop into medium pieces. Heat olive oil in large frying pan. Add garlic and courgettes, fry 8-10 minutes over medium heat until turning golden. Add baby plum tomatoes, cook over low heat 15 minutes. Stir in roasted peppers and herbs, season and serve."},{"id":"dbb0452","name":"Ham and Cheese Pizza","calories":272,"protein":19,"carbs":13,"fats":16,"category":"dinner","time":"20 mins","serves":4,"book":"Book 28","ingredients":["250g part-skim ricotta","2 cloves garlic crushed","1/4 teaspoon kosher salt","1/4 teaspoon freshly ground black pepper","1 large pizza crust","100g shredded fontina cheese","3 slices ham chopped","6g basil leaves","1 tablespoon fresh lemon juice"],"method":"Spray cookie sheet with non-stick spray. Mix ricotta, garlic, salt and pepper, spread all over pizza crust. Top with cheese and ham. Bake on prepared cookie sheet at 200C for 15 minutes. Toss basil with lemon juice, serve on top of pizza."},{"id":"dbb0453","name":"Grilled Steak with Tortilla Salad","calories":426,"protein":49,"carbs":17,"fats":18,"category":"dinner","time":"20 mins","serves":4,"book":"Book 28","ingredients":["700g skirt steak","1 teaspoon chilli powder","Kosher salt and black pepper","700g plum tomatoes cut into pieces","2 spring onions sliced","1 red chilli sliced","2 tablespoon fresh lime juice","1 lettuce chopped","25g fresh parsley chopped","Corn tortillas for serving"],"method":"Preheat oven grill on high. Season steak with chilli powder and 1/2 teaspoon each salt and pepper. Grill 3-4 minutes per side for medium-rare. Let rest before slicing. Toss plum tomatoes, spring onions, jalape\u00f1o, lime juice, salt and pepper. Toss with parsley and chopped lettuce, fold in steak. Serve with corn tortillas."},{"id":"dbb0454","name":"Chicken Corn Soup","calories":519,"protein":60,"carbs":27,"fats":19,"category":"dinner","time":"20 mins","serves":8,"book":"Book 28","ingredients":["900g chicken breasts","1500ml chicken stock","400g creamed corn","2 teaspoons salt","1/2 teaspoon black pepper","1/2 teaspoon sesame oil","1/4 cup cornflour","2 egg whites beaten"],"method":"Finely chop chicken breast. Mix 1 egg white with 125ml water and set aside. Heat stock, then add corn, salt, pepper. Add chicken mixture and bring to boil. Add cornflour mixed with 60ml water and stir. Slowly add beaten egg whites while stirring soup constantly. Serve with chopped chives."},{"id":"dbb0455","name":"Greek Pasta with Sausage","calories":522,"protein":20,"carbs":79,"fats":14,"category":"dinner","time":"20 mins","serves":4,"book":"Book 28","ingredients":["2 tablespoons olive oil","3 links cooked chicken sausage sliced into rounds","200g diced onion","1 clove garlic minced","225g no-salt-added tomato sauce","900g lightly packed baby spinach","600g cooked rotini pasta","60g chopped pitted kalamata olives","100g finely crumbled feta cheese","5g chopped fresh basil"],"method":"Heat oil in large straight-sided frying pan over medium-high heat. Add sausage, onion and garlic, cook stirring often until onion is starting to brown, 5 minutes. Add tomato sauce, spinach, pasta and olives. Cook stirring often until bubbling hot and spinach is wilted. Add 1 to 2 tablespoons of water if necessary to keep pasta from sticking. Stir in feta and basil."},{"id":"dbb0456","name":"Roast Aubergine with Green Tahini Dressing","calories":560,"protein":16,"carbs":52,"fats":32,"category":"dinner","time":"30 mins","serves":4,"book":"Book 28","ingredients":["2 aubergine cut into wedges","2 teaspoons sweet paprika","1 teaspoon ground coriander","1/2 teaspoon ground cumin","4 tablespoons olive oil","1 tin 400g chickpeas rinsed drained","250g cherry tomatoes halved","35g chopped nuts","Mint leaves flat-leaf parsley leaves and lemon wedges to serve","For green tahini dressing: 1/2 cup chopped flat-leaf parsley, 1/2 cup chopped coriander, 140g tahini, 1 tbsp olive oil, 125ml lemon juice, 1 garlic clove"],"method":"Preheat oven 200C. Whiz all dressing ingredients in food processor until smooth. Place aubergine in bowl, add spices and oil and toss to combine. Season. Place in single layer on lined baking tray with chickpeas and roast 30 minutes or until tender and golden. Add tomatoes for final 5 minutes. Arrange aubergine, chickpeas and tomatoes on platter. Top with chopped nuts, mint and parsley leaves. Drizzle with green tahini dressing."},{"id":"dbb0457","name":"Crusted Salmon with Maple Glaze","calories":412,"protein":23,"carbs":8,"fats":32,"category":"dinner","time":"20 mins","serves":4,"book":"Book 28","ingredients":["2 tablespoons melted butter","4 x 300g salmon fillets","Salt and pepper","For the maple walnut crust: 150g finely chopped walnuts, 1 tsp smoked paprika, 1/2 tsp chilli powder, 1/2 tsp onion powder, 1/2 tsp cracked black pepper, 3 tsp pure maple syrup, 1 tbsp apple cider vinegar, 1 tsp coconut aminos"],"method":"Add all crust ingredients to small mixing bowl and stir until well combined. Spoon the mixture over each salmon fillet, distributing evenly. Place in refrigerator uncovered for 2-3 hours. Preheat oven 200C. Add melted butter to large oven-safe frying pan set over high heat. When hot, add fish and let cook undisturbed 2 minutes to sear skin. Transfer pan to oven and cook 5-8 minutes."},{"id":"dbb0458","name":"Cauliflower Lentils and Tofu Salad","calories":185,"protein":15,"carbs":20,"fats":5,"category":"dinner","time":"40 mins","serves":4,"book":"Book 28","ingredients":["75g cooked green lentils","2 tablespoons lemon juice","2 garlic cloves minced","1/2 tablespoon grated fresh ginger","1 teaspoon ground cumin","1 teaspoon ground cardamom","1/2 teaspoon sea salt","200g tofu cheese cubed","Florets from 1 small cauliflower","Extra virgin olive oil for drizzling","1/4 teaspoon ground turmeric","120g spinach finely chopped"],"method":"Preheat oven 200C. Combine lemon juice, garlic, ginger, cumin, cardamom, salt and pepper. Add lentils and stir. Place tofu on one baking sheet and cauliflower on another. Toss both with drizzles of olive oil, salt and pepper. Roast tofu 15 minutes and cauliflower 20-25 minutes. Toss cauliflower with turmeric. Add chopped spinach to lentils and toss. Top with cauliflower and tofu. Drizzle with more dressing and serve."},{"id":"dbb0459","name":"Portobello Mushroom Burgers","calories":548,"protein":12,"carbs":17,"fats":48,"category":"dinner","time":"10 mins","serves":2,"book":"Book 28","ingredients":["2 large portobello mushroom caps","3 tablespoons balsamic vinegar","1 tablespoon soy sauce","1 teaspoon roasted garlic flakes","2 teaspoons dried basil","1 teaspoon dried oregano","1/2 teaspoon ground black pepper","1 large tomato sliced","1 avocado sliced","1 tablespoon yellow mustard","50g blue cheese","3 tablespoon olive oil"],"method":"Slice mushroom stems off, slice about 1cm of mushroom top off. Combine balsamic, soy sauce, garlic, basil, oregano and pepper in small bowl. Place mushroom caps on cookie sheet with foil and olive oil to prevent sticking. Pour the marinade over each mushroom cap and let sit 10 minutes. Preheat oven 200C. Bake mushrooms about 10 minutes. Flip and bake another 10 minutes if needed. Place bottom of mushroom cap on plate, add blue cheese, tomatoes, avocado and top with top portion of baked mushroom cap."},{"id":"dbb0460","name":"Quinoa Salad","calories":644,"protein":27,"carbs":89,"fats":20,"category":"dinner","time":"20 mins","serves":4,"book":"Book 28","ingredients":["1 tablespoon extra-virgin olive oil","4 tablespoons lime juice","1 teaspoon ground cumin","250g quinoa cooked","30g rocket","200g black beans","4g coriander leaves","120g feta cheese crumbled","1/2 avocado","160g sweet corn","1 medium courgette cut lengthwise"],"method":"Preheat grill. Grill corn turning occasionally until charred and tender 10 minutes. Grill courgette turning once 2 minutes per side. Coarsely chop courgette and cut kernels from cobs. Whisk oil, lime juice and cumin in large bowl. Add courgette, corn, quinoa, rocket, beans, coriander, crumbled cheese and chopped avocado. Gently toss to combine."},{"id":"dbb0461","name":"Burger Macaroni","calories":407,"protein":40,"carbs":37,"fats":11,"category":"dinner","time":"25 mins","serves":4,"book":"Book 28","ingredients":["300g uncooked macaroni","1 tablespoon extra virgin olive oil","450g beef mince","1 yellow onion chopped","1/2 teaspoon seasoned salt","Pinch chili pepper flakes","1/2 teaspoon celery seed","1 tin 800g diced tomatoes","2 tablespoon Worcestershire sauce","15g chopped fresh parsley"],"method":"Cook macaroni per packet instructions. Brown beef in olive oil on high heat. When mostly browned, add onions and toss to combine. Cook until onions are soft 4-6 minutes. Add celery seed, dash of crushed red pepper and seasoned salt. Pour in canned tomatoes, add Worcestershire sauce and stir to combine. Simmer 5 minutes. Reserve half cup pasta cooking water. Mix in drained and cooked macaroni and parsley. Cook another 5 minutes adding pasta water if too dry. Season to taste."},{"id":"dbb0462","name":"Protein French Toast","calories":475,"protein":42,"carbs":34,"fats":19,"category":"dessert","time":"15 mins","serves":2,"book":"Book 28","ingredients":["2 medium eggs","25g vanilla whey protein","2 medium slices of wholegrain bread","100ml almond milk","5g butter","1 tsp powdered sweetener"],"method":"Slice bread into 2 cm strips. Crack eggs into bowl, add almond milk and whey protein, whisking through thoroughly. Heat non-stick pan over medium heat with butter. Coat bread slices with the mixture and add carefully to pan along with any remaining mixture. Fry around 2 minutes on each side. Finish with 1 teaspoon powdered sweetener to serve."},{"id":"dbb0463","name":"Spiced Apple and Carrot Cake","calories":197,"protein":7,"carbs":22,"fats":9,"category":"dessert","time":"60 mins","serves":8,"book":"Book 28","ingredients":["225g carrots peeled and diced","3 large eggs","140g dates pitted","50g peanut butter","1.5 tsp baking powder","2 tsp cinnamon","1 orange juice and zest","1 apple diced","50g sunflower seeds","30g rolled oats","25g cranberries"],"method":"Preheat oven 180C. In food processor, add all ingredients except cranberries and apple. Combine well. Stir in cranberries and apples. Grease baking tin with light spray oil, fill with batter. Press firmly and smooth the surface with wet rubber spatula until even. Bake 45-50 minutes until golden brown and spongy. Allow to fully cool."},{"id":"dbb0464","name":"Baked Pears with Spiced Yoghurt","calories":300,"protein":15,"carbs":33,"fats":12,"category":"dessert","time":"40 mins","serves":4,"book":"Book 28","ingredients":["4 ripe pears cored and halved","28g pecans chopped","80g frozen cranberries","40g rolled oats","30g unsalted butter melted","40g honey","1/4 tsp ground cinnamon","500g 0% strained greek yoghurt","50g honey","1/2 tsp ground ginger","1/2 tsp ground nutmeg","1/2 tsp ground cinnamon"],"method":"Preheat oven 200C. Cut pears in half lengthwise, remove core, place cut side up in foil-lined baking dish. Mix pecans, cranberries, oats, butter, honey, cinnamon and pinch of salt in a bowl. Spoon mixture on top of the pears. Bake 30 minutes until tender. Meanwhile, combine yoghurt, honey, ginger, nutmeg and cinnamon, refrigerate. Remove pears from oven, cool few minutes. Place 2 halves onto a plate and serve with the yoghurt."},{"id":"dbb0465","name":"Protein Berry Crumble","calories":395,"protein":33,"carbs":23,"fats":19,"category":"dessert","time":"25 mins","serves":1,"book":"Book 28","ingredients":["125g frozen raspberries","1 teaspoon stevia","30g vanilla protein powder","20g oats","2 tablespoon lemon juice","10 almonds"],"method":"Preheat oven 180C. Place berries in small glass ovenproof dish and sprinkle with stevia. Mix together protein powder, oats and lemon juice. Chop almonds into small pieces and mix with crumble. Spread the crumble on top of the berries. Bake 20 minutes until slightly golden. Allow to cool slightly before serving."},{"id":"dbb0466","name":"Coconut Hot White Chocolate","calories":352,"protein":10,"carbs":24,"fats":24,"category":"dessert","time":"15 mins","serves":1,"book":"Book 28","ingredients":["200g almond milk","50g reduced fat coconut milk","1 tsp powdered sweetener","30g organic white chocolate","10g desiccated coconut"],"method":"In a saucepan over medium low heat, add almond milk, coconut milk and sweetener. Remove from heat once the mixture starts to simmer. Add white chocolate to cup and pour warm milk over whilst whisking with fork until all chocolate melts. Garnish with desiccated coconut."},{"id":"dbb0467","name":"Easy Berry Parfaits","calories":170,"protein":5,"carbs":24,"fats":6,"category":"breakfast","time":"15 mins","serves":4,"book":"Book 29","ingredients":["400g fresh strawberries cut into pieces","380g fresh blueberries","4 teaspoons reduced-fat raspberry walnut vinaigrette","210g Greek yoghurt or strawberry yoghurt","2 teaspoons fresh mint chopped","Desiccated coconut optional"],"method":"Place strawberries and blueberries in separate bowls. Drizzle each with 2 teaspoons vinaigrette, toss to coat. In a small bowl, mix yoghurt and mint. Spoon strawberries into 4 parfait glasses. Layer each with yoghurt mixture and blueberries. Top with coconut and fresh chopped mint if desired."},{"id":"dbb0468","name":"Bell Peppers Ham Cheese and Eggs Breakfast","calories":413,"protein":29,"carbs":9,"fats":29,"category":"breakfast","time":"20 mins","serves":3,"book":"Book 29","ingredients":["2 bell peppers sliced into rings","6 eggs beaten","1 teaspoon salt and freshly ground black pepper","110g chopped bacon","2 teaspoons chopped parsley","2 teaspoons chopped thyme","75g feta cheese crumbled"],"method":"In a medium bowl, whisk together eggs, feta cheese and chopped bacon. Add salt and black pepper and thyme. Heat a nonstick frying pan over medium heat, grease lightly with olive oil. Place a bell pepper ring in the frying pan then add mixture with bacon and cheese. Cook 2 minutes, then flip the ring and cook 2 minutes more. Repeat with other bell pepper rings and cheese mixture. Garnish with chopped parsley."},{"id":"dbb0469","name":"Strawberry Pudding","calories":292,"protein":17,"carbs":29,"fats":12,"category":"breakfast","time":"5 mins","serves":2,"book":"Book 29","ingredients":["14 large strawberries chopped and frozen","1 tablespoon peanut butter","170g low-fat cottage cheese","1 tablespoons honey","1/2 teaspoon vanilla extract","2 tablespoon chia seeds","1 tablespoon almond chopped"],"method":"In a blender or food processor add all ingredients except chia seeds and almonds, until smooth. Put the pudding in glasses, sprinkle with chia seeds and chopped almonds. If you like a thicker consistency freeze 15 minutes before serving. Store remaining serving in the freezer."},{"id":"dbb0470","name":"Tofu Breakfast Bowl","calories":382,"protein":24,"carbs":13,"fats":26,"category":"breakfast","time":"45 mins","serves":2,"book":"Book 29","ingredients":["300g firm tofu cut into cubes","2 tbsp olive oil","1 tbsp tamari","1 courgette diced","1 red bell pepper diced","1/2 broccoli grated"],"method":"Preheat oven 200C. Place tofu between two sheets of paper towel. Gently push to drain excess water. Add half olive oil and tamari to medium bowl, add tofu and toss to coat. Transfer tofu to baking tray. Cook 25-30 minutes. Heat remaining olive oil in frying pan. Add courgette and bell pepper, cook 5 minutes. Stir through grated broccoli, cook 2 more minutes. Transfer vegetables to 2 serving bowls and top with tofu."},{"id":"dbb0471","name":"Strawberry Banana Smoothie","calories":304,"protein":30,"carbs":37,"fats":4,"category":"breakfast","time":"5 mins","serves":2,"book":"Book 29","ingredients":["300g strawberries","2 frozen bananas","2 scoops vanilla protein powder","500ml almond milk"],"method":"Add all of the ingredients to your blender and blitz until smooth. Divide between 2 tall glasses."},{"id":"dbb0472","name":"Chilli Glazed Sweet Potatoes","calories":327,"protein":3,"carbs":54,"fats":11,"category":"lunch","time":"60 mins","serves":4,"book":"Book 29","ingredients":["1kg sweet potatoes peeled and cut into chunks","50g butter","100g sweet chilli sauce","1 spring onion finely sliced"],"method":"Preheat oven 180C. Place sweet potatoes in single layer in roasting tin. Add butter and sweet chilli sauce in saucepan over medium-high heat, stirring 2-3 minutes. Remove from heat and add to potatoes. Toss and coat evenly. Cover the tray with foil and roast 30 minutes. Then remove foil, gently toss the potato pieces and roast a further 20 minutes until tender and sticky."},{"id":"dbb0473","name":"Houmous Beetroot and Cucumber Rice Cakes","calories":246,"protein":8,"carbs":31,"fats":10,"category":"snack","time":"5 mins","serves":1,"book":"Book 29","ingredients":["3 rice cakes","75g reduced fat houmous","40g cucumber sliced","40g pickled beetroot drained and diced","1 tsp sesame seeds"],"method":"Slice cucumber and remove seeds, prepare beetroot and add both to a bowl. Add sea salt and stir together. Set aside. Lay rice cakes onto a plate and add 25g (1 tbsp) houmous to each cake. Add even amounts of cucumber and beetroot to each and sprinkle with sesame seeds."},{"id":"dbb0474","name":"Hot Bacon and Avocado Protein Bagel","calories":409,"protein":27,"carbs":28,"fats":21,"category":"lunch","time":"12 mins","serves":1,"book":"Book 29","ingredients":["2 slices of back bacon","40g avocado flesh","1/4 lime juice","60g low fat spreadable soft cheese","1 seeded protein bagel thin"],"method":"Halve avocado, remove stone, add flesh into bowl. Squeeze in lime juice and season, mash roughly with a fork. Heat non-stick frying pan on medium heat and lay in bacon rashers whilst pan is cold. Fry until crispy and brown, 6-8 mins on each side. Cook bacon thoroughly. Meanwhile, halve bagel and toast. Spread each bagel half with cream cheese and top with avocado flesh and rashers of bacon."},{"id":"dbb0475","name":"Roasted Tinned Potatoes","calories":243,"protein":4,"carbs":32,"fats":11,"category":"lunch","time":"30 mins","serves":2,"book":"Book 29","ingredients":["2 x 540g cans of new potatoes drained","320g tomatoes quartered","4 tbsp balsamic vinegar","4 tbsp olive oil","1/2 tsp sea salt"],"method":"Preheat oven 180C. Add all of the ingredients to a roasting tray and mix together very well until fully coated. Add to the oven for 25 minutes, mixing the tray together halfway through."},{"id":"dbb0476","name":"Grilled Spring Onions and Tomato Sauce","calories":160,"protein":3,"carbs":10,"fats":12,"category":"lunch","time":"25 mins","serves":2,"book":"Book 29","ingredients":["2 tbsp olive oil","1 clove of garlic chopped","4 tomatoes finely chopped","1 tsp chilli powder","180g spring onions roots removed"],"method":"Heat 1 tbsp olive oil in medium saucepan, add garlic. Cook 30-45s, add tomatoes, chilli powder and a pinch of salt and sugar. Bring to low heat adding 2 tbsp water and simmer 12 minutes until tomatoes have thickened. Heat griddle pan over high heat, add 1 tbsp olive oil. When hot, add spring onions and cook each side 1 minute until lightly charred and softened. Remove from heat and serve with tomato sauce."},{"id":"dbb0477","name":"Barley and Mushroom Soup","calories":297,"protein":9,"carbs":45,"fats":9,"category":"dinner","time":"85 mins","serves":4,"book":"Book 29","ingredients":["2 tbsp olive oil","1 brown onion chopped","1 clove garlic minced","1 carrot diced","2 celery stalks diced","400g mushrooms chopped","200g pearl barley","800ml vegetable stock","Cracked pepper"],"method":"Heat oil in large saucepan over high heat. Add onion, cook 5 minutes until translucent. Add garlic, carrot and celery, cook 5 more minutes. Stir through mushrooms, cook 2 minutes. Add vegetable stock, barley and generous sprinkling of cracked pepper. Bring to boil, reduce to low simmer and cook 50-60 minutes until barley is cooked."},{"id":"dbb0478","name":"Soba Noodle Slaw","calories":347,"protein":14,"carbs":39,"fats":15,"category":"dinner","time":"30 mins","serves":4,"book":"Book 29","ingredients":["120g soba noodles uncooked","140g red cabbage shredded","2 large carrots grated","1 large cucumber thinly sliced","For the sauce: 100g peanut butter, 3 tbsp tamari, 2 tbsp maple syrup, 1 lime juiced, 2 tsp sesame oil, 2 cloves garlic minced, 1/2 tbsp ginger grated","40g coriander leaves picked","1 long red chilli sliced"],"method":"Cook soba noodles per packet instructions, drain and set aside. In large bowl, toss together cabbage, carrots and cucumber. Whisk together all dressing ingredients. If sauce is too thick, add a little water. Stir the dressing through the salad and top with coriander and fresh red chilli."},{"id":"dbb0479","name":"Rich Tomato and Tuna Pasta","calories":499,"protein":23,"carbs":86,"fats":7,"category":"dinner","time":"35 mins","serves":4,"book":"Book 29","ingredients":["1 tbsp olive oil","1 onion diced","500g aubergine sliced","1 long red chilli sliced","750g ripe tomatoes peeled and chopped","125g tinned tuna drained","40g chopped basil leaves","400g penne pasta"],"method":"Heat oil in large frying pan. Add onion and aubergine, cook stirring continuously 10 minutes until aubergine has softened. Add tomatoes and basil, cover and simmer 15 minutes. Meanwhile, cook pasta per packet instructions. Drain and rinse. Once pasta is cooked, stir tuna through the sauce, followed by the pasta 1-2 minutes. Divide between 4 bowls."},{"id":"dbb0480","name":"Cauliflower Puree with Chickpeas","calories":221,"protein":12,"carbs":14,"fats":13,"category":"dinner","time":"45 mins","serves":6,"book":"Book 29","ingredients":["2 heads cauliflower cut into big florets","60ml almond milk","3 tbsp olive oil","Sea salt and cracked pepper","For the chickpeas: 1 tin 400g chickpeas drained, 1 tbsp olive oil, 2 tsp paprika, 1 tsp chilli flakes, 4 cloves garlic"],"method":"Preheat oven 200C. Boil cauliflower 20-25 minutes until soft. Drain, cool and squeeze out as much water as you can. Dry chickpeas in kitchen towel, toss in olive oil, paprika and chilli flakes, add whole garlic cloves and roast 25-30 minutes until crispy. Transfer cooled cauliflower and roasted garlic cloves to blender with remaining oil and almond milk. Blitz until smooth and creamy. Pour puree into large serving bowl and top with chickpeas. Season."},{"id":"dbb0481","name":"Stuffed Tofu","calories":380,"protein":31,"carbs":19,"fats":20,"category":"dinner","time":"35 mins","serves":5,"book":"Book 29","ingredients":["500g fried tofu cut into 5 large squares","10 mushrooms finely chopped","5g basil chopped","50g vegan cheese grated","Salt and cracked pepper","1 tbsp olive oil","700ml passata","2 cloves garlic minced","2 tsp oregano","1-2 tsp chilli flakes","2 tbsp spring onions diced"],"method":"Carve out inside of each tofu square using a sharp knife. Add carved out tofu mixture to bowl with mushrooms, basil, vegan cheese, salt and pepper. Transfer mixture back into tofu shells. Heat olive oil in large frying pan, cook squares 5 minutes each side until crispy. Remove and set aside on kitchen towel. In same frying pan add passata, garlic, oregano and chilli flakes. Heat 5 minutes. Return tofu squares to pan, cook 5 more minutes flipping once to coat. Transfer to large shallow bowl, top with spring onions and serve immediately."},{"id":"dbb0482","name":"Mexican Soup","calories":243,"protein":13,"carbs":32,"fats":7,"category":"dinner","time":"30 mins","serves":4,"book":"Book 29","ingredients":["1 tbsp olive oil","1 brown onion","2 red bell peppers cut into small chunks","1 green bell pepper cut into small chunks","1 courgette sliced and quartered","2 x 400g tin black beans drained and rinsed","1 tbsp paprika","1 tbsp oregano","1 tsp cayenne pepper","1 tsp chilli flakes","1L vegetable stock","1 tin 400g chopped tomatoes"],"method":"Heat olive oil in large saucepan. Add onion, cook 5 minutes until translucent. Add bell pepper and courgette, cook 5 more minutes. Next add black beans, paprika, oregano, cayenne pepper, chilli flakes, stock and tinned tomatoes. Heat on medium 10 minutes."},{"id":"dbb0483","name":"Fettuccine Stroganoff","calories":431,"protein":18,"carbs":56,"fats":15,"category":"dinner","time":"35 mins","serves":3,"book":"Book 29","ingredients":["190g fettuccine","1 tbsp olive oil","250g firm tofu cut into strips","1 brown onion sliced","1 clove garlic minced","250g mushrooms sliced","1 tsp paprika","125ml vegetable stock","1 tbsp soy sauce","1 tbsp tomato puree","1 tbsp flour","80ml coconut milk"],"method":"Cook pasta per packet instructions. Heat oil in large fry pan. Add tofu slices, cook 5 minutes each side until golden. Transfer to plate and cover with foil. Add onion and garlic to same fry pan, cook 5 minutes stirring continuously. Add mushrooms and paprika, cook 3-4 minutes. Pour in vegetable stock and soy sauce. Whisk together tomato puree and flour in small bowl, add to saucepan. Simmer about 10 minutes until sauce has thickened. Stir through coconut milk, remove from heat. Divide pasta between 3 bowls, top with stroganoff sauce."},{"id":"dbb0484","name":"Lentil Pilaf","calories":421,"protein":16,"carbs":78,"fats":5,"category":"dinner","time":"40 mins","serves":3,"book":"Book 29","ingredients":["185g brown rice raw","1 brown onion diced","2 x 400g tinned lentils rinsed and drained","1 tsp ground cumin","1 tsp ground cinnamon","1 tsp ground coriander","1/2 tsp ground turmeric","1 tsp salt","1 tsp coconut sugar","3 tbsp tomato puree","1 courgette grated","1 carrot grated","550ml vegetable stock"],"method":"Cook rice per packet instructions. Heat olive oil in large saucepan, add onion and cook 5 minutes until translucent. Add cooked rice to pan and saute 2 minutes. Add all remaining ingredients. Bring to boil, reduce to low heat, cover and cook 15 minutes. If there is too much excess water, take the lid off and simmer until absorbed."},{"id":"dbb0485","name":"Butterbean Tacos","calories":473,"protein":19,"carbs":79,"fats":9,"category":"dinner","time":"20 mins","serves":4,"book":"Book 29","ingredients":["1 tbsp olive oil","2 x 400g tin butter beans","1 tsp ground cumin","1 tsp paprika","1/2 tsp dried oregano","1/4 tsp chilli flakes","8 corn tortilla","120g baby spinach","2 Lebanese cucumbers diced","1/2 red onion thinly sliced","330g mango cut into small cubes"],"method":"Heat olive oil in large fry pan on medium heat, add beans, cumin, paprika, oregano and chilli flakes. Cook stirring continuously about 5 minutes. Heat corn tortillas in microwave 40 seconds. Top each tortilla with spinach, cucumber, red onion, mango and cooked beans."},{"id":"dbb0486","name":"Stuffed Sweet Potatoes","calories":456,"protein":14,"carbs":78,"fats":10,"category":"dinner","time":"70 mins","serves":2,"book":"Book 29","ingredients":["2 medium sweet potatoes","1 tbsp olive oil","Salt and cracked pepper","3/4 tin black beans drained and rinsed","80g corn kernels","1 large tomato diced","1 tsp cumin","1 tsp paprika","25g rocket"],"method":"Preheat oven 200C. Rub half olive oil over sweet potato, season, place in oven and cook 50-60 minutes. Heat remaining oil in frying pan. Add black beans, corn, tomato, cumin and paprika, cook stirring continuously 5 minutes. Once potatoes are cooked, allow to cool 5 minutes. Transfer to 2 serving plates, top with bean mix and rocket."},{"id":"dbb0487","name":"Vietnamese Pork Noodles","calories":470,"protein":27,"carbs":23,"fats":30,"category":"dinner","time":"30 mins","serves":2,"book":"Book 29","ingredients":["75g vermicelli noodles","1/2 tbsp peanut oil","300g pork mince","2 long red chillies sliced","1.5 tbsp fish sauce","30ml lime juice","1/2 tbsp coconut sugar","1 large carrot shredded","2.5 tbsp fresh mint leaves torn","2.5 tbsp coriander leaves picked"],"method":"Cook noodles per packet instructions, drain and set aside. Add peanut oil to large wok and bring to medium-high heat. Add pork mince and cook 5-7 minutes until cooked through. Mix together fish sauce, lime juice and coconut sugar in small bowl, pour over pork. Stir to heat through. Toss pork with cooked noodles, shredded carrot, mint leaves and coriander."},{"id":"dbb0488","name":"Shiitake Tacos","calories":439,"protein":13,"carbs":54,"fats":19,"category":"dinner","time":"20 mins","serves":6,"book":"Book 29","ingredients":["1 tbsp olive oil","2 garlic cloves minced","1 tsp chilli flakes","250g shiitake mushrooms","1 bunch broccolini stems cut in half lengthways","1 avocado mashed","1 lime juiced","4 corn tortillas warmed","1/2 bunch coriander leaves picked","Chilli sauce"],"method":"Mix together olive oil, garlic and chilli flakes, toss mushrooms and broccolini to coat. Transfer vegetables to large frying pan and cook 5-6 minutes. Meanwhile, mash avocado with lime juice. Divide vegetables between tortillas, top with avocado, coriander and chilli sauce."},{"id":"dbb0489","name":"Vegan Bolognese","calories":475,"protein":19,"carbs":84,"fats":7,"category":"dinner","time":"30 mins","serves":4,"book":"Book 29","ingredients":["350g brown spiral pasta","1 tbsp olive oil","1 brown onion diced","3 cloves garlic minced","1 courgette grated","1 carrot grated","1 x 800g tin diced Italian tomatoes","1 tbsp dried oregano","1 tbsp dried parsley","1 x 425g tin brown lentils drained","2 tbsp nutritional yeast"],"method":"Cook pasta per packet instructions. Meanwhile, heat oil in large frying pan on medium-high heat. Add onion and cook 5 minutes. Add all other ingredients and cook stirring regularly 7-10 minutes. Divide pasta between four bowls, top with bolognese sauce and sprinkle with nutritional yeast flakes."},{"id":"dbb0490","name":"Baked Chicken","calories":311,"protein":40,"carbs":22,"fats":7,"category":"dinner","time":"75 mins","serves":4,"book":"Book 29","ingredients":["2 tsp olive oil","700g chicken breast","1 brown onion diced","3 stalks celery sliced","1 tsp Italian seasoning","1 x 400g tinned tomatoes","180g rice cooked"],"method":"Preheat oven 180C. Add oil to frying pan over medium-high heat. Add chicken and brown the pieces all over. Transfer chicken to ovenproof casserole dish. In same pan, add onion, celery, Italian seasoning and tinned tomatoes and bring to a boil. Pour tomato sauce all over chicken and place in oven 45-55 minutes until chicken is fully cooked. Serve with a side of rice."},{"id":"dbb0491","name":"Okonomiyaki","calories":466,"protein":13,"carbs":81,"fats":10,"category":"dinner","time":"40 mins","serves":2,"book":"Book 29","ingredients":["500g potatoes grated","1 egg","3 stalks spring onion","Salt and cracked pepper","50ml teriyaki sauce","4 tsp Kewpie mayonnaise"],"method":"Drain as much water out of grated potato as you can. Transfer to large bowl, add egg, spring onion, salt and cracked pepper. Mix to combine. Bring large frying pan to medium heat and add olive oil. Spoon half the mixture into a pancake shape into the pan. Cook about 5 minutes each side until potato has turned golden. Repeat with remainder. Add teriyaki sauce to same pan and heat on low. Place pancakes gently back into pan and coat in sauce. Divide on two plates and drizzle with Kewpie mayonnaise and extra spring onions."},{"id":"dbb0492","name":"Cheesecake Berry Pudding","calories":263,"protein":25,"carbs":7,"fats":15,"category":"dessert","time":"5 mins","serves":2,"book":"Book 29","ingredients":["250g ricotta","32g whey protein","150g punnet of raspberries","1 teaspoon lemon juice","1 teaspoon powdered sweetener"],"method":"Place the ricotta into a bowl with the protein powder and mix very well until combined. Add the berries with a small amount of lemon juice and sweetener, stir to combine and serve."},{"id":"dbb0493","name":"Blueberry Mint and Vanilla Bean Yoghurt Parfaits","calories":440,"protein":17,"carbs":84,"fats":4,"category":"dessert","time":"15 mins","serves":2,"book":"Book 29","ingredients":["350ml grape juice","760g frozen or fresh blueberries","2 tablespoons chopped fresh mint leaves","400g low-fat vanilla bean Greek yoghurt"],"method":"Bring grape juice to boil in large skillet over high heat, cook 5 minutes. Add blueberries and continue cooking until reduced and bubbling thickly, about 4 minutes longer. Transfer sauce to bowl, cover and refrigerate until chilled. When ready to serve, stir mint into sauce. Layer yoghurt and sauce in two glasses and enjoy."},{"id":"dbb0494","name":"Honey Baked Fruits with Mascarpone","calories":375,"protein":5,"carbs":28,"fats":27,"category":"dessert","time":"20 mins","serves":4,"book":"Book 29","ingredients":["6 large ripe plums halved and destoned","2 tablespoon honey","250g light mascarpone","1 tablespoon chopped pistachios","1/2 orange juice","4 apricots halved and destoned"],"method":"Preheat oven 160C. Put plums and apricots cut side up in large baking dish. Drizzle over 1 tablespoon of the honey and bake 15 minutes until tender. Add remaining honey on top and bake another 5 minutes. Divide mascarpone between plates and top with plums. Drizzle with orange juice and juice from the pan, sprinkle with chopped pistachios."},{"id":"dbb0495","name":"Chocolate Courgette Bread","calories":320,"protein":9,"carbs":35,"fats":16,"category":"dessert","time":"55 mins","serves":4,"book":"Book 29","ingredients":["250-300g courgette finely grated","2 eggs","85g pure maple syrup","3 tablespoon sunflower oil","1.5 teaspoon vanilla extract","1 teaspoon bicarbonate soda","1/2 teaspoon salt","35g cacao powder","60g whole-grain flour"],"method":"Preheat oven 175C. Finely grate courgette, squeeze excess moisture out. Whisk eggs, maple syrup, oil and vanilla in large bowl. Combine flour, bicarbonate soda, cocoa powder and salt in separate bowl. Add dry ingredients to wet ingredients and mix by hand until smooth. Stir in grated courgette until just combined. Spray 9x5 inch loaf pan with non-stick spray. Pour in batter and spread evenly. Bake 50-60 minutes until a toothpick comes out clean. Let cool to room temperature before serving."},{"id":"dbb0496","name":"Almond Butter and Oat Muffins","calories":250,"protein":5,"carbs":35,"fats":10,"category":"dessert","time":"25 mins","serves":4,"book":"Book 29","ingredients":["100g rolled oats","80g almond butter","1 banana","2 dates","60ml almond milk","1 teaspoon baking powder","20g goji berries","40g dark chocolate chopped"],"method":"Preheat oven 200C. Line standard muffin tin with paper muffin cups. Place all ingredients except chocolate in blender and blend until smooth, scraping down sides as needed. Use rubber spatula to stir in chocolate chips. Scoop equal amounts of batter into each muffin cup. Top with few more chocolate chips or goji berries if desired. Bake 13-15 minutes until a toothpick inserted in the centre comes out clean. Cool on a wire rack a few minutes before eating."},{"id":"dbb0497","name":"Breakfast Sausage Burrito","calories":491,"protein":15,"carbs":38,"fats":31,"category":"breakfast","time":"20 mins","serves":3,"book":"Book 30","ingredients":["2 tsp olive oil","1 brown onion diced","250g breakfast sausage","1 green bell pepper diced","3 tortilla wraps","1/2 avocado sliced","1 large tomato sliced"],"method":"Add olive oil to large frying pan and cook onion 5 minutes until translucent. Add sausage and green bell pepper, cook about 7 minutes until sausage fully cooked. Heat tortillas in microwave 40 seconds. Spoon sausage mixture into tortillas and top with avocado and tomato."},{"id":"dbb0498","name":"Miso Mushrooms on Toast","calories":390,"protein":12,"carbs":45,"fats":18,"category":"breakfast","time":"15 mins","serves":1,"book":"Book 30","ingredients":["1 tbsp olive oil","1 clove garlic minced","200g mushrooms","30g white miso paste","10ml tamari","120ml water","1 tbsp chives","1 slice of rye bread toasted"],"method":"Heat olive oil in medium-sized frying pan. Add mushrooms and cook 5 minutes until browned. Stir in miso, tamari and water, cook 2-3 more minutes. Top toast with mushrooms, chives, salt and cracked pepper."},{"id":"dbb0499","name":"Brekkie Bar","calories":320,"protein":6,"carbs":38,"fats":16,"category":"breakfast","time":"30 mins","serves":12,"book":"Book 30","ingredients":["400g muesli","45g dried cranberries","45g dried apricots","25g rice puffs","35g flour","175g unsalted butter","80ml golden syrup","25g coconut sugar","1 egg lightly beaten"],"method":"Preheat oven 160C. Grease 20x30cm pan and line with baking paper. Place muesli, cranberries and apricots in food processor and blitz until finely chopped. Transfer to large bowl, add rice puffs and flour, stir to combine. Place butter, golden syrup and coconut sugar in saucepan and stir over medium heat about 3 minutes until butter fully melted. Add beaten egg to muesli mixture, followed by melted butter, stir to combine. Spoon into prepared pan and press down evenly. Cook 20-25 minutes until top has become golden. Allow to cool before removing from pan. Cut into bars."},{"id":"dbb0500","name":"Baked Blackberry Custard","calories":327,"protein":28,"carbs":29,"fats":11,"category":"breakfast","time":"45 mins","serves":2,"book":"Book 30","ingredients":["2 eggs","1.5 tbsp rice malt syrup","125g natural yoghurt","1 tbsp vanilla protein powder","1/2 lemon zest finely grated","90g blackberries","2 tsp coconut sugar"],"method":"Preheat oven 200C. Combine eggs, rice malt syrup, yoghurt, protein powder and lemon zest in blender and blend until smooth and a little frothy. Divide mixture between 2 ramekins and place them in large ovenproof fry pan filled with water to about 3/4 of the way up sides of ramekins. Place blackberries on top. Cover with lid and bake about 30 minutes until set in middle. Carefully remove ramekins and allow to cool 5 minutes. Sprinkle with coconut sugar before serving."},{"id":"dbb0501","name":"Choc Orange Smoothie Bowl","calories":342,"protein":28,"carbs":44,"fats":6,"category":"breakfast","time":"5 mins","serves":1,"book":"Book 30","ingredients":["125ml oat milk","40g coconut yoghurt","1 tbsp chocolate protein powder","1/2 medium frozen banana","5-10 pieces ice","1 tbsp toasted muesli or granola","20g fresh orange sliced"],"method":"Blend milk, yoghurt, protein powder and banana until nice and smooth. If texture is too runny, add a few ice cubes to thicken it. Transfer to a serving bowl and top with granola and orange slices."},{"id":"dbb0502","name":"Cauliflower and Broccoli Cheese","calories":280,"protein":16,"carbs":18,"fats":16,"category":"lunch","time":"50 mins","serves":4,"book":"Book 30","ingredients":["180g cauliflower florets","200g broccoli florets","45g butter","45g flour","1 tsp mustard powder","425ml skimmed milk","100g reduced-fat cheddar"],"method":"Preheat oven 200C. Boil cauliflower 5 minutes, add broccoli 3 minutes more. Drain and add to ovenproof dish. In small pan over low heat melt butter until foaming, add flour and mustard powder, cook 1 minute stirring constantly. Remove from heat and add milk a little at a time, stirring constantly. Once half the milk added, return to heat and add remaining milk. Stir and bring to boil, then simmer until thick. Add 3/4 of cheese and black pepper. Pour sauce over veg, top with remaining cheese. Roast 35 minutes."},{"id":"dbb0503","name":"Tri-Colour Roast Potatoes","calories":186,"protein":3,"carbs":30,"fats":6,"category":"lunch","time":"35 mins","serves":4,"book":"Book 30","ingredients":["2 tbsp olive oil","200g sweet potato cut into chunks","200g red potato cut into chunks","200g white potato cut into chunks","1/2 lemon"],"method":"Preheat oven 200C. Cut potatoes into 1 inch chunks, add to roasting tray with oil and generous pinch of salt. Combine and separate so no potatoes are touching. Cut lemon in half and add to tray skin side down. Roast 30 minutes turning after 20 minutes. Remove from oven and dress potatoes with lemon juice, discard lemon and serve."},{"id":"dbb0504","name":"Pico de Gallo Salsa","calories":24,"protein":2,"carbs":4,"fats":0,"category":"snack","time":"15 mins","serves":12,"book":"Book 30","ingredients":["240g fresh tomatoes","1/2 medium red onion","1 green chilli deseeded and sliced","Juice of 1 lime","15g fresh coriander chopped","1/4 tsp dried oregano","1/4 tsp ground cumin"],"method":"Roughly chop then finely dice the tomatoes, chilli and onions and add to a bowl. Add the cumin, oregano, seasoning and finally the lime juice and combine very well. Top with coriander. Serve right away or cover and keep in the fridge until serving."},{"id":"dbb0505","name":"Crab Cakes","calories":139,"protein":12,"carbs":7,"fats":7,"category":"lunch","time":"45 mins","serves":4,"book":"Book 30","ingredients":["200g canned crab meat","30g panko breadcrumbs","6g fresh coriander chopped","1/2 red chilli finely chopped","1/2 lime zest","1 medium egg whisked","33g light mayonnaise","1 tsp Dijon mustard","1 tbsp olive oil"],"method":"Add 15g of the breadcrumbs to a bowl, add rest of ingredients and combine. Lay out remaining breadcrumbs in a bowl, form four small cakes with your hands and roll them in the breadcrumbs. Place in the refrigerator 30 minutes until firm. Add olive oil to non-stick frying pan over medium heat and gently fry crab cakes on both sides until golden, about 3 minutes per side. Sprinkle with a little salt. Serve with wedges of lemon and aioli."},{"id":"dbb0506","name":"Apple and Potato Mash","calories":367,"protein":6,"carbs":61,"fats":11,"category":"lunch","time":"40 mins","serves":4,"book":"Book 30","ingredients":["800g white potatoes peeled and quartered","2 cloves garlic peeled left whole","50g butter","2 bay leaves","400g apples peeled cored and cubed","40g clear honey","75ml whole milk"],"method":"Place potatoes in large saucepan, cover with cold water. Season with salt, add garlic and bring to boil then simmer 20 minutes until fully cooked through. Melt butter in separate pan over low heat. Add bay leaves and sizzle 1-2 minutes. Add apples and honey, cook 6 minutes until apple mashes easily. Remove from heat. Drain potatoes and return to pan. Discard bay leaves and tip cooked apples on top. Mash until whole mixture is smooth, return to very low heat. Slowly stir in milk and season."},{"id":"dbb0507","name":"Black Bean Burrito","calories":517,"protein":17,"carbs":74,"fats":17,"category":"dinner","time":"35 mins","serves":6,"book":"Book 30","ingredients":["2 x 400g tin black beans drained and rinsed","1/2 tbsp chili flakes","1/2 tbsp paprika","1.5 tsp ground cumin","1 tsp ground coriander","1/2 tsp garlic powder","2 tsp olive oil","125g corn kernels","1 red bell pepper chopped","1 red onion diced","2 tbsp jalapenos chopped","1 lime juiced","6 large wholemeal tortillas","450g iceberg lettuce","25g coriander","230g cheese to garnish"],"method":"Place black beans in large bowl and add all spices. Transfer to saucepan and add 2 tsp olive oil. Cook 5-8 minutes on medium-high heat. Add corn, bell pepper, onion, jalapenos and lime juice to large bowl and toss to combine. Layer tortillas with iceberg lettuce, followed by beans and salad mix. Top with cheese and coriander. Wrap burritos tightly and toast in a sandwich press until golden."},{"id":"dbb0508","name":"Mushroom Stroganoff","calories":278,"protein":10,"carbs":37,"fats":10,"category":"dinner","time":"35 mins","serves":4,"book":"Book 30","ingredients":["250g brown rice","1 brown onion diced","3 garlic cloves minced","2 tbsp butter","450g mushrooms sliced","125ml dry white wine","250ml vegetable broth","1 tbsp tamari","3 sprigs of fresh thyme","1 tsp onion powder","1 tsp smoked paprika","3.5 tbsp flour","140g Greek yoghurt or light sour cream"],"method":"Cook rice per packet instructions. Add onion and garlic to large frying pan, cook 3 minutes. Add butter. Once melted add mushrooms, fry over medium heat 5 minutes. Pour in white wine, vegetable broth, tamari and all spices. Mix thyme, onion powder, smoked paprika and flour with Greek yoghurt, pour into pan and simmer 10 minutes. Divide rice into four bowls and top with stroganoff."},{"id":"dbb0509","name":"Roasted Tomato Soup","calories":144,"protein":6,"carbs":12,"fats":8,"category":"dinner","time":"55 mins","serves":3,"book":"Book 30","ingredients":["680g Roma tomatoes quartered","1/2 brown onion quartered","1/2 red bell pepper quartered","1.5 tbsp olive oil","590ml vegetable broth","2 tsp dried basil","1 tsp dried oregano","3 tbsp Greek yoghurt"],"method":"Preheat oven 200C. Line baking tray with aluminium foil, lay tomato, onion and bell pepper across in single layer. Drizzle olive oil all over and season. Roast 40-45 minutes until vegetables are nice and soft. Bring broth and herbs to boil in medium-sized pot. Blend vegetable mix and add to broth, stir well. Simmer 5 minutes, serve in three bowls with a dollop of Greek yoghurt."},{"id":"dbb0510","name":"Power Protein Salad","calories":498,"protein":31,"carbs":44,"fats":22,"category":"dinner","time":"15 mins","serves":2,"book":"Book 30","ingredients":["For chilli roasted almonds: 140g whole raw almonds, drizzle extra virgin olive oil, 1/2 tsp smoked paprika, 1/2 tsp chilli powder, 1/2 tsp salt","4-5 handfuls mixed greens","100g quinoa cooked","60g edamame cooked and shelled","90g kidney beans cooked","100g chickpeas cooked","1/4 red onion sliced","Your favourite salad dressing"],"method":"Combine almonds, olive oil and spices in a bowl. Saute almonds in hot cast-iron pan 3-5 minutes until starting to brown and fragrant, stirring frequently. Remove from pan and let cool a few minutes. To assemble salad, toss mixed greens, quinoa, beans, chickpeas and onion with your favourite salad dressing. Divide into 2 bowls and top with chilli roasted almonds."},{"id":"dbb0511","name":"Baked Gnocchi with Spinach","calories":504,"protein":23,"carbs":76,"fats":12,"category":"dinner","time":"30 mins","serves":4,"book":"Book 30","ingredients":["1 tbsp olive oil","450g potato gnocchi","1 medium onion thinly sliced","4 cloves garlic minced","1/2 tsp ground black pepper","450g crushed tomato","1 tbsp Italian herb mix","20g nutritional yeast","1/2 tsp sea salt","400g spinach","8 pieces sun-dried tomatoes thinly sliced","250ml vegetable broth"],"method":"Preheat oven 180C. Heat 3/4 of olive oil in frying pan and roast gnocchi on low heat until golden brown about 10 minutes. Set aside. Using same frying pan add leftover oil and saute onion and garlic 3 minutes until fragrant. Add all other ingredients, stir and simmer until spinach is wilted. Transfer sauce and gnocchi to baking dish, stir, bake 20 minutes. Let cool slightly before serving."},{"id":"dbb0512","name":"Hokkien Noodles with Beef","calories":389,"protein":28,"carbs":31,"fats":17,"category":"dinner","time":"25 mins","serves":4,"book":"Book 30","ingredients":["450g Hokkien noodles","2 tbsp peanut oil","350g beef strips","2 cloves garlic minced","1 long red chilli deseeded and sliced","2 tbsp red curry paste","1 courgette cut into matchsticks","1 red bell pepper cut into matchsticks","1 tbsp fish sauce","1 tbsp lime juice","125ml water"],"method":"Cook noodles per packet instructions, drain and set aside. Heat 1 tbsp oil over high heat in large frying pan. Cook beef 3-4 minutes. Remove from pan and set aside. Add remaining oil, garlic, chilli and curry paste, heat 1 minute. Add courgette and bell pepper, cook 3-4 minutes. Return beef to pan with fish sauce, lime juice and water. Cook 3 more minutes. Toss noodles through and heat 1 further minute. Divide between 4 bowls."},{"id":"dbb0513","name":"Lemony Fish Burgers","calories":435,"protein":27,"carbs":30,"fats":23,"category":"dinner","time":"25 mins","serves":4,"book":"Book 30","ingredients":["For tartare sauce: 80g mayonnaise, 2 tbsp pickles finely chopped, 1 spring onion finely chopped, 1 tbsp lemon juice","4 white fish fillets","1 tbsp olive oil","Zest 1 lemon finely grated","1 tbsp dill finely chopped","Sea salt and cracked pepper","4 soft bread rolls","4 butter lettuce leaves"],"method":"Add mayonnaise, pickles, spring onion and lemon juice to small dish and stir well to combine. Set aside. Mix together olive oil, lemon zest, dill, sea salt and cracked pepper in a shallow dish. Submerge fish fillets and turn to coat both sides. Heat barbeque or grill plate and cook fish about 3 minutes each side. Slice buns in half, add generous dollop of tartar sauce, a butter lettuce leaf and finally the fish."},{"id":"dbb0514","name":"Beef with Bok Choy","calories":301,"protein":25,"carbs":3,"fats":21,"category":"dinner","time":"25 mins","serves":4,"book":"Book 30","ingredients":["450g beef sirloin steak sliced into bite-sized pieces","2 bunches bok choy","1 tbsp coconut oil","2 cloves garlic minced","2cm piece ginger finely chopped","For the marinade: 2 tbsp tamari, 1 tbsp sesame oil, 1 tbsp rice wine vinegar, salt and cracked pepper, 1 tsp corn flour, 1/4 tsp baking soda","For the sauce: 2 tbsp tamari, 2 tsp Sambal Oelek, 2 tsp sesame oil"],"method":"Mix all marinade ingredients together. Submerge beef in marinade, sit 30 minutes. Mix together sauce ingredients and set aside. Place bok choy in large fry pan with 3 tbsp water, put lid on, bring to medium heat. Cook 3 minutes, drain and set aside. Add coconut oil to large wok over medium heat. Cook garlic and ginger 1-2 minutes stirring continuously. Turn heat up a little higher and add beef. Allow beef to cook 3-4 minutes before flipping. Pour sauce all over beef, add bok choy and stir to heat through. Serve immediately."},{"id":"dbb0515","name":"Squash and Goat's Cheese Flatbreads","calories":506,"protein":20,"carbs":48,"fats":26,"category":"dinner","time":"45 mins","serves":2,"book":"Book 30","ingredients":["300g butternut squash peeled and cut into cubes","1/2 tbsp olive oil","1/2 tbsp sumac","2 large flatbreads","4 tbsp onion relish","100g soft goat's cheese","2 handfuls baby spinach"],"method":"Preheat oven 180C. Toss squash in olive oil and sumac, lay evenly on lined baking tray and cook 15 minutes until just beginning to soften but not fully cooked yet. Spread onion relish all over the 2 flatbreads. Top with cooked squash and goat's cheese and cook 20 minutes until cheese is melting. Once cooked, top with baby spinach and season with salt and cracked pepper."},{"id":"dbb0516","name":"Chicken Skewers","calories":283,"protein":39,"carbs":16,"fats":7,"category":"dinner","time":"45 mins","serves":2,"book":"Book 30","ingredients":["1 tbsp peanut butter","2 tbsp ketjap manis or thick soy sauce","1 tsp ginger minced","1 tsp chilli flakes","250g chicken breast cut into cubes","1 red onion cut into thick slices","1 red bell pepper cut into cubes"],"method":"In medium-sized shallow dish, mix together peanut butter, ketjap manis, ginger and chilli flakes. Add chicken and toss to coat. Allow to marinate 15 minutes. Thread chicken, red onion and bell pepper onto skewers. Heat chargrill plate or heavy frying pan to medium-high heat and cook skewers 3-4 minutes each side or until fully cooked through."},{"id":"dbb0517","name":"Salsa Chicken","calories":208,"protein":34,"carbs":9,"fats":4,"category":"dinner","time":"40 mins","serves":5,"book":"Book 30","ingredients":["4 skinless boneless chicken breasts","600g salsa"],"method":"Preheat oven 190C. Arrange chicken on a baking pan and pour salsa generously on top. Bake 25-30 minutes, until chicken is no longer pink on the inside. Let cool for a little bit, then shred it using forks and serve immediately."},{"id":"dbb0518","name":"Thai Peanut Beef","calories":484,"protein":44,"carbs":14,"fats":28,"category":"dinner","time":"20 mins","serves":4,"book":"Book 30","ingredients":["2-3 tsp olive oil","680g beef cut into thin strips","For the sauce: 125g creamy peanut butter, 2 tsp soy sauce, 1 tsp brown sugar, 2 tsp Sriracha hot sauce","65g peanuts chopped optional","2 tbsp spring onion to garnish"],"method":"Thoroughly mix together all sauce ingredients, excluding peanuts, and set aside. Add oil to large pan and heat over medium-high heat until hot. Add beef strips and cook 8-10 minutes stirring throughout to ensure even cooking. When beef has browned around edges and cooked to your preference, add half of the sauce to the pan. Stir and cook 1-2 minutes longer. Serve beef hot, topped with remaining sauce, chopped peanuts and sliced spring onions."},{"id":"dbb0519","name":"Turkey in Black Bean Sauce with Noodles","calories":384,"protein":39,"carbs":48,"fats":4,"category":"dinner","time":"30 mins","serves":1,"book":"Book 30","ingredients":["Cooking oil spray","1 small onion","1/2 medium green pepper","1/2 medium red pepper","1 garlic clove","130g turkey breast","45g stir in black bean sauce","100g medium wholewheat noodles"],"method":"Prepare and chop onion and pepper, peel and crush garlic, cut turkey into strips. Spray non-stick frying pan or wok with oil, fry onion and garlic until softened. Add turkey and cook until starting to colour. Add red and green pepper, continue frying until turkey is cooked, then stir in black bean sauce and allow to heat through. Meanwhile cook noodles per pack instructions. Add cooked noodles to bowl and serve topped with the turkey."},{"id":"dbb0520","name":"Chilli-Glazed Pork with Sweet Potato Hash","calories":362,"protein":35,"carbs":33,"fats":10,"category":"dinner","time":"25 mins","serves":4,"book":"Book 30","ingredients":["1 pork tenderloin","1 tbsp and 1 tsp olive oil","1 tsp chilli powder","Salt and black pepper","2 tbsp pure maple syrup","2 medium sweet potatoes","2 large shallots chopped","140g baby spinach chopped","Hot sauce optional"],"method":"Heat grill to medium. Place pork on foil-lined rimmed baking sheet and rub with 1 tsp oil, chilli powder and salt and pepper. Grill 8-10 minutes per side, turning and basting with maple syrup twice, until cooked through and juices run clear. Set aside to rest 5 minutes before slicing. Meanwhile, grate sweet potatoes. Heat remaining oil in large non-stick pan over medium-high heat. Add shallots and cook until beginning to brown, then add potatoes and cook tossing occasionally until tender. Finally add spinach and cook tossing until wilted. Serve pork and potatoes in bowls."},{"id":"dbb0521","name":"Aubergine and Lentil Vindaloo","calories":244,"protein":12,"carbs":40,"fats":4,"category":"dinner","time":"55 mins","serves":2,"book":"Book 30","ingredients":["1/4 cup dried red lentils rinsed and drained","3 onions finely sliced","1 tsp sunflower oil","4 large garlic cloves whole","1 large aubergine diced","1 tsp cumin","1/2 tsp ground cinnamon","1/4 tsp star anise","Ground black pepper","1-2 tsp chilli flakes","2 tbsp tomato puree","2 tbsp vinegar or lemon juice","30g spinach"],"method":"Rinse and drain lentils, place in pan, cover with water and bring to boil. Reduce to simmer 12 minutes until soft. Drain, rinse well and set aside. Soften onions in large pan with oil over medium heat 10 minutes. Add garlic cloves and aubergine, stir often, cook 15 minutes. Add cumin, cinnamon, star anise, pepper and half the chilli. Add 200ml water and turn up heat to medium-high. Add reserved lentils, tomato puree and vinegar, stir well. Bring to boil then reduce to simmer, cover 30 minutes. Stir through spinach few minutes before serving."},{"id":"dbb0522","name":"Strawberry Cheesecake in a Glass","calories":485,"protein":11,"carbs":54,"fats":25,"category":"dessert","time":"30 mins","serves":4,"book":"Book 30","ingredients":["200g fat-free cream cheese","100ml whipped cream","1 teaspoon vanilla extract","150g petit beurre","4 tablespoons melted butter","160g strawberries sliced","25g icing sugar","50g sugar"],"method":"Add petit beurre crumbs and melted butter in small bowl and stir until combined. Add 3 tablespoons of petit beurre crumbs mixture in separate glasses. With electric mixer, beat whipped cream, icing sugar, vanilla extract and cream cheese until well blended. Add a layer of cream cheese mixture in glasses. Add strawberries and sugar to medium pot, cook 10 minutes on low heat. Leave to cool then place on layer of cream cheese. Store in refrigerator until ready to serve."},{"id":"dbb0523","name":"Energy Balls","calories":326,"protein":7,"carbs":43,"fats":14,"category":"dessert","time":"10 mins","serves":5,"book":"Book 30","ingredients":["180g almond butter","70g old fashioned rolled oats","2 tablespoons maple syrup","40g flaxseed meal","10 dates pitted","1 tablespoon chia seeds","80g mini dark chocolate chips"],"method":"In food-processor, blend dates until they start to break down and ball up. Add almond butter, oats, syrup, flaxseed, chia seeds and chocolate chips. Pulse a few times until combined. Use tablespoon to scoop out energy balls, rolling between palms to form a smooth ball. Drizzle with additional melted chocolate and sprinkle with sea salt. Store in airtight container in fridge for up to 10 days or freeze for up to 3 months."},{"id":"dbb0524","name":"Coconut Lime Energy Bites","calories":207,"protein":3,"carbs":24,"fats":11,"category":"dessert","time":"10 mins","serves":10,"book":"Book 30","ingredients":["150g raw cashews","220g pitted soft dates","66g unsweetened fine coconut","2 tbsp fresh lime juice","1 tsp fresh grated lime zest"],"method":"Use grater to make lime zest. Slice lime and squeeze to make 2 tbsp of juice. Place cashews in food processor and mix until broken down into coarse grainy flour. Add dates and process until it forms crumbly but sticky dough. Add coconut, lime juice and zest and process until mixture sticks together when you press it. Use hands to roll mixture into 10-15 balls. Can be rolled in additional desiccated coconut if desired. Store in sealed container in fridge for up to 2 weeks or freezer for up to 2 months."},{"id":"dbb0525","name":"Sweet Potato Casserole","calories":355,"protein":5,"carbs":41,"fats":19,"category":"dessert","time":"60 mins","serves":8,"book":"Book 30","ingredients":["500g sweet potatoes peeled and cut into cubes","4 tablespoons butter softened","120ml milk","85g packed brown sugar","2 large eggs","1/2 teaspoon ground nutmeg","1/4 teaspoon pure vanilla extract","1 teaspoon kosher salt","For the topping: 60g all purpose flour, 4 tbsp melted butter, 65g chopped pecans, 40g packed brown sugar, 1/2 tsp kosher salt"],"method":"Preheat oven 175C. Place sweet potatoes in large pot, cover with water, bring to boil then simmer until tender about 15 minutes. Drain and let cool slightly. Mash sweet potatoes, add butter, milk, brown sugar, eggs, nutmeg, salt and vanilla and stir until smooth. Transfer to prepared casserole dish. Mix all topping ingredients, sprinkle over sweet potatoes and bake until warmed through and golden on top, 25 minutes."},{"id":"dbb0526","name":"Apple Pie Cake","calories":291,"protein":5,"carbs":34,"fats":15,"category":"dessert","time":"35 mins","serves":8,"book":"Book 30","ingredients":["150g dark brown sugar","2 large eggs","80ml sunflower oil","1 teaspoon vanilla extract","1 teaspoon cinnamon","1/4 teaspoon nutmeg","1/2 teaspoon kosher salt","120g all-purpose flour","1 teaspoon baking powder","1/2 teaspoon baking soda","2 small apples peeled cored and chopped","50g toasted walnuts chopped"],"method":"Position rack in centre of oven and preheat to 175C. Butter or coat a 23cm round baking pan with nonstick spray and line the bottom with parchment paper. Whisk brown sugar and eggs until foamy about 1 minute. Add oil, vanilla, cinnamon, nutmeg and salt. Add flour, baking powder and baking soda and whisk until well-combined and smooth. Fold in apples and half of the nuts. Pour into prepared pan, smooth top, making sure apples are well dispersed. Sprinkle remaining nuts over the cake. Bake until puffed and golden and a tester comes out clean, 30-40 minutes. Set on rack to cool about 15 minutes before turning out."},{"id":"dbb0601","name":"Banana Protein Waffles","calories":376,"protein":28,"carbs":40,"fats":11,"category":"breakfast","time":"20 mins","serves":2,"book":"Book 13","ingredients":["2 ripe bananas","2 eggs","30g vanilla protein powder","50g oats","1 tsp baking powder","1 tsp cinnamon"],"method":"Blend all ingredients until smooth. Pour batter into preheated waffle iron. Cook until golden and crisp. Serve with fresh fruit or maple syrup."},{"id":"dbb0602","name":"Breakfast Cookies","calories":226,"protein":8,"carbs":30,"fats":9,"category":"breakfast","time":"20 mins","serves":8,"book":"Book 13","ingredients":["200g oats","2 ripe bananas mashed","60g peanut butter","30g honey","50g dark chocolate chips","1 tsp cinnamon"],"method":"Preheat oven 180C. Mix all ingredients together. Scoop onto lined baking tray and flatten into cookies. Bake 12-15 minutes until golden. Cool before serving."},{"id":"dbb0603","name":"Plum and Almond Oats","calories":277,"protein":9,"carbs":38,"fats":10,"category":"breakfast","time":"10 mins","serves":1,"book":"Book 13","ingredients":["40g oats","200ml almond milk","2 plums sliced","20g almond butter","1 tsp honey","Pinch of cinnamon"],"method":"Cook oats with almond milk over medium heat stirring frequently until thick and creamy. Top with sliced plums, almond butter and a drizzle of honey."},{"id":"dbb0604","name":"Mango Passion Smoothie","calories":252,"protein":20,"carbs":35,"fats":5,"category":"breakfast","time":"5 mins","serves":1,"book":"Book 13","ingredients":["150g frozen mango","100ml passion fruit juice","1 scoop vanilla protein powder","150ml coconut milk","Ice cubes"],"method":"Blend all ingredients until smooth and creamy. Pour into a glass and enjoy immediately."},{"id":"dbb0605","name":"Berry Cherry Smoothie Bowl","calories":252,"protein":20,"carbs":32,"fats":5,"category":"breakfast","time":"5 mins","serves":1,"book":"Book 13","ingredients":["100g frozen mixed berries","50g frozen cherries","1 scoop vanilla protein powder","100ml almond milk","Granola and fresh berries to top"],"method":"Blend berries, cherries, protein powder and almond milk until thick and smooth. Pour into bowl and top with granola and fresh berries."},{"id":"dbb0606","name":"Aubergine and Courgette Hash","calories":252,"protein":8,"carbs":28,"fats":12,"category":"breakfast","time":"20 mins","serves":2,"book":"Book 13","ingredients":["1 aubergine diced","1 courgette diced","1 red onion diced","2 cloves garlic","1 tbsp olive oil","1 tsp smoked paprika","Salt and pepper","2 eggs"],"method":"Fry aubergine, courgette, onion and garlic in olive oil 10-12 minutes until tender. Add smoked paprika, season. Make two wells in the hash and crack in eggs. Cover and cook until eggs are set to your liking."},{"id":"dbb0607","name":"Harissa Beet and Carrot Salad","calories":318,"protein":6,"carbs":42,"fats":14,"category":"lunch","time":"20 mins","serves":2,"book":"Book 13","ingredients":["2 beetroots cooked and diced","2 carrots grated","2 tbsp harissa paste","2 tbsp olive oil","Juice of 1 lemon","50g feta cheese","Fresh coriander"],"method":"Toss beetroot and carrot with harissa, olive oil and lemon juice. Season well. Serve topped with crumbled feta and fresh coriander."},{"id":"dbb0608","name":"Coconut Cashew Butter","calories":238,"protein":5,"carbs":16,"fats":18,"category":"snack","time":"10 mins","serves":4,"book":"Book 13","ingredients":["150g cashews","30g desiccated coconut","1 tbsp coconut oil","Pinch of salt","1 tsp maple syrup"],"method":"Blend cashews and coconut in food processor until fine crumbs. Add coconut oil, salt and maple syrup. Continue blending until smooth and creamy butter forms."},{"id":"dbb0609","name":"Tabouli","calories":244,"protein":5,"carbs":38,"fats":8,"category":"lunch","time":"20 mins","serves":4,"book":"Book 13","ingredients":["200g bulgur wheat cooked","Large bunch flat leaf parsley chopped","Bunch of mint chopped","3 tomatoes diced","1/2 cucumber diced","Juice of 2 lemons","3 tbsp olive oil"],"method":"Cook bulgur wheat and allow to cool. Combine with all other ingredients, mix well and season generously. Best served immediately."},{"id":"dbb0610","name":"Asparagus and Brie Crostini","calories":214,"protein":8,"carbs":22,"fats":11,"category":"snack","time":"15 mins","serves":4,"book":"Book 13","ingredients":["8 asparagus spears","100g brie sliced","4 slices sourdough bread","1 tbsp olive oil","Black pepper"],"method":"Griddle asparagus in olive oil until tender. Toast sourdough. Top toast with brie slices and griddled asparagus. Season with black pepper and serve."},{"id":"dbb0611","name":"Chilli Con Carne","calories":318,"protein":28,"carbs":28,"fats":10,"category":"dinner","time":"45 mins","serves":4,"book":"Book 13","ingredients":["500g lean beef mince","400g tin kidney beans","400g tin chopped tomatoes","1 onion diced","2 cloves garlic","1 tbsp chilli powder","1 tsp cumin","1 tsp smoked paprika","1 beef stock cube"],"method":"Brown beef with onion and garlic. Add spices and cook 1 minute. Add tomatoes, beans and reconstituted stock. Simmer 30 minutes until rich and thick. Serve with rice or jacket potato."},{"id":"dbb0612","name":"Mango Chicken Patties","calories":299,"protein":28,"carbs":22,"fats":11,"category":"dinner","time":"25 mins","serves":4,"book":"Book 13","ingredients":["500g chicken mince","80g mango diced","2 spring onions diced","1 tsp ginger paste","1 tsp garlic paste","1 tbsp soy sauce","Salt and pepper"],"method":"Combine all ingredients, mix well. Shape into patties. Cook in oiled pan over medium heat 4-5 minutes each side until cooked through. Serve with salad or in a bun."},{"id":"dbb0613","name":"Honey Sriracha Chicken","calories":242,"protein":30,"carbs":12,"fats":8,"category":"dinner","time":"25 mins","serves":4,"book":"Book 13","ingredients":["600g chicken breast diced","2 tbsp honey","2 tbsp sriracha","1 tbsp soy sauce","1 clove garlic grated","1 tsp olive oil"],"method":"Mix honey, sriracha, soy and garlic. Fry chicken in olive oil until almost cooked. Add sauce and cook 3-4 minutes until glazed and sticky. Serve over rice with spring onions."},{"id":"dbb0614","name":"Teriyaki Tofu","calories":410,"protein":22,"carbs":48,"fats":15,"category":"dinner","time":"20 mins","serves":2,"book":"Book 13","ingredients":["400g firm tofu pressed and cubed","4 tbsp teriyaki sauce","2 tbsp soy sauce","1 tbsp honey","1 clove garlic grated","1 tsp sesame oil","Sesame seeds to garnish"],"method":"Fry tofu cubes in sesame oil until golden on all sides. Mix teriyaki sauce, soy, honey and garlic. Pour over tofu and cook 2-3 minutes until sauce coats. Serve with rice and sesame seeds."},{"id":"dbb0615","name":"Pumpkin and Ricotta Gnocchi","calories":377,"protein":15,"carbs":52,"fats":13,"category":"dinner","time":"30 mins","serves":4,"book":"Book 13","ingredients":["500g pumpkin roasted and mashed","250g ricotta","200g plain flour","1 egg","Salt and pepper","Fresh sage and butter to serve"],"method":"Combine pumpkin mash, ricotta, flour and egg. Season. Roll into long sausages on floured surface, cut into gnocchi pieces. Boil in salted water until they float. Drain. Fry in butter with sage until lightly golden. Serve immediately."},{"id":"dbb0616","name":"Slow Roasted Halibut with Gremolata","calories":286,"protein":36,"carbs":4,"fats":14,"category":"dinner","time":"25 mins","serves":4,"book":"Book 13","ingredients":["4 halibut fillets","For gremolata: 2 tbsp flat leaf parsley chopped, zest of 2 lemons, 2 cloves garlic grated, 2 tbsp olive oil, salt and pepper"],"method":"Preheat oven 160C. Place halibut on baking paper lined tray, drizzle with olive oil, season. Roast 20-25 minutes until just cooked through. Mix all gremolata ingredients together. Spoon over fish to serve."},{"id":"dbb0617","name":"Easy Chicken Stir-Fry","calories":451,"protein":38,"carbs":42,"fats":14,"category":"dinner","time":"20 mins","serves":2,"book":"Book 13","ingredients":["300g chicken breast sliced","2 tbsp soy sauce","1 tbsp oyster sauce","1 tsp sesame oil","1 tsp ginger grated","1 clove garlic","Mixed vegetables 300g","Noodles or rice to serve"],"method":"Marinate chicken in soy, ginger and garlic. Stir fry in hot wok until golden. Add vegetables and remaining sauces, toss and cook 3-4 minutes. Serve over noodles or rice."},{"id":"dbb0618","name":"Creamy Chicken Penne","calories":470,"protein":38,"carbs":48,"fats":14,"category":"dinner","time":"25 mins","serves":4,"book":"Book 13","ingredients":["400g penne pasta","400g chicken breast diced","200ml low fat cream","1 onion diced","2 cloves garlic","1 tbsp olive oil","50g parmesan","Fresh basil"],"method":"Cook penne per packet. Fry onion and garlic in olive oil. Add chicken and cook through. Add cream and simmer 3-4 minutes. Drain pasta and stir into sauce. Top with parmesan and fresh basil."},{"id":"dbb0619","name":"Crispy Falafels","calories":487,"protein":18,"carbs":62,"fats":19,"category":"dinner","time":"30 mins","serves":4,"book":"Book 13","ingredients":["2 x 400g tins chickpeas drained","1 onion roughly chopped","3 cloves garlic","2 tsp cumin","1 tsp coriander","Handful fresh parsley","3 tbsp plain flour","Salt and pepper","Oil for frying"],"method":"Blend chickpeas, onion, garlic, spices and parsley until roughly combined. Mix in flour and season. Shape into balls and flatten. Shallow fry in oil 3-4 minutes each side until crispy and golden. Serve in pitta with salad."},{"id":"dbb0620","name":"Quick and Easy Chicken Quesadilla","calories":452,"protein":36,"carbs":40,"fats":17,"category":"dinner","time":"15 mins","serves":2,"book":"Book 13","ingredients":["2 large flour tortillas","200g cooked chicken sliced","80g cheddar grated","60g salsa","40g sour cream","Fresh coriander"],"method":"Lay one tortilla flat. Layer chicken and cheddar over one half. Fold over and press down. Cook in dry pan 2-3 minutes per side until golden and cheese melted. Cut into wedges and serve with salsa, sour cream and coriander."},{"id":"dbb0621","name":"Pumpkin Mac and Cheese","calories":498,"protein":18,"carbs":68,"fats":18,"category":"dinner","time":"25 mins","serves":4,"book":"Book 13","ingredients":["350g macaroni pasta","300g pumpkin puree","150ml milk","100g cheddar grated","50g parmesan","1 tsp mustard","1 tsp smoked paprika","Salt and pepper"],"method":"Cook pasta per packet. Make sauce by heating pumpkin puree with milk, cheeses, mustard and paprika until smooth and creamy. Combine with cooked pasta. Season well and serve."},{"id":"dbb0622","name":"Molten Choc Protein Pudding","calories":637,"protein":28,"carbs":62,"fats":31,"category":"dessert","time":"15 mins","serves":1,"book":"Book 13","ingredients":["60g dark chocolate","40g butter","2 eggs","2 tbsp sugar","2 tbsp flour","20g chocolate protein powder"],"method":"Preheat oven 200C. Melt chocolate and butter together. Whisk eggs and sugar until pale. Fold in melted chocolate, flour and protein powder. Pour into greased ramekin. Bake 10-12 minutes until edges set but centre still soft. Serve immediately."},{"id":"dbb0623","name":"Strawberry Cheesecake Bread","calories":324,"protein":10,"carbs":42,"fats":13,"category":"dessert","time":"60 mins","serves":8,"book":"Book 13","ingredients":["200g strawberries roughly chopped","250g cream cheese softened","2 eggs","150g caster sugar","200g self-raising flour","100ml milk","2 tbsp butter melted"],"method":"Preheat oven 180C. Beat cream cheese, eggs and sugar together. Add flour, milk and butter, fold in strawberries. Pour into lined loaf tin. Bake 50-55 minutes until golden and a skewer comes out clean. Cool before slicing."},{"id":"dbb0624","name":"Mango Waffle Cup","calories":176,"protein":5,"carbs":30,"fats":4,"category":"dessert","time":"10 mins","serves":1,"book":"Book 13","ingredients":["1 waffle cone or cup","150g fresh mango diced","100g vanilla Greek yoghurt","1 tbsp coconut flakes","1 tsp honey"],"method":"Place mango into waffle cup. Top with vanilla yoghurt, coconut flakes and honey. Serve immediately."},{"id":"dbb0625","name":"Ricotta Cheesecake","calories":311,"protein":12,"carbs":32,"fats":16,"category":"dessert","time":"60 mins","serves":8,"book":"Book 13","ingredients":["500g ricotta","3 eggs","100g caster sugar","Zest of 1 lemon","1 tsp vanilla extract","100g digestive biscuits","50g butter melted"],"method":"Preheat oven 160C. Crush biscuits, mix with melted butter, press into base of lined 20cm tin. Beat ricotta, eggs, sugar, lemon zest and vanilla until smooth. Pour over base. Bake 45-50 minutes until set. Cool completely before serving."},{"id":"dbb0626","name":"Oatmeal Protein Cookies","calories":185,"protein":8,"carbs":22,"fats":7,"category":"dessert","time":"20 mins","serves":12,"book":"Book 13","ingredients":["200g oats","50g whey protein vanilla","100g peanut butter","80g honey","2 eggs","1 tsp vanilla","1 tsp cinnamon","50g dark chocolate chips"],"method":"Preheat oven 180C. Mix all ingredients together. Scoop onto lined baking tray and flatten. Bake 12-14 minutes until golden. Cool on tray before eating."},{"id":"dbb0627","name":"Yogurt Granola Bowl","calories":451,"protein":18,"carbs":62,"fats":15,"category":"breakfast","time":"5 mins","serves":1,"book":"Book 15","ingredients":["200g Greek yoghurt","60g granola","100g mixed fresh berries","1 tbsp honey","1 tbsp chia seeds"],"method":"Add yoghurt to a bowl. Top with granola, fresh berries, chia seeds and a drizzle of honey. Enjoy immediately."},{"id":"dbb0628","name":"Overnight Espresso Oats","calories":415,"protein":18,"carbs":52,"fats":14,"category":"breakfast","time":"Overnight","serves":1,"book":"Book 15","ingredients":["60g rolled oats","200ml oat milk","1 shot espresso cooled","1 tbsp chia seeds","20g protein powder","1 tbsp maple syrup","Pinch of cinnamon"],"method":"Combine all ingredients in a jar, stir well, refrigerate overnight. Add more oat milk in the morning if needed. Top with banana slices if desired."},{"id":"dbb0629","name":"Almond Butter Pancakes","calories":375,"protein":18,"carbs":40,"fats":16,"category":"breakfast","time":"20 mins","serves":2,"book":"Book 15","ingredients":["100g oat flour","1 tsp baking powder","2 eggs","150ml almond milk","60g almond butter","1 tbsp maple syrup","1 tsp vanilla"],"method":"Mix all ingredients into a smooth batter. Heat oiled pan over medium heat. Cook ladlefuls 2-3 minutes per side until golden. Serve with fresh fruit and extra maple syrup."},{"id":"dbb0630","name":"Vanilla Buckwheat Porridge","calories":416,"protein":16,"carbs":58,"fats":13,"category":"breakfast","time":"10 mins","serves":1,"book":"Book 15","ingredients":["60g buckwheat flakes","200ml almond milk","20g vanilla protein powder","1 tbsp almond butter","1 tbsp honey","Fresh berries to top"],"method":"Cook buckwheat flakes with almond milk over medium heat stirring until thick and creamy. Stir in protein powder. Top with almond butter, honey and fresh berries."},{"id":"dbb0631","name":"Egg Cups with Courgette","calories":322,"protein":22,"carbs":12,"fats":20,"category":"breakfast","time":"25 mins","serves":4,"book":"Book 15","ingredients":["8 eggs","1 courgette grated","80g cheddar grated","4 spring onions sliced","Salt and pepper","Light spray oil"],"method":"Preheat oven 180C. Spray muffin tin with light oil. Combine all ingredients except eggs in bowl, divide between tin holes. Crack 1 egg into each hole. Bake 15-18 minutes until eggs are set. Serve warm."},{"id":"dbb0632","name":"Beetroot Hummus","calories":124,"protein":4,"carbs":12,"fats":7,"category":"snack","time":"10 mins","serves":6,"book":"Book 15","ingredients":["1 tin 400g chickpeas drained","150g cooked beetroot","2 tbsp tahini","1 clove garlic","Juice of 1 lemon","2 tbsp olive oil","Salt and pepper"],"method":"Blend all ingredients until very smooth. Adjust seasoning to taste. Serve with vegetable sticks or pitta bread."},{"id":"dbb0633","name":"Beef Skewers with Salsa Verde","calories":398,"protein":38,"carbs":8,"fats":23,"category":"dinner","time":"25 mins","serves":4,"book":"Book 15","ingredients":["600g lean beef cubed","For salsa verde: large bunch parsley, 2 tbsp capers, 2 anchovy fillets, 1 garlic clove, 3 tbsp olive oil, 1 tbsp red wine vinegar, salt and pepper"],"method":"Thread beef cubes onto skewers, season. Grill or barbecue 3-4 minutes each side. Blend all salsa verde ingredients until roughly combined. Serve skewers with salsa verde spooned over."},{"id":"dbb0634","name":"Salmon Bites","calories":390,"protein":32,"carbs":18,"fats":22,"category":"dinner","time":"25 mins","serves":4,"book":"Book 15","ingredients":["500g salmon fillets cubed","2 tbsp soy sauce","1 tbsp honey","1 tsp sesame oil","1 clove garlic grated","1 tsp ginger grated","Sesame seeds"],"method":"Marinate salmon cubes in soy, honey, sesame oil, garlic and ginger 10 minutes. Thread onto skewers. Grill or bake at 200C 10-12 minutes until cooked through. Sprinkle with sesame seeds."},{"id":"dbb0636","name":"Prawn Fajitas","calories":173,"protein":18,"carbs":16,"fats":4,"category":"dinner","time":"20 mins","serves":2,"book":"Book 15","ingredients":["300g raw prawns","1 red pepper sliced","1 yellow pepper sliced","1 onion sliced","1 tbsp fajita seasoning","1 tbsp olive oil","4 small flour tortillas","Sour cream and salsa to serve"],"method":"Fry onion and peppers in olive oil until softening. Add prawns and fajita seasoning, cook until prawns are pink and cooked through. Serve in warm tortillas with sour cream and salsa."},{"id":"dbb0637","name":"Beef Macaroni","calories":565,"protein":32,"carbs":68,"fats":17,"category":"dinner","time":"30 mins","serves":4,"book":"Book 15","ingredients":["400g macaroni","500g lean beef mince","400g tin chopped tomatoes","1 onion diced","2 cloves garlic","1 tsp oregano","1 tsp paprika","80g cheddar grated"],"method":"Cook pasta per packet. Brown beef with onion and garlic. Add tomatoes, oregano and paprika, simmer 15 minutes. Combine with pasta. Top with grated cheese and serve."},{"id":"dbb0638","name":"Salmon Nicoise","calories":558,"protein":42,"carbs":32,"fats":28,"category":"dinner","time":"25 mins","serves":2,"book":"Book 15","ingredients":["2 salmon fillets","200g green beans","4 eggs","200g new potatoes","80g olives","2 tbsp capers","4 tbsp vinaigrette","Salad leaves"],"method":"Boil potatoes and beans until tender. Boil eggs 6-7 minutes, cool and peel. Grill or pan-fry salmon 4-5 minutes each side. Arrange salad leaves with potatoes, beans, halved eggs and olives. Top with salmon. Drizzle with vinaigrette."},{"id":"dbb0639","name":"Vietnamese Curry","calories":536,"protein":32,"carbs":52,"fats":22,"category":"dinner","time":"40 mins","serves":4,"book":"Book 15","ingredients":["500g chicken breast diced","400ml light coconut milk","200ml chicken stock","2 tbsp Vietnamese curry paste","1 tbsp fish sauce","1 tbsp brown sugar","200g mixed vegetables","Rice or noodles to serve"],"method":"Fry curry paste until fragrant. Add chicken and cook until sealed. Add coconut milk, stock, fish sauce and sugar. Simmer 20-25 minutes until chicken cooked and sauce thick. Add vegetables for last 5 minutes. Serve with rice or noodles."},{"id":"dbb0640","name":"Beetroot Pumpkin Salad with Carrot Ginger Dressing","calories":363,"protein":8,"carbs":48,"fats":16,"category":"lunch","time":"30 mins","serves":4,"book":"Book 15","ingredients":["400g pumpkin roasted","2 beetroots cooked and sliced","100g rocket","50g feta crumbled","For dressing: 2 large carrots juiced, 1 tbsp fresh ginger grated, 2 tbsp olive oil, 1 tbsp apple cider vinegar, salt and pepper"],"method":"Arrange rocket on plates with pumpkin and beetroot. Blend all dressing ingredients until smooth. Drizzle over salad. Top with crumbled feta."},{"id":"dbb0641","name":"Brown Lentil Rice Salad","calories":377,"protein":16,"carbs":58,"fats":9,"category":"lunch","time":"30 mins","serve
