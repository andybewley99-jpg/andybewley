s":4,"book":"Book 15","ingredients":["200g brown lentils cooked","200g brown rice cooked","1 red onion diced","1 red pepper diced","Large bunch fresh parsley","3 tbsp olive oil","Juice of 2 lemons","1 tsp cumin","Salt and pepper"],"method":"Combine warm lentils and rice with onion, pepper and parsley. Mix dressing from olive oil, lemon juice, cumin and seasoning. Toss everything together. Can be served warm or cold."},{"id":"dbb0642","name":"Grilled Salmon with Triple Citrus Glaze","calories":391,"protein":38,"carbs":16,"fats":19,"category":"dinner","time":"25 mins","serves":4,"book":"Book 15","ingredients":["4 salmon fillets","Juice of 1 lemon","Juice of 1 lime","Juice of 1 orange","2 tbsp honey","1 tbsp soy sauce","1 clove garlic grated"],"method":"Mix citrus juices, honey, soy and garlic to make glaze. Place salmon on lined baking tray, brush with half the glaze. Grill 12-15 minutes, brushing with remaining glaze halfway through. Serve immediately."},{"id":"dbb0643","name":"Grilled Chicken Bites with Ranch Dressing","calories":250,"protein":32,"carbs":8,"fats":10,"category":"dinner","time":"20 mins","serves":4,"book":"Book 15","ingredients":["600g chicken breast cubed","1 tsp garlic powder","1 tsp onion powder","1 tsp smoked paprika","Salt and pepper","1 tbsp olive oil","For ranch: 100g Greek yoghurt, 1 tbsp mayonnaise, 1 tsp garlic powder, 1 tbsp fresh dill, 1 tbsp fresh chives, salt and pepper"],"method":"Season chicken with spices and oil. Thread onto skewers. Grill 3-4 minutes each side until cooked through. Mix all ranch dressing ingredients together. Serve chicken bites with ranch dipping sauce."},{"id":"dbb0644","name":"Slow Cooker Apricot Chicken","calories":462,"protein":40,"carbs":38,"fats":16,"category":"dinner","time":"6 hrs","serves":6,"book":"Book 15","ingredients":["1kg chicken thighs","400g tin apricots in juice","1 onion diced","2 cloves garlic","1 tbsp honey","1 tbsp soy sauce","1 tsp ground ginger","Salt and pepper"],"method":"Place all ingredients in slow cooker. Cook on low 6-8 hours or high 3-4 hours until chicken is tender and falling apart. Serve with rice or mashed potatoes."},{"id":"dbb0645","name":"Parmesan Crusted Veal Cutlets","calories":483,"protein":42,"carbs":24,"fats":24,"category":"dinner","time":"20 mins","serves":4,"book":"Book 15","ingredients":["4 veal cutlets","100g parmesan grated","80g breadcrumbs","2 eggs beaten","Salt and pepper","2 tbsp olive oil"],"method":"Mix parmesan and breadcrumbs together. Season veal cutlets. Dip in beaten egg then parmesan crumb mix, press well. Fry in olive oil 3-4 minutes each side until golden and cooked through. Serve with salad and lemon wedges."},{"id":"dbb0646","name":"Lamb and Sweet Potato Bake","calories":551,"protein":40,"carbs":44,"fats":23,"category":"dinner","time":"60 mins","serves":4,"book":"Book 15","ingredients":["600g lamb shoulder diced","800g sweet potato cubed","1 onion diced","3 cloves garlic","2 tsp rosemary","1 tsp thyme","400ml lamb stock","Salt and pepper"],"method":"Preheat oven 180C. Brown lamb in heatproof casserole. Add onion, garlic and herbs, cook 2 minutes. Add sweet potato and pour in stock. Season. Cover and bake 45-50 minutes until lamb tender and sweet potato soft."},{"id":"dbb0647","name":"Butternut Squash Noodles","calories":462,"protein":14,"carbs":78,"fats":13,"category":"dinner","time":"20 mins","serves":2,"book":"Book 15","ingredients":["1 large butternut squash spiralised","1 tin 400g chickpeas drained","200g cherry tomatoes halved","3 cloves garlic","2 tbsp olive oil","1 tsp chilli flakes","50g parmesan","Fresh basil"],"method":"Spiralise butternut squash. Fry garlic in olive oil with chilli flakes. Add chickpeas and tomatoes, cook 5 minutes. Blanch squash noodles in boiling water 1-2 minutes. Drain and toss with sauce. Top with parmesan and basil."},{"id":"dbb0648","name":"Chickpea San Choy Bow","calories":363,"protein":14,"carbs":44,"fats":15,"category":"dinner","time":"20 mins","serves":4,"book":"Book 15","ingredients":["2 tins 400g chickpeas drained","1 tbsp sesame oil","2 cloves garlic grated","1 tsp ginger grated","2 tbsp hoisin sauce","1 tbsp soy sauce","1 tbsp rice wine vinegar","Iceberg lettuce leaves","Spring onions and coriander to garnish"],"method":"Heat sesame oil in pan. Add garlic and ginger, cook 1 minute. Add chickpeas, hoisin, soy and rice wine vinegar. Cook 5-6 minutes until heated through and slightly caramelised. Spoon into lettuce cups. Garnish with spring onions and coriander."},{"id":"dbb0649","name":"One Pot Veggie Sausage Stew","calories":364,"protein":16,"carbs":52,"fats":11,"category":"dinner","time":"30 mins","serves":4,"book":"Book 15","ingredients":["8 vegetarian sausages","400g tin chopped tomatoes","400g tin butter beans drained","1 onion diced","2 cloves garlic","1 red pepper diced","1 tsp smoked paprika","500ml vegetable stock"],"method":"Brown sausages in large pot, remove and slice. Cook onion, garlic and pepper 5 minutes. Add paprika, tomatoes and stock. Add beans and sausage slices. Simmer 20 minutes until thick. Season and serve."},{"id":"dbb0650","name":"Crispy Kale and Prawns","calories":351,"protein":28,"carbs":24,"fats":16,"category":"dinner","time":"20 mins","serves":2,"book":"Book 15","ingredients":["300g raw prawns","150g kale torn","1 tbsp olive oil","2 cloves garlic sliced","1 tsp chilli flakes","Juice of 1 lemon","Salt and pepper","100g rice to serve"],"method":"Preheat oven 200C. Toss kale with half tbsp oil and roast 8-10 minutes until crispy. Fry garlic in remaining oil with chilli flakes 30 seconds. Add prawns, cook until pink 3-4 minutes. Add lemon juice. Serve over rice with crispy kale."},{"id":"dbb0651","name":"Vegan Stuffed Mushrooms","calories":423,"protein":18,"carbs":44,"fats":20,"category":"dinner","time":"35 mins","serves":4,"book":"Book 15","ingredients":["8 large portobello mushrooms","200g cooked quinoa","1 tin 400g black beans drained","1 red pepper diced","2 cloves garlic","1 tsp cumin","1 tsp smoked paprika","80g vegan cheese grated"],"method":"Preheat oven 180C. Remove mushroom stems and chop. Mix quinoa, black beans, pepper, garlic, spices and chopped stems together. Fill mushroom caps with mixture and top with vegan cheese. Bake 20-25 minutes until mushrooms tender and filling heated through."},{"id":"dbb0652","name":"Sticky Date Pudding","calories":227,"protein":4,"carbs":38,"fats":8,"category":"dessert","time":"45 mins","serves":6,"book":"Book 15","ingredients":["200g pitted dates","200ml boiling water","1 tsp bicarb","2 eggs","100g brown sugar","80g butter softened","150g self-raising flour","For sauce: 100g brown sugar, 50g butter, 100ml cream"],"method":"Preheat oven 180C. Soak dates in boiling water with bicarb 5 minutes then blend. Beat butter and sugar, add eggs, fold in flour and date puree. Bake in greased tin 30-35 minutes. Make sauce by heating all ingredients until sugar dissolved. Pour over warm pudding to serve."},{"id":"dbb0653","name":"Protein Brownie Bites","calories":217,"protein":10,"carbs":24,"fats":9,"category":"dessert","time":"25 mins","serves":12,"book":"Book 15","ingredients":["100g dark chocolate","60g butter","2 eggs","100g caster sugar","50g plain flour","30g chocolate protein powder","Pinch of salt"],"method":"Preheat oven 180C. Melt chocolate and butter together. Whisk eggs and sugar, add chocolate mixture. Fold in flour, protein powder and salt. Pour into lined 20cm square tin. Bake 20-22 minutes. Cool and cut into 12 pieces."},{"id":"dbb0654","name":"Matcha Balls","calories":159,"protein":4,"carbs":20,"fats":7,"category":"dessert","time":"15 mins","serves":12,"book":"Book 15","ingredients":["150g cashews","120g medjool dates pitted","2 tsp matcha powder","2 tbsp desiccated coconut","Pinch of salt"],"method":"Process cashews to fine crumbs in food processor. Add dates, matcha, coconut and salt, process until mixture sticks together. Roll into 12 balls, roll in extra matcha or coconut if desired. Refrigerate until firm."},{"id":"dbb0655","name":"Coco Puffs","calories":171,"protein":3,"carbs":22,"fats":8,"category":"dessert","time":"15 mins","serves":10,"book":"Book 15","ingredients":["150g puffed rice cereal","80g dark chocolate melted","2 tbsp peanut butter","1 tbsp honey","Pinch of salt"],"method":"Melt chocolate, peanut butter and honey together until smooth. Stir through puffed rice until well coated. Scoop into 10 portions on lined tray. Refrigerate until set."},{"id":"dbb0656","name":"Peanut Butter Mug Cake","calories":504,"protein":20,"carbs":52,"fats":26,"category":"dessert","time":"5 mins","serves":1,"book":"Book 15","ingredients":["3 tbsp peanut butter","1 egg","2 tbsp honey","3 tbsp flour","1/4 tsp baking powder","1 tbsp milk","Chocolate chips to top"],"method":"Mix all ingredients except chocolate chips together in a large mug until smooth. Scatter chocolate chips on top. Microwave on high 90 seconds. Allow to cool 1 minute before eating."},{"id":"dbb0657","name":"The Greenest Smoothie","calories":187,"protein":8,"carbs":24,"fats":7,"category":"breakfast","time":"5 mins","serves":1,"book":"Book 17","ingredients":["Large handful spinach","1 frozen banana","1/2 avocado","200ml coconut water","1 scoop vanilla protein powder","Juice of 1/2 lime"],"method":"Blend all ingredients until smooth and creamy. Pour into glass and enjoy immediately."},{"id":"dbb0658","name":"Mexican Corn Hummus Toast","calories":380,"protein":14,"carbs":48,"fats":16,"category":"breakfast","time":"10 mins","serves":2,"book":"Book 17","ingredients":["4 slices sourdough bread","150g hummus","200g sweetcorn","1/4 red onion finely diced","1 red chilli finely diced","Juice of 1 lime","Fresh coriander","1 tbsp olive oil"],"method":"Toast bread. Mix sweetcorn, red onion, chilli, lime juice and olive oil together. Spread hummus generously on toast, top with corn mixture and fresh coriander."},{"id":"dbb0659","name":"Bacon Egg Roll","calories":345,"protein":22,"carbs":28,"fats":17,"category":"breakfast","time":"15 mins","serves":1,"book":"Book 17","ingredients":["3 rashers back bacon","2 eggs","1 large crusty roll","Handful of rocket","1 tbsp sriracha mayo"],"method":"Grill bacon until crispy. Fry eggs to your liking. Halve roll and toast lightly. Spread sriracha mayo on both halves, add rocket, bacon and eggs. Serve immediately."},{"id":"dbb0660","name":"Quinoa Granola","calories":315,"protein":10,"carbs":42,"fats":12,"category":"breakfast","time":"35 mins","serves":8,"book":"Book 17","ingredients":["200g quinoa","100g oats","80g mixed seeds","60g honey","40g coconut oil","1 tsp vanilla","1 tsp cinnamon"],"method":"Preheat oven 160C. Mix quinoa, oats, seeds, honey, coconut oil, vanilla and cinnamon together. Spread on lined baking tray. Bake 25-30 minutes stirring halfway until golden. Cool completely before storing."},{"id":"dbb0661","name":"Smoked Salmon Egg Scramble","calories":483,"protein":38,"carbs":28,"fats":22,"category":"breakfast","time":"10 mins","serves":2,"book":"Book 17","ingredients":["4 eggs","100g smoked salmon","2 slices rye bread","1 tbsp creme fraiche","1 tbsp chives","1 tsp butter"],"method":"Whisk eggs with creme fraiche and chives. Cook in butter over low heat stirring gently until just set. Toast rye bread. Flake smoked salmon through scrambled eggs, serve on toast."},{"id":"dbb0662","name":"Creamy Spinach","calories":263,"protein":8,"carbs":18,"fats":18,"category":"lunch","time":"15 mins","serves":4,"book":"Book 17","ingredients":["500g fresh spinach","200ml single cream","2 cloves garlic finely diced","30g parmesan grated","1 tbsp butter","Salt pepper and nutmeg"],"method":"Wilt spinach in butter. Add garlic and cook 1 minute. Add cream and simmer 4-5 minutes until slightly thickened. Stir in parmesan. Season with salt, pepper and a pinch of nutmeg."},{"id":"dbb0663","name":"Loaded Mashed Potato","calories":409,"protein":14,"carbs":52,"fats":18,"category":"lunch","time":"25 mins","serves":4,"book":"Book 17","ingredients":["1kg white potatoes peeled and cubed","100ml milk","50g butter","100g sour cream","80g cheddar grated","4 spring onions sliced","4 rashers crispy bacon crumbled"],"method":"Boil potatoes until tender, drain. Mash with milk, butter and sour cream until smooth. Season well. Transfer to baking dish, top with cheese. Grill until golden and bubbling. Serve topped with spring onions and crispy bacon."},{"id":"dbb0664","name":"Broccoli Salad","calories":294,"protein":12,"carbs":28,"fats":15,"category":"lunch","time":"15 mins","serves":4,"book":"Book 17","ingredients":["1 large head broccoli cut into florets","80g cheddar diced","80g dried cranberries","60g sunflower seeds","4 rashers crispy bacon crumbled","For dressing: 120g mayonnaise, 2 tbsp apple cider vinegar, 1 tbsp honey, salt and pepper"],"method":"Blanch broccoli 1-2 minutes, rinse in cold water and drain. Combine with cheese, cranberries, sunflower seeds and bacon. Mix all dressing ingredients together. Toss salad with dressing."},{"id":"dbb0665","name":"Edamame and Mint Salad","calories":386,"protein":20,"carbs":42,"fats":16,"category":"lunch","time":"10 mins","serves":2,"book":"Book 17","ingredients":["250g shelled edamame","200g cucumber diced","150g cherry tomatoes halved","Fresh mint leaves","2 tbsp olive oil","Juice of 1 lemon","1 tsp sesame oil","Salt and pepper"],"method":"Blanch edamame 3-4 minutes, drain and cool. Combine with cucumber, tomatoes and mint. Dress with olive oil, lemon juice, sesame oil and season well."},{"id":"dbb0666","name":"BBQ Corn","calories":324,"protein":6,"carbs":54,"fats":11,"category":"lunch","time":"15 mins","serves":4,"book":"Book 17","ingredients":["4 corn cobs husks removed","2 tbsp butter melted","1 tsp smoked paprika","1 tsp garlic powder","Salt and pepper","Fresh coriander","Lime wedges to serve"],"method":"Mix butter, smoked paprika, garlic powder and seasoning together. Brush over corn cobs. Grill or bake at 220C 12-15 minutes turning occasionally until charred and tender. Serve with fresh coriander and lime wedges."},{"id":"dbb0667","name":"Bangkok Bolognese","calories":560,"protein":36,"carbs":62,"fats":18,"category":"dinner","time":"30 mins","serves":4,"book":"Book 17","ingredients":["500g beef mince","400g egg noodles","2 tbsp red curry paste","400ml light coconut milk","2 tbsp fish sauce","1 tbsp brown sugar","4 kaffir lime leaves","Fresh basil and coriander"],"method":"Cook noodles per packet. Brown beef mince, add red curry paste and cook 2 minutes. Add coconut milk, fish sauce, sugar and lime leaves. Simmer 15 minutes. Serve over noodles topped with fresh herbs."},{"id":"dbb0668","name":"Salmon Risotto","calories":451,"protein":36,"carbs":48,"fats":12,"category":"dinner","time":"35 mins","serves":4,"book":"Book 17","ingredients":["300g arborio rice","2 salmon fillets","1L warm fish or vegetable stock","1 onion diced","2 cloves garlic","100ml white wine","50g parmesan","2 tbsp butter","Fresh dill"],"method":"Fry onion and garlic in butter. Add rice, stir to coat. Add wine, cook until absorbed. Add stock ladle by ladle stirring until absorbed each time about 20 minutes. Meanwhile grill salmon 4-5 minutes each side, flake. Stir parmesan through risotto, fold in salmon. Serve with fresh dill."},{"id":"dbb0669","name":"Gingery Chicken Wings","calories":261,"protein":24,"carbs":8,"fats":15,"category":"dinner","time":"55 mins","serves":4,"book":"Book 17","ingredients":["1kg chicken wings","4cm piece ginger grated","4 cloves garlic grated","3 tbsp soy sauce","2 tbsp honey","1 tbsp rice wine vinegar","1 tsp sesame oil"],"method":"Mix ginger, garlic, soy, honey, rice wine vinegar and sesame oil. Coat wings well and marinate 30 minutes. Bake at 200C 40-45 minutes turning halfway until sticky and cooked through."},{"id":"dbb0670","name":"Roast Chicken Fried Rice","calories":432,"protein":32,"carbs":52,"fats":12,"category":"dinner","time":"20 mins","serves":4,"book":"Book 17","ingredients":["500g cooked leftover chicken shredded","400g cooked rice","3 eggs","200g frozen peas","4 spring onions sliced","3 tbsp soy sauce","1 tbsp oyster sauce","1 tsp sesame oil","2 tbsp vegetable oil"],"method":"Heat oil in wok until very hot. Add rice and fry until golden. Push to side, scramble eggs in wok. Mix together. Add chicken, peas and spring onions. Add soy, oyster sauce and sesame oil. Toss everything together until heated through."},{"id":"dbb0671","name":"Rigatoni Bake","calories":543,"protein":32,"carbs":62,"fats":18,"category":"dinner","time":"40 mins","serves":4,"book":"Book 17","ingredients":["400g rigatoni","500g beef mince","400g passata","1 onion diced","2 cloves garlic","1 tsp oregano","100g mozzarella","50g parmesan","Salt and pepper"],"method":"Preheat oven 180C. Cook pasta per packet, drain. Brown beef with onion and garlic, add passata and oregano, simmer 10 minutes. Combine pasta with meat sauce. Transfer to baking dish. Top with mozzarella and parmesan. Bake 20 minutes until golden and bubbling."},{"id":"dbb0672","name":"Cheesy Meatballs","calories":386,"protein":28,"carbs":28,"fats":18,"category":"dinner","time":"35 mins","serves":4,"book":"Book 17","ingredients":["500g beef mince","1 egg","50g breadcrumbs","50g parmesan grated plus extra for topping","2 cloves garlic grated","1 tsp oregano","400g tomato sauce","125g mozzarella torn"],"method":"Preheat oven 200C. Mix mince, egg, breadcrumbs, parmesan, garlic and oregano. Roll into balls. Brown in pan, transfer to baking dish with tomato sauce. Top with mozzarella and extra parmesan. Bake 20-25 minutes until meatballs cooked through and cheese melted."},{"id":"dbb0673","name":"Tex Mex Tofu","calories":370,"protein":22,"carbs":38,"fats":14,"category":"dinner","time":"25 mins","serves":2,"book":"Book 17","ingredients":["400g firm tofu pressed and cubed","1 tin 400g black beans drained","200g sweetcorn","1 red pepper diced","2 tsp fajita seasoning","1 tbsp olive oil","Salsa and sour cream to serve"],"method":"Fry tofu in olive oil until golden. Add peppers and fajita seasoning, cook 2-3 minutes. Add black beans and sweetcorn, heat through. Serve with salsa and sour cream."},{"id":"dbb0674","name":"Hokkien Noodles","calories":327,"protein":14,"carbs":44,"fats":11,"category":"dinner","time":"20 mins","serves":2,"book":"Book 17","ingredients":["200g Hokkien noodles","200g mixed vegetables","2 eggs","3 tbsp oyster sauce","2 tbsp soy sauce","1 tsp sesame oil","2 tbsp vegetable oil","2 cloves garlic grated"],"method":"Cook noodles per packet instructions. Heat oil in wok, add garlic. Add vegetables and stir fry 3-4 minutes. Push to side, scramble eggs. Add noodles, oyster sauce, soy and sesame oil. Toss everything together until heated through."},{"id":"dbb0675","name":"Chicken Meatballs","calories":98,"protein":9,"carbs":5,"fats":4,"category":"snack","time":"25 mins","serves":12,"book":"Book 17","ingredients":["300g chicken mince","1 egg","30g breadcrumbs","2 cloves garlic grated","1 tsp dried mixed herbs","Salt and pepper"],"method":"Preheat oven 180C. Mix all ingredients together. Roll into 12 small balls. Place on lined baking tray. Bake 18-20 minutes until golden and cooked through. Serve as snack or with sauce."},{"id":"dbb0676","name":"Vegetarian Rogan Josh","calories":415,"protein":16,"carbs":52,"fats":17,"category":"dinner","time":"40 mins","serves":4,"book":"Book 17","ingredients":["400g cauliflower florets","400g tin chickpeas drained","400g tin chopped tomatoes","1 onion diced","4 tbsp rogan josh paste","200ml vegetable stock","200g Greek yoghurt"],"method":"Fry onion in oil until soft. Add rogan josh paste and cook 2 minutes. Add cauliflower, chickpeas, tomatoes and stock. Simmer 25-30 minutes until cauliflower tender. Stir in Greek yoghurt. Serve with naan or rice."},{"id":"dbb0677","name":"Red Curry Chicken","calories":413,"protein":38,"carbs":22,"fats":20,"category":"dinner","time":"30 mins","serves":4,"book":"Book 17","ingredients":["600g chicken breast diced","400ml light coconut milk","2 tbsp red curry paste","1 red pepper sliced","150g green beans","1 tbsp fish sauce","1 tbsp brown sugar","Fresh basil"],"method":"Fry curry paste in pan until fragrant. Add chicken, seal on all sides. Add coconut milk, red pepper and green beans. Simmer 15-20 minutes until chicken cooked through and sauce thickened. Add fish sauce and brown sugar. Serve with jasmine rice and fresh basil."},{"id":"dbb0678","name":"Prawn and Black Rice Salad","calories":389,"protein":28,"carbs":44,"fats":10,"category":"dinner","time":"30 mins","serves":4,"book":"Book 17","ingredients":["200g black rice","300g cooked prawns","100g edamame","2 spring onions sliced","1 avocado diced","Juice of 2 limes","2 tbsp soy sauce","1 tsp sesame oil"],"method":"Cook black rice per packet instructions, cool. Combine with prawns, edamame, spring onions and avocado. Mix lime juice, soy and sesame oil for dressing. Toss everything together and serve."},{"id":"dbb0679","name":"Chicken Cobb Salad","calories":426,"protein":42,"carbs":12,"fats":24,"category":"dinner","time":"20 mins","serves":2,"book":"Book 17","ingredients":["300g grilled chicken breast sliced","2 boiled eggs halved","80g crispy bacon bits","1 avocado sliced","150g cherry tomatoes halved","80g blue cheese crumbled","Romaine lettuce","Ranch or blue cheese dressing"],"method":"Arrange romaine lettuce as base. Add chicken, eggs, bacon, avocado, cherry tomatoes and blue cheese in rows or groups. Drizzle with dressing and serve immediately."},{"id":"dbb0680","name":"Salmon Burger","calories":429,"protein":38,"carbs":34,"fats":16,"category":"dinner","time":"20 mins","serves":2,"book":"Book 17","ingredients":["2 salmon fillets","2 burger buns","2 tbsp tartare sauce","Handful lettuce","2 slices tomato","2 tbsp capers","1 tbsp lemon juice","Salt and pepper"],"method":"Season salmon and grill or pan-fry 4-5 minutes each side until cooked through. Toast burger buns. Spread tartare sauce on both halves. Add lettuce, tomato and salmon fillet. Garnish with capers and lemon juice."},{"id":"dbb0681","name":"Quick and Easy Tuna Quiche","calories":306,"protein":22,"carbs":24,"fats":14,"category":"dinner","time":"35 mins","serves":4,"book":"Book 17","ingredients":["4 eggs","200ml single cream","1 tin 185g tuna drained","80g cheddar grated","1 red onion finely diced","1 sheet shortcrust pastry","Salt and pepper"],"method":"Preheat oven 180C. Line quiche dish with pastry and blind bake 10 minutes. Whisk eggs with cream, season. Stir in tuna, onion and half the cheddar. Pour into pastry case. Top with remaining cheese. Bake 25-30 minutes until golden and set."},{"id":"dbb0682","name":"Fruity Muffin","calories":351,"protein":8,"carbs":52,"fats":14,"category":"dessert","time":"25 mins","serves":6,"book":"Book 17","ingredients":["200g self-raising flour","100g caster sugar","2 eggs","100ml milk","80ml sunflower oil","100g mixed berries","1 tsp vanilla"],"method":"Preheat oven 180C. Mix flour and sugar. Whisk eggs, milk, oil and vanilla separately. Combine wet and dry ingredients until just mixed. Fold in berries. Divide between 6 lined muffin holes. Bake 18-20 minutes until risen and golden."},{"id":"dbb0684","name":"Greek Yoghurt Tart with Mango","calories":302,"protein":10,"carbs":42,"fats":11,"category":"dessert","time":"30 mins","serves":6,"book":"Book 17","ingredients":["For base: 150g oats, 50g butter melted, 2 tbsp honey","For filling: 400g Greek yoghurt, 2 tbsp honey, 1 tsp vanilla","1 large mango peeled and sliced"],"method":"Preheat oven 180C. Mix oats, butter and honey for base. Press into lined tart tin. Bake 12-15 minutes until golden. Cool. Mix yoghurt, honey and vanilla, pour into cooled base. Refrigerate 20 minutes. Top with mango slices to serve."},{"id":"dbb0685","name":"Carrot Cake Oatmeal Slice","calories":148,"protein":3,"carbs":24,"fats":5,"category":"dessert","time":"35 mins","serves":12,"book":"Book 17","ingredients":["250g oats","2 large carrots grated","2 eggs","60ml honey","60ml coconut oil","1 tsp cinnamon","1/2 tsp ginger","1/2 tsp nutmeg"],"method":"Preheat oven 180C. Combine all ingredients and mix well. Press into lined 20x30cm baking tin. Bake 25-30 minutes until firm and golden. Cool completely before cutting into 12 slices."},{"id":"dbb0686","name":"Chocolate Banana Bread with Dulce de Leche Cream","calories":485,"protein":12,"carbs":62,"fats":22,"category":"dessert","time":"60 mins","serves":8,"book":"Book 17","ingredients":["3 ripe bananas","2 eggs","80ml coconut oil","200g self-raising flour","50g cocoa powder","100g sugar","For cream: 200ml cream, 4 tbsp dulce de leche"],"method":"Preheat oven 180C. Mash bananas, mix with eggs and coconut oil. Fold in flour, cocoa and sugar. Pour into lined loaf tin. Bake 50-55 minutes. Cool. Whip cream to soft peaks, fold in dulce de leche. Serve slices with cream."},{"id":"dbb0687","name":"Peanut Butter Overnight Oats","calories":303,"protein":12,"carbs":38,"fats":11,"category":"breakfast","time":"Overnight","serves":1,"book":"Book 19","ingredients":["60g rolled oats","200ml oat milk","2 tbsp peanut butter","1 tbsp honey","1 tbsp chia seeds","Pinch of cinnamon","Banana slices to top"],"method":"Combine all ingredients except banana in jar, stir well, refrigerate overnight. Top with banana slices to serve."},{"id":"dbb0688","name":"Chocolate Banana Pancakes","calories":313,"protein":14,"carbs":44,"fats":10,"category":"breakfast","time":"20 mins","serves":2,"book":"Book 19","ingredients":["2 ripe bananas","2 eggs","30g cocoa powder","30g protein powder","1 tsp baking powder","Maple syrup and berries to serve"],"method":"Blend all ingredients until smooth batter. Cook ladlefuls in oiled pan 2 minutes each side until set. Serve with maple syrup and berries."},{"id":"dbb0689","name":"Mexican Breakfast Burritos","calories":202,"protein":12,"carbs":22,"fats":7,"category":"breakfast","time":"15 mins","serves":2,"book":"Book 19","ingredients":["4 eggs","1 tin 200g black beans drained","1 red pepper diced","1/2 red onion diced","2 small flour tortillas","1 tsp cumin","1 tsp paprika","Salsa to serve"],"method":"Fry pepper and onion 4-5 minutes. Add black beans and spices, heat through. Scramble eggs in same pan. Warm tortillas. Divide filling between tortillas, roll up and serve with salsa."},{"id":"dbb0690","name":"Savoury Oatmeal","calories":409,"protein":22,"carbs":48,"fats":15,"category":"breakfast","time":"10 mins","serves":1,"book":"Book 19","ingredients":["60g oats","300ml vegetable stock","2 eggs","50g cheddar grated","2 spring onions sliced","Salt and pepper","Chilli flakes optional"],"method":"Cook oats in vegetable stock stirring until thick. Season well. Fry eggs to your liking. Top oatmeal with fried eggs, cheddar and spring onions. Add chilli flakes if desired."},{"id":"dbb0691","name":"Baked Sweet Potato Fries","calories":78,"protein":2,"carbs":16,"fats":1,"category":"snack","time":"30 mins","serves":2,"book":"Book 19","ingredients":["2 medium sweet potatoes","1 tsp olive oil","1 tsp smoked paprika","Salt and pepper"],"method":"Preheat oven 220C. Cut sweet potatoes into thin fries. Toss with olive oil, paprika, salt and pepper. Spread on lined baking tray in single layer. Bake 25-30 minutes until crispy, turning halfway."},{"id":"dbb0692","name":"Asian Slaw with Sesame and Ginger Dressing","calories":49,"protein":2,"carbs":7,"fats":1,"category":"lunch","time":"15 mins","serves":4,"book":"Book 19","ingredients":["300g red cabbage shredded","2 carrots grated","4 spring onions sliced","For dressing: 2 tbsp rice wine vinegar, 1 tsp sesame oil, 1 tsp ginger grated, 1 tbsp soy sauce, 1 tsp honey"],"method":"Combine cabbage, carrot and spring onions in large bowl. Whisk all dressing ingredients together. Toss salad with dressing just before serving."},{"id":"dbb0693","name":"Mashed Root Vegetables","calories":174,"protein":3,"carbs":32,"fats":5,"category":"lunch","time":"25 mins","serves":4,"book":"Book 19","ingredients":["500g parsnips peeled and cubed","400g carrots peeled and cubed","30g butter","100ml milk","Salt pepper and nutmeg"],"method":"Boil parsnips and carrots in salted water until tender about 15 minutes. Drain well. Mash with butter and milk until smooth and creamy. Season with salt, pepper and a pinch of nutmeg."},{"id":"dbb0694","name":"Egg and Avocado Flatbread","calories":519,"protein":24,"carbs":46,"fats":26,"category":"lunch","time":"15 mins","serves":1,"book":"Book 19","ingredients":["1 large flatbread","1 avocado","2 eggs poached","50g feta crumbled","Cherry tomatoes halved","Chilli flakes","Lemon juice"],"method":"Toast flatbread until crispy. Mash avocado with lemon juice and season. Spread onto flatbread. Top with poached eggs, crumbled feta, cherry tomatoes and chilli flakes."},{"id":"dbb0695","name":"Roasted New Potato Salad with Lentils","calories":371,"protein":14,"carbs":52,"fats":12,"category":"lunch","time":"35 mins","serves":4,"book":"Book 19","ingredients":["600g new potatoes","1 tin 400g puy lentils drained","100g rocket","2 tbsp olive oil","2 tbsp red wine vinegar","1 tsp Dijon mustard","Salt and pepper"],"method":"Preheat oven 200C. Halve potatoes, toss with 1 tbsp oil and season, roast 25-30 minutes. Whisk remaining oil, vinegar and mustard for dressing. Combine warm potatoes and lentils with rocket and dressing. Serve immediately."},{"id":"dbb0696","name":"Cajun Grilled Chicken","calories":492,"protein":48,"carbs":28,"fats":20,"category":"dinner","time":"25 mins","serves":4,"book":"Book 19","ingredients":["600g chicken breast","2 tbsp Cajun seasoning","1 tbsp olive oil","200g sweetcorn","1 red pepper roasted","80g sour cream","Lime wedges"],"method":"Coat chicken in Cajun seasoning and olive oil. Grill 6-8 minutes each side until cooked through. Serve with sweetcorn, roasted red pepper and a dollop of sour cream with lime wedges."},{"id":"dbb0697","name":"15 Minute Chilli","calories":333,"protein":28,"carbs":32,"fats":11,"category":"dinner","time":"15 mins","serves":4,"book":"Book 19","ingredients":["500g beef mince","400g tin kidney beans drained","400g tin chopped tomatoes","1 onion diced","2 tbsp chilli powder","1 tsp cumin","1 tsp garlic powder","Salt and pepper"],"method":"Brown beef with onion in large pan. Add chilli powder, cumin and garlic powder, stir. Add tomatoes and kidney beans. Simmer 10 minutes until thickened. Season and serve with rice or jacket potato."},{"id":"dbb0698","name":"Curried Chicken Bowls","calories":274,"protein":36,"carbs":18,"fats":6,"category":"dinner","time":"30 mins","serves":4,"book":"Book 19","ingredients":["600g chicken breast diced","2 tbsp mild curry powder","400g tin chickpeas drained","200ml low fat yoghurt","1 onion diced","2 cloves garlic","1 tbsp olive oil","Brown rice to serve"],"method":"Fry onion and garlic in oil. Add chicken and curry powder, cook until chicken sealed. Add chickpeas and yoghurt, stir well. Simmer 15 minutes until chicken cooked. Serve over brown rice."},{"id":"dbb0699","name":"BBQ Vegetable Kebabs","calories":362,"protein":8,"carbs":52,"fats":15,"category":"dinner","time":"25 mins","serves":4,"book":"Book 19","ingredients":["1 courgette sliced","1 red pepper cubed","1 yellow pepper cubed","1 red onion cubed","200g cherry tomatoes","1 corn cob cut into chunks","2 tbsp olive oil","1 tbsp BBQ seasoning"],"method":"Toss all vegetables with olive oil and BBQ seasoning. Thread onto skewers alternating vegetables. Grill or barbecue 15-20 minutes turning frequently until charred and tender."},{"id":"dbb0700","name":"Coconut Chickpea Curry","calories":225,"protein":10,"carbs":30,"fats":8,"category":"dinner","time":"25 mins","serves":4,"book":"Book 19","ingredients":["2 tins 400g chickpeas drained","400ml light coconut milk","400g tin chopped tomatoes","1 onion diced","3 cloves garlic","2 tbsp curry powder","1 tsp turmeric"],"method":"Fry onion and garlic until soft. Add curry powder and turmeric, cook 1 minute. Add chickpeas, tomatoes and coconut milk. Simmer 15-20 minutes until sauce thickened. Serve with rice or naan."},{"id":"dbb0701","name":"Thai Green Curry","calories":332,"protein":32,"carbs":22,"fats":14,"category":"dinner","time":"25 mins","serves":4,"book":"Book 19","ingredients":["500g chicken breast diced","400ml light coconut milk","2 tbsp Thai green curry paste","200g green beans","1 courgette sliced","1 tbsp fish sauce","1 tbsp brown sugar","Fresh basil and lime to serve"],"method":"Fry Thai green curry paste in pan until fragrant. Add chicken, seal all sides. Pour in coconut milk, add green beans and courgette. Simmer 15 minutes until chicken cooked. Season with fish sauce and sugar. Serve with jasmine rice, fresh basil and lime wedges."},{"id":"dbb0702","name":"Polenta with Mushrooms and Spinach","calories":491,"protein":16,"carbs":68,"fats":17,"category":"dinner","time":"25 mins","serves":4,"book":"Book 19","ingredients":["300g quick cook polenta","500g mixed mushrooms sliced","200g baby spinach","3 cloves garlic","50g parmesan grated","2 tbsp butter","1 tbsp olive oil","1L vegetable stock","Salt and pepper"],"method":"Cook polenta in stock per packet instructions until thick and creamy. Stir in butter and parmesan. Season. In separate pan, saute mushrooms in olive oil with garlic 5-6 minutes. Add spinach and wilt. Serve polenta topped with mushroom and spinach mixture."},{"id":"dbb0703","name":"Sweetcorn and Sweet Potato Burgers","calories":252,"protein":8,"carbs":42,"fats":7,"category":"dinner","time":"30 mins","serves":4,"book":"Book 19","ingredients":["400g sweet potato cooked and mashed","200g sweetcorn","1 tin 400g chickpeas mashed","2 tbsp plain flour","1 tsp cumin","1 tsp paprika","Salt and pepper","Burger buns and salad to serve"],"method":"Combine sweet potato mash, sweetcorn, chickpeas, flour and spices. Shape into 4 patties. Cook in oiled pan 4-5 minutes each side until golden. Serve in buns with salad."},{"id":"dbb0704","name":"Southwestern Chicken Salad","calories":445,"protein":42,"carbs":32,"fats":16,"category":"dinner","time":"20 mins","serves":2,"book":"Book 19","ingredients":["300g grilled chicken breast sliced","1 tin 400g black beans drained","200g sweetcorn","1 avocado diced","150g cherry tomatoes halved","60g cheddar grated","Romaine lettuce","For dressing: 60ml lime juice, 2 tbsp olive oil, 1 tsp cumin, salt and pepper"],"method":"Arrange lettuce as base. Top with chicken, black beans, sweetcorn, avocado, tomatoes and cheddar. Whisk all dressing ingredients. Drizzle over salad and serve immediately."},{"id":"dbb0705","name":"Butter Bean and Chorizo Stew","calories":491,"protein":28,"carbs":52,"fats":19,"category":"dinner","time":"30 mins","serves":4,"book":"Book 19","ingredients":["2 tins 400g butter beans drained","150g chorizo sliced","400g tin chopped tomatoes","1 onion diced","3 cloves garlic","1 tsp smoked paprika","500ml chicken stock","Fresh parsley"],"method":"Fry chorizo until oils release. Add onion and garlic, cook 5 minutes. Add smoked paprika, tomatoes, butter beans and stock. Simmer 20 minutes until slightly thickened. Season and serve with fresh parsley."},{"id":"dbb0706","name":"Steak Bulgogi Bowls","calories":420,"protein":36,"carbs":36,"fats":14,"category":"dinner","time":"30 mins","serves":2,"book":"Book 19","ingredients":["300g rump steak thinly sliced","For marinade: 4 tbsp soy sauce, 2 tbsp sesame oil, 1 tbsp honey, 3 cloves garlic grated, 2cm ginger grated, 1 tbsp rice wine vinegar","200g brown rice cooked","Cucumber, spring onions and sesame seeds to serve"],"method":"Marinate steak 20 minutes in combined marinade ingredients. Cook steak in very hot pan or griddle 1-2 minutes each side. Serve over rice with cucumber, spring onions and sesame seeds."},{"id":"dbb0707","name":"Chicken Katsu Curry","calories":319,"protein":32,"carbs":32,"fats":8,"category":"dinner","time":"30 mins","serves":4,"book":"Book 19","ingredients":["4 chicken breasts flattened","50g panko breadcrumbs","2 eggs beaten","For curry sauce: 1 onion diced, 2 tbsp mild curry powder, 400ml chicken stock, 1 tbsp honey, 2 tbsp soy sauce, 1 tbsp plain flour"],"method":"Dip chicken in egg then breadcrumbs. Bake at 200C 20-25 minutes until golden. Make sauce by cooking onion until soft, add curry powder and flour, stir, add stock, honey and soy. Simmer 10 minutes. Slice chicken and serve with sauce and rice."},{"id":"dbb0708","name":"Souvlaki Beef Kebabs","calories":287,"protein":32,"carbs":14,"fats":11,"category":"dinner","time":"25 mins","serves":4,"book":"Book 19","ingredients":["600g lean beef cubed","For marinade: 3 tbsp olive oil, juice of 1 lemon, 2 cloves garlic grated, 1 tsp oregano, 1 tsp cumin, salt and pepper","Tzatziki and pitta to serve"],"method":"Mix marinade ingredients. Add beef and marinate 15 minutes. Thread onto skewers. Grill or barbecue 3-4 minutes each side until cooked. Serve with tzatziki and warm pitta bread."},{"id":"dbb0709","name":"Greek Salmon Pita Sandwich","calories":514,"protein":42,"carbs":48,"fats":16,"category":"dinner","time":"15 mins","serves":2,"book":"Book 19","ingredients":["2 salmon fillets","2 wholemeal pita breads","80g tzatziki","1/2 cucumber sliced","100g cherry tomatoes halved","50g feta crumbled","Handful rocket"],"method":"Grill salmon 4-5 minutes each side until cooked through. Warm pittas. Open pittas, spread tzatziki inside, add cucumber, tomatoes, rocket and crumbled feta. Flake in salmon and serve."},{"id":"dbb0710","name":"Veggie Burger","calories":161,"protein":8,"carbs":22,"fats":5,"category":"dinner","time":"20 mins","serves":4,"book":"Book 19","ingredients":["2 tins 400g chickpeas drained and mashed","80g oats","2 cloves garlic grated","1 tsp cumin","1 tsp paprika","Salt and pepper","Burger buns and salad to serve"],"method":"Combine all ingredients and mix well. Shape into 4 patties. Cook in oiled pan 4-5 minutes each side until golden and heated through. Serve in buns with salad, tomato and condiments."},{"id":"dbb0711","name":"Cinnamon Roll Mug Cake","calories":312,"protein":8,"carbs":44,"fats":12,"category":"dessert","time":"5 mins","serves":1,"book":"Book 19","ingredients":["4 tbsp plain flour","3 tbsp sugar","1 tsp baking powder","1/4 tsp cinnamon","3 tbsp milk","2 tbsp butter melted","1 egg","For icing: 2 tbsp cream cheese, 1 tbsp icing sugar, 1 tsp milk"],"method":"Mix flour, sugar, baking powder and cinnamon in large mug. Add milk, butter and egg, stir until smooth. Microwave on high 90 seconds. Mix icing ingredients and drizzle over cooled mug cake."},{"id":"dbb0712","name":"Cherry Vegan Cheesecake","calories":427,"protein":8,"carbs":52,"fats":22,"category":"dessert","time":"4 hrs","serves":8,"book":"Book 19","ingredients":["For base: 200g medjool dates, 150g almonds","For filling: 300g cashews soaked overnight, 200ml full fat coconut cream, 3 tbsp maple syrup, juice of 1 lemon, 1 tsp vanilla","200g fresh or frozen cherries to top"],"method":"Blend dates and almonds to sticky mixture, press into lined 20cm tin. Blend all filling ingredients until smooth. Pour over base. Freeze 4 hours or overnight. Defrost 30 minutes before serving. Top with cherries."},{"id":"dbb0713","name":"French Toast Roll Ups","calories":250,"protein":10,"carbs":32,"fats":10,"category":"dessert","time":"15 mins","serves":4,"book":"Book 19","ingredients":["8 slices white bread crusts removed","100g cream cheese","50g strawberry jam","2 eggs","60ml milk","1 tsp cinnamon","2 tbsp butter","Icing sugar to dust"],"method":"Flatten bread slices with rolling pin. Spread cream cheese and jam on each slice, roll up tightly. Whisk eggs, milk and cinnamon together. Dip roll ups in egg mixture. Fry in butter 2-3 minutes each side until golden. Dust with icing sugar and serve."},{"id":"dbb0714","name":"Snickerdoodle Protein Bites","calories":65,"protein":3,"carbs":8,"fats":2,"category":"dessert","time":"15 mins","serves":15,"book":"Book 19","ingredients":["150g chickpeas drained and rinsed","60g vanilla protein powder","2 tbsp almond butter","2 tbsp maple syrup","1 tsp cinnamon","1 tsp vanilla"],"method":"Blend all ingredients until smooth thick dough forms. Roll into 15 small balls. Coat in extra cinnamon if desired. Refrigerate 30 minutes until firm. Store in airtight container in fridge."},{"id":"dbb0715","name":"Dark Chocolate Peanut Butter Cups","calories":221,"protein":5,"carbs":20,"fats":14,"category":"dessert","time":"30 mins","serves":6,"book":"Book 19","ingredients":["150g dark chocolate","60g peanut butter","2 tbsp icing sugar","1 tsp coconut oil"],"method":"Melt chocolate with coconut oil. Spoon half into 6 mini muffin tin holes or silicone moulds. Freeze 5 minutes. Mix peanut butter and icing sugar. Add a small amount to each chocolate cup. Top with remaining chocolate. Freeze 15 minutes until set. Store in fridge."},{"id":"dbb0716","name":"Hazelnut Shiitake Toast","calories":337,"protein":10,"carbs":40,"fats":16,"category":"breakfast","time":"15 mins","serves":1,"book":"Book 20","ingredients":["150g shiitake mushrooms sliced","2 tbsp hazelnut butter","2 slices sourdough bread","1 clove garlic","1 tbsp olive oil","Fresh thyme","Salt and pepper"],"method":"Fry shiitake mushrooms in olive oil with garlic and thyme 5-6 minutes until tender. Toast sourdough. Spread hazelnut butter on toast, top with mushrooms and season."},{"id":"dbb0717","name":"Salted Caramel Smoothie","calories":683,"protein":22,"carbs":82,"fats":31,"category":"breakfast","time":"5 mins","serves":1,"book":"Book 20","ingredients":["2 frozen bananas","2 tbsp almond butter","1 tbsp caramel sauce","200ml almond milk","1 scoop caramel protein powder","Pinch of sea salt","Ice cubes"],"method":"Blend all ingredients until smooth and creamy. Pour into a tall glass and enjoy immediately."},{"id":"dbb0718","name":"Chili Garlic Leeks and Tomato on Toast","calories":186,"protein":6,"carbs":26,"fats":7,"category":"breakfast","time":"15 mins","serves":2,"book":"Book 20","ingredients":["2 large leeks sliced","3 vine tomatoes halved","2 cloves garlic sliced","1 red chilli deseeded and sliced","1 tbsp olive oil","4 slices sourdough toast"],"method":"Heat olive oil in large pan. Add leeks, garlic and chilli, cook 5-6 minutes until softening. Add tomatoes and cook 3-4 more minutes until starting to break down. Season and serve on toasted sourdough."},{"id":"dbb0719","name":"Turmeric Fried Eggs","calories":336,"protein":22,"carbs":28,"fats":16,"category":"breakfast","time":"10 mins","serves":2,"book":"Book 20","ingredients":["4 eggs","1 tsp turmeric","1 tsp cumin","1 tsp paprika","2 tbsp olive oil","4 slices sourdough toast","Handful fresh coriander"],"method":"Toast bread. Heat olive oil in pan over medium heat. Add spices and sizzle 30 seconds. Crack in eggs and fry to your liking. Serve on toast topped with fresh coriander."},{"id":"dbb0720","name":"Green Beans with Bacon-Balsamic Vinaigrette","calories":87,"protein":5,"carbs":8,"fats":4,"category":"lunch","time":"20 mins","serves":4,"book":"Book 20","ingredients":["400g fine green beans trimmed","4 rashers back bacon finely diced","2 tbsp balsamic vinegar","1 tbsp olive oil","1 shallot finely diced","Salt and pepper"],"method":"Blanch green beans 3-4 minutes until just tender. Drain. Cook bacon in pan until crispy. Add shallot and cook 2 minutes. Add balsamic vinegar and olive oil. Toss beans in bacon-balsamic dressing and season."},{"id":"dbb0721","name":"Rocky Road Smoothie Bowl","calories":279,"protein":14,"carbs":38,"fats":9,"category":"breakfast","time":"5 mins","serves":1,"book":"Book 20","ingredients":["1 frozen banana","150g frozen mixed berries","1 scoop chocolate protein powder","100ml almond milk","Toppings: mini marshmallows, chocolate chips, crushed biscuit, fresh berries"],"method":"Blend banana, berries, protein powder and almond milk until thick. Pour into bowl. Top with mini marshmallows, chocolate chips, crushed biscuit and fresh berries."},{"id":"dbb0722","name":"Garlicky Kale and Pea Saute","calories":85,"protein":5,"carbs":10,"fats":3,"category":"lunch","time":"10 mins","serves":4,"book":"Book 20","ingredients":[" var DAYS=['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
var MEAL_SLOTS=[
  {id:'breakfast',label:'Breakfast'},
  {id:'lunch',label:'Lunch'},
  {id:'dinner',label:'Dinner'},
  {id:'snacks',label:'Snacks'}
];

var plan={Mon:{},Tue:{},Wed:{},Thu:{},Fri:{},Sat:{},Sun:{}};
var currentDay='Mon';
var currentSlot='';
var calFitOn=false;
var activeFilter='all';
var savedTimer=null;
var customRecipes=[];
var editingCustomId=null;
var copyTargetDays=[];

DAYS.forEach(function(d){
  MEAL_SLOTS.forEach(function(s){
    plan[d][s.id]=[];
  });
});

function loadState(){
  try{
    var s=localStorage.getItem('dbb_plan_v3');
    if(s){plan=JSON.parse(s);}
    var c=localStorage.getItem('dbb_custom_v3');
    if(c){customRecipes=JSON.parse(c);}
    var t=localStorage.getItem('dbb_targets_v3');
    if(t){
      var tObj=JSON.parse(t);
      if(tObj.cal)document.getElementById('calorieTarget').value=tObj.cal;
      if(tObj.pro)document.getElementById('proteinTarget').value=tObj.pro;
      if(tObj.carb)document.getElementById('carbTarget').value=tObj.carb;
      if(tObj.fat)document.getElementById('fatTarget').value=tObj.fat;
    }
  }catch(e){}
}
function saveState(){
  localStorage.setItem('dbb_plan_v3',JSON.stringify(plan));
  localStorage.setItem('dbb_custom_v3',JSON.stringify(customRecipes));
  localStorage.setItem('dbb_targets_v3',JSON.stringify({
    cal:document.getElementById('calorieTarget').value,
    pro:document.getElementById('proteinTarget').value,
    carb:document.getElementById('carbTarget').value,
    fat:document.getElementById('fatTarget').value
  }));
  flashSaved();
}
function flashSaved(){
  var btn=document.getElementById('savedIndicator');
  if(!btn)return;
  btn.style.display='inline-flex';
  btn.classList.remove('saved-flash');
  void btn.offsetWidth;
  btn.classList.add('saved-flash');
  if(savedTimer)clearTimeout(savedTimer);
  savedTimer=setTimeout(function(){btn.style.display='none';btn.classList.remove('saved-flash');},1800);
}

function getDayTotals(day){
  var cal=0,pro=0,carb=0,fat=0;
  MEAL_SLOTS.forEach(function(s){
    (plan[day][s.id]||[]).forEach(function(r){
      cal+=r.calories||0;pro+=r.protein||0;carb+=r.carbs||0;fat+=r.fats||0;
    });
  });
  return{cal:cal,pro:pro,carb:carb,fat:fat};
}

function renderNav(){
  var nav=document.getElementById('daysNav');
  nav.innerHTML='';
  DAYS.forEach(function(d){
    var t=getDayTotals(d);
    var btn=document.createElement('button');
    btn.className='day-tab'+(d===currentDay?' active':'');
    var calText=t.cal>0?t.cal+' kcal':'';
    btn.innerHTML=d+'<span class="day-cal">'+calText+'</span>'+(t.cal>0?'<span class="day-dot"></span>':'');
    btn.onclick=(function(day){return function(){currentDay=day;renderAll();}})(d);
    nav.appendChild(btn);
  });
}

function renderAll(){
  renderNav();
  renderSummary();
  renderMeals();
  updateTargetBar();
}

function renderSummary(){
  var t=getDayTotals(currentDay);
  var calT=parseInt(document.getElementById('calorieTarget').value)||2000;
  var proT=parseInt(document.getElementById('proteinTarget').value)||150;
  var remain=calT-t.cal;
  var pct=Math.min(100,Math.round((t.cal/calT)*100));
  var color=remain>=0?(pct<85?'var(--green)':'var(--amber)'):'var(--red)';
  var proRemain=proT-t.pro;
  var proColor=proRemain<=0?'var(--green)':'#60a5fa';
  // Count total meals and servings info
  var totalItems=0;
  MEAL_SLOTS.forEach(function(s){totalItems+=(plan[currentDay][s.id]||[]).length;});
  var servingsNote=totalItems>0?('<div style="font-size:11px;color:var(--text3);margin-top:8px">'+
    '📋 '+totalItems+' item'+(totalItems!==1?'s':'')+' planned today &mdash; '+
    'each recipe listed as 1 serving. Adjust portions as needed.</div>'):'';
  document.getElementById('daySummary').innerHTML=
    '<div class="summary-top">'+
      '<div class="summary-title">'+currentDay+'</div>'+
      '<div style="display:flex;gap:8px;align-items:center">'+
        '<div class="remaining-badge" style="background:'+color+'20;color:'+color+';border:1px solid '+color+'40">'+
          (remain>=0?remain+' kcal left':Math.abs(remain)+' kcal over')+
        '</div>'+
        (proRemain>0?'<div class="remaining-badge" style="background:#60a5fa20;color:#60a5fa;border:1px solid #60a5fa40">'+proRemain+'g protein to go</div>':
          '<div class="remaining-badge" style="background:var(--green)20;color:var(--green);border:1px solid var(--green)40">Protein ✓</div>')+
        (totalItems>0?'<button class="btn btn-ghost btn-sm" onclick="clearDay()" style="font-size:11px;color:var(--red);border-color:var(--red)30">🗑 Clear Day</button>':'')+
      '</div>'+
    '</div>'+
    '<div class="cal-progress-track">'+
      '<div class="cal-progress-bar" style="width:'+pct+'%;background:'+color+'"></div>'+
    '</div>'+
    '<div class="macro-pills">'+
      '<div class="macro-pill cals"><div class="val">'+t.cal+'</div><div class="lbl">Calories</div></div>'+
      '<div class="macro-pill protein"><div class="val">'+t.pro+'g</div><div class="lbl">Protein</div></div>'+
      '<div class="macro-pill carbs"><div class="val">'+t.carb+'g</div><div class="lbl">Carbs</div></div>'+
      '<div class="macro-pill fats"><div class="val">'+t.fat+'g</div><div class="lbl">Fats</div></div>'+
    '</div>'+
    servingsNote;
}

function renderMeals(){
  var grid=document.getElementById('mealsGrid');
  grid.innerHTML='';
  MEAL_SLOTS.forEach(function(slot){
    var items=plan[currentDay][slot.id]||[];
    var card=document.createElement('div');
    card.className='meal-card';
    var header='<div class="meal-card-header"><span class="meal-card-title">'+slot.label+'</span>';
    var slotCal=items.reduce(function(a,r){return a+r.calories;},0);
    if(slotCal>0)header+='<span style="font-size:12px;color:var(--text2)">'+slotCal+' kcal</span>';
    header+='</div>';
    var body='<div class="meal-card-body">';
    if(items.length===0){body+='<div class="empty-state" style="font-size:12px;padding:12px 0">Tap + to add a '+slot.label.toLowerCase()+'</div>';}
    items.forEach(function(r,i){
      var noteHtml=r.note?('<div class="meal-item-note">'+r.note+'</div>'):'';
      body+='<div class="meal-item" data-detail="'+encodeURIComponent(JSON.stringify(r))+'">'+
        '<div class="meal-item-info">'+
          '<div class="meal-item-name">'+r.name+(r.custom?'<span class="custom-badge">Custom</span>':'')+'</div>'+
          '<div class="meal-item-macros">'+r.calories+' kcal &middot; P:'+r.protein+'g C:'+r.carbs+'g F:'+r.fats+'g</div>'+
          noteHtml+
        '</div>'+
        '<div class="meal-item-actions">'+
          '<button class="meal-item-dupe" data-duperec="'+encodeURIComponent(JSON.stringify(r))+'" title="Copy to another slot">⧉</button>'+
          '<button class="meal-item-remove" data-day="'+currentDay+'" data-slot="'+slot.id+'" data-idx="'+i+'">&#x2715;</button>'+
        '</div>'+
      '</div>';
    });
    body+='<button class="add-meal-btn" data-slotid="'+slot.id+'">+ Add '+slot.label+'</button>';
    body+='</div>';
    card.innerHTML=header+body;
    grid.appendChild(card);
  });
}

function updateTargetBar(){
  var t=getDayTotals(currentDay);
  var calT=parseInt(document.getElementById('calorieTarget').value)||2000;
  var proT=parseInt(document.getElementById('proteinTarget').value)||150;
  var carbT=parseInt(document.getElementById('carbTarget').value)||200;
  var fatT=parseInt(document.getElementById('fatTarget').value)||65;
  function bar(val,target,color){
    var pct=Math.min(Math.round(val/target*100),100);
    var c=pct<85?color:pct<100?'var(--amber)':'var(--red)';
    return '<div class="macro-bar-row">'+
      '<div class="macro-bar-label" style="color:'+color+'">'+
        (color==='var(--accent)'?'Calories':color==='#60a5fa'?'Protein':color==='#a78bfa'?'Carbs':'Fats')+
      '</div>'+
      '<div class="macro-bar-track"><div class="macro-bar-fill" style="width:'+pct+'%;background:'+c+'"></div></div>'+
      '<div class="macro-bar-val">'+val+' / '+target+(color==='var(--accent)'?' kcal':'g')+'</div>'+
    '</div>';
  }
  var wrap=document.getElementById('targetBarsWrap');
  if(wrap){
    wrap.innerHTML=
      bar(t.cal,calT,'var(--accent)')+
      bar(t.pro,proT,'#60a5fa')+
      bar(t.carb,carbT,'#a78bfa')+
      bar(t.fat,fatT,'#34d399');
  }
  saveState();
}

function removeMeal(day,slot,idx){
  plan[day][slot].splice(idx,1);
  saveState();
  renderAll();
}
function clearDay(){
  if(!confirm('Clear all meals for '+currentDay+'?'))return;
  MEAL_SLOTS.forEach(function(s){plan[currentDay][s.id]=[];});
  saveState();
  renderAll();
}

var dupeRecipe=null;
function openDupeModal(encoded){
  dupeRecipe=JSON.parse(decodeURIComponent(encoded));
}
function dupeToSlot(slotId){
  if(!dupeRecipe)return;
  if(!plan[currentDay][slotId])plan[currentDay][slotId]=[];
  plan[currentDay][slotId].push(Object.assign({},dupeRecipe));
  dupeRecipe=null;
  saveState();
  renderAll();
}

// PICKER
function openPicker(slot){
  currentSlot=slot;
  document.getElementById('pickerTitle').textContent='Add to '+MEAL_SLOTS.find(function(s){return s.id===slot;}).label;
  activeFilter='all';
  switchPickerTab('dbb');
  document.getElementById('pickerModal').classList.add('open');
  renderPickerFilters();
  renderPickerList();
}
function closePicker(){document.getElementById('pickerModal').classList.remove('open');}

function switchPickerTab(tab){
  document.getElementById('tab-dbb').className='picker-tab'+(tab==='dbb'?' active':'');
  document.getElementById('tab-custom').className='picker-tab'+(tab==='custom'?' active':'');
  document.getElementById('dbbPickerContent').style.display=tab==='dbb'?'block':'none';

function renderPickerFilters(){
  var cats=['all','breakfast','lunch','dinner','snack','dessert'];
  var labels={all:'All',breakfast:'Breakfast',lunch:'Lunch',dinner:'Dinner',snack:'Snacks',dessert:'Dessert'};
  var html='';
  cats.forEach(function(c){
    html+='<button class="filter-chip'+(activeFilter===c?' active':'')+'" data-setfilter="'+c+'">'+labels[c]+'</button>';
  });
  document.getElementById('pickerFilters').innerHTML=html;
}

function setFilter(f){activeFilter=f;renderPickerFilters();renderPickerList();}

function toggleCalFit(){
  calFitOn=!calFitOn;
  document.getElementById('calFitToggle').className='toggle-switch'+(calFitOn?' on':'');
  renderPickerList();
}

function renderPickerList(){
  var q=document.getElementById('pickerSearch').value.toLowerCase();
  var clearBtn=document.getElementById('searchClearBtn');
  if(clearBtn)clearBtn.style.display=q?'block':'none';
  var target=parseInt(document.getElementById('calorieTarget').value)||2000;
  var consumed=getDayTotals(currentDay).cal;
  var remaining=target-consumed;
  var catLabels={breakfast:'Breakfast',lunch:'Lunch',dinner:'Dinner',snack:'Snack',dessert:'Dessert'};
  var filtered=ALL_RECIPES.filter(function(r){
    if(activeFilter!=='all'&&r.category!==activeFilter)return false;
    if(calFitOn&&r.calories>remaining)return false;
    if(q&&r.name.toLowerCase().indexOf(q)===-1&&r.book.toLowerCase().indexOf(q)===-1&&r.category.toLowerCase().indexOf(q)===-1)return false;
    return true;
  });
  filtered.sort(function(a,b){return a.name.localeCompare(b.name);});
  var html='';
  if(filtered.length===0){html='<div class="empty-state">No recipes found. Try a different search or filter.</div>';}
  filtered.forEach(function(r){
    var catBadge=activeFilter==='all'?('<span class="cat-badge cat-'+r.category+'">'+(catLabels[r.category]||r.category)+'</span>'):'';
    var enc=encodeURIComponent(JSON.stringify(r));
    html+='<div class="recipe-row" data-inforec="'+enc+'">'+
      '<div class="recipe-row-left">'+
        '<div class="recipe-row-name">'+r.name+catBadge+'</div>'+
        '<div class="recipe-row-meta">P:'+r.protein+'g &middot; C:'+r.carbs+'g &middot; F:'+r.fats+'g</div>'+
        '<div class="recipe-row-book">'+r.book+(r.time?' &middot; '+r.time:'')+'</div>'+
      '</div>'+
      '<div class="recipe-row-cals">'+r.calories+'<div style="font-size:10px;color:var(--text2)">kcal</div></div>'+
    '</div>';
  });
  var countHtml='<div class="results-count">'+filtered.length+' recipes</div>';
  document.getElementById('pickerList').innerHTML=countHtml+html;
}

function renderCustomPicker(){
  var html='';
  if(customRecipes.length===0){html='<div class="empty-state">No custom recipes yet.<br>Use the + Custom Recipe button to add some.</div>';}
  customRecipes.forEach(function(r){
    html+='<div class="recipe-row">'+
      '<div class="recipe-row-left" data-inforec="'+encodeURIComponent(JSON.stringify(r))+'">'+
        '<div class="recipe-row-name">'+r.name+'<span class="custom-badge">Custom</span></div>'+
        '<div class="recipe-row-meta">P:'+r.protein+'g C:'+r.carbs+'g F:'+r.fats+'g</div>'+
      '</div>'+
      '<div style="display:flex;gap:6px;align-items:center">'+
        '<div class="recipe-row-cals">'+r.calories+'</div>'+
        '<button class="btn btn-ghost btn-sm" data-editcustom="'+r.id+'">Edit</button>'+
        '<button class="btn btn-ghost btn-sm" style="color:var(--red)" data-delcustom="'+r.id+'">Del</button>'+
      '</div>'+
    '</div>';
  });
  document.getElementById('customPickerList').innerHTML=html;
}

// pending recipe waiting for serves confirmation
var pendingRecipe=null;
var pendingServes=1;

function addRecipe(encoded){
  // Open serves modal instead of adding directly
  pendingRecipe=JSON.parse(decodeURIComponent(encoded));
  pendingServes=1;
  openServesModal(pendingRecipe);
}

function openServesModal(r){
  document.getElementById('servesRecipeName').textContent=r.name;
  document.getElementById('servesDisplay').textContent='1';
  document.getElementById('servesNote').value='';
  updateServesMacroPreview(r,1);
  document.getElementById('servesModal').classList.add('open');
}
function closeServesModal(){
  document.getElementById('servesModal').classList.remove('open');
  pendingRecipe=null;
  pendingServes=1;
}
function changeServes(delta){
  pendingServes=Math.max(0.5,Math.round((pendingServes+delta)*2)/2);
  document.getElementById('servesDisplay').textContent=pendingServes;
  if(pendingRecipe)updateServesMacroPreview(pendingRecipe,pendingServes);
}
function updateServesMacroPreview(r,mult){
  var preview=document.getElementById('servesMacroPreview');
  if(!preview)return;
  function pill(val,lbl,col){
    return '<div style="background:var(--surface2);border-radius:8px;padding:8px;text-align:center">'+
      '<div style="font-family:Syne,sans-serif;font-size:16px;font-weight:700;color:'+col+'">'+Math.round(val*mult)+'</div>'+
      '<div style="font-size:10px;color:var(--text3);margin-top:2px">'+lbl+'</div>'+
    '</div>';
  }
  preview.innerHTML=
    pill(r.calories,'kcal','var(--accent)')+
    pill(r.protein,'protein','#60a5fa')+
    pill(r.carbs,'carbs','#a78bfa')+
    pill(r.fats,'fats','#34d399');
}
function confirmAddRecipe(){
  if(!pendingRecipe||!currentSlot)return;
  var r=Object.assign({},pendingRecipe);
  var mult=pendingServes;
  if(mult!==1){
    r.calories=Math.round(r.calories*mult);
    r.protein=Math.round(r.protein*mult);
    r.carbs=Math.round(r.carbs*mult);
    r.fats=Math.round(r.fats*mult);
    r.name=r.name+(mult!==1?' (×'+mult+')':'');
  }
  var note=document.getElementById('servesNote').value.trim();
  if(note)r.note=note;
  if(!plan[currentDay][currentSlot])plan[currentDay][currentSlot]=[];
  plan[currentDay][currentSlot].push(r);
  closeServesModal();
  closePicker();
  saveState();
  renderAll();
}

function addFromDetail(){
  if(!detailRecipeEncoded||!currentSlot)return;
  var r=JSON.parse(decodeURIComponent(detailRecipeEncoded));

// COPY DAY
function openCopyDay(){
  document.getElementById('copySourceLabel').textContent=currentDay;
  copyTargetDays=[];
  var html='';
  DAYS.filter(function(d){return d!==currentDay;}).forEach(function(d){
    html+='<button class="copy-day-btn" id="copyBtn_'+d+'" data-togglecopy="'+d+'">'+d+'</button>';
  });
  document.getElementById('copyDayBtns').innerHTML=html;
  document.getElementById('copyModal').classList.add('open');
}
function closeCopyModal(){document.getElementById('copyModal').classList.remove('open');}
function toggleCopyDay(d){
  var idx=copyTargetDays.indexOf(d);
  if(idx===-1){copyTargetDays.push(d);}else{copyTargetDays.splice(idx,1);}
  DAYS.filter(function(day){return day!==currentDay;}).forEach(function(day){
    var btn=document.getElementById('copyBtn_'+day);
    if(btn)btn.className='copy-day-btn'+(copyTargetDays.indexOf(day)!==-1?' selected':'');
  });
}
function executeCopy(){
  var src=JSON.parse(JSON.stringify(plan[currentDay]));
  copyTargetDays.forEach(function(d){plan[d]=JSON.parse(JSON.stringify(src));});
  closeCopyModal();
  saveState();
  renderAll();
}

// CUSTOM RECIPE
function openAddCustom(){
  editingCustomId=null;
  document.getElementById('customModalTitle').textContent='Add Custom Recipe';
  document.getElementById('customName').value='';
  document.getElementById('customCal').value='';
  document.getElementById('customPro').value='';
  document.getElementById('customCarb').value='';
  document.getElementById('customFat').value='';
  document.getElementById('customIngredients').value='';
  document.getElementById('customMethod').value='';
  document.getElementById('customModal').classList.add('open');
}
function closeCustomModal(){document.getElementById('customModal').classList.remove('open');}
function saveCustomRecipe(){
  var name=document.getElementById('customName').value.trim();
  if(!name){alert('Please enter a recipe name.');return;}
  var r={
    id:'custom_'+Date.now(),
    name:name,
    calories:parseInt(document.getElementById('customCal').value)||0,
    protein:parseInt(document.getElementById('customPro').value)||0,
    carbs:parseInt(document.getElementById('customCarb').value)||0,
    fats:parseInt(document.getElementById('customFat').value)||0,
    category:'custom',
    book:'My Recipes',
    time:'',
    serves:1,
    ingredients:document.getElementById('customIngredients').value.split('\n').filter(function(l){return l.trim();}),
    method:document.getElementById('customMethod').value,
    custom:true
  };
  if(editingCustomId){
    r.id=editingCustomId;
    var idx=customRecipes.findIndex(function(c){return c.id===editingCustomId;});
    if(idx!==-1){
      customRecipes[idx]=r;
      DAYS.forEach(function(d){
        MEAL_SLOTS.forEach(function(s){
          plan[d][s.id]=(plan[d][s.id]||[]).map(function(m){return m.id===editingCustomId?r:m;});
        });
      });
    }
  }else{customRecipes.push(r);}
  closeCustomModal();
  saveState();
  renderAll();
}
function editCustom(id){
  var r=customRecipes.find(function(c){return c.id===id;});
  if(!r)return;
  editingCustomId=id;
  document.getElementById('customModalTitle').textContent='Edit Custom Recipe';
  document.getElementById('customName').value=r.name;
  document.getElementById('customCal').value=r.calories;
  document.getElementById('customPro').value=r.protein;
  document.getElementById('customCarb').value=r.carbs;
  document.getElementById('customFat').value=r.fats;
  document.getElementById('customIngredients').value=Array.isArray(r.ingredients)?r.ingredients.join('\n'):r.ingredients;
  document.getElementById('customMethod').value=r.method||'';
  document.getElementById('customModal').classList.add('open');
}
function deleteCustom(id){
  if(!confirm('Delete this custom recipe?'))return;
  customRecipes=customRecipes.filter(function(c){return c.id!==id;});
  DAYS.forEach(function(d){
    MEAL_SLOTS.forEach(function(s){
      plan[d][s.id]=(plan[d][s.id]||[]).filter(function(m){return m.id!==id;});
    });
  });
  saveState();
  renderAll();
  renderCustomPicker();
}

// ── WEEK VIEW ────────────────────────────────────────────────────────────────
function openWeekView(){
  renderWeekView();
  document.getElementById('weekModal').classList.add('open');
}
function closeWeekModal(){document.getElementById('weekModal').classList.remove('open');}
function renderWeekView(){
  var calT=parseInt(document.getElementById('calorieTarget').value)||2000;
  var proT=parseInt(document.getElementById('proteinTarget').value)||150;
  var carbT=parseInt(document.getElementById('carbTarget').value)||200;
  var fatT=parseInt(document.getElementById('fatTarget').value)||65;
  var weekCal=0,weekPro=0,weekCarb=0,weekFat=0;
  var cards=[];
  DAYS.forEach(function(d){
    var t=getDayTotals(d);
    weekCal+=t.cal;weekPro+=t.pro;weekCarb+=t.carb;weekFat+=t.fat;
    var pct=Math.min(100,Math.round((t.cal/calT)*100));
    var color=t.cal===0?'var(--border)':t.cal<=calT?(pct<85?'var(--green)':'var(--amber)'):'var(--red)';
    var cls='week-day-card'+(d===currentDay?' today':'');
    var html='<div class="'+cls+'" data-weekday="'+d+'">';
    html+='<div class="week-day-name">'+d+'</div>';
    html+='<div class="week-cal">'+(t.cal||'&#x2014;')+'</div>';
    html+='<div class="week-kcal-lbl">kcal</div>';
    html+='<div class="week-macros">P: '+t.pro+'g<br>C: '+t.carb+'g<br>F: '+t.fat+'g</div>';
    html+='<div class="week-bar-track"><div class="week-bar-fill" style="width:'+pct+'%;background:'+color+'"></div></div>';
    html+='</div>';
    cards.push(html);
  });
  var avgCal=Math.round(weekCal/7);
  var summary='<div class="week-summary">';
  summary+='<div class="week-summary-item"><div class="week-summary-val" style="color:var(--accent)">'+weekCal+'</div><div class="week-summary-lbl">Total Calories</div></div>';
  summary+='<div class="week-summary-item"><div class="week-summary-val">'+avgCal+'</div><div class="week-summary-lbl">Avg / Day</div></div>';
  summary+='<div class="week-summary-item"><div class="week-summary-val" style="color:#60a5fa">'+weekPro+'g</div><div class="week-summary-lbl">Total Protein</div></div>';
  summary+='<div class="week-summary-item"><div class="week-summary-val" style="color:#a78bfa">'+weekCarb+'g</div><div class="week-summary-lbl">Total Carbs</div></div>';
  summary+='<div class="week-summary-item"><div class="week-summary-val" style="color:#34d399">'+weekFat+'g</div><div class="week-summary-lbl">Total Fats</div></div>';
  summary+='</div>';
  var note='<p style="font-size:11px;color:var(--text3);margin-top:12px;text-align:center">Tap any day to jump to it &mdash; targets: '+calT+' kcal / '+proT+'g protein / '+carbT+'g carbs / '+fatT+'g fats per day.</p>';
  document.getElementById('weekModalBody').innerHTML='<div class="week-grid">'+cards.join('')+'</div>'+summary+note;
}

document.addEventListener('keydown', function(e){

    closePicker();

    closeCustomModal();
    closeWeekModal();
    closeServesModal();

// ── EVENT DELEGATION (replaces all inline onclick in dynamic HTML) ──────────
document.addEventListener('click', function(e){
  // info button on recipe row (check BEFORE addrec)
  var ib = e.target.closest('[data-inforec]');
  if(ib){
    e.stopPropagation();
    showDetail(ib.dataset.inforec, true);
    return;
  }
  // meal-item click -> showDetail (view only)
  var mi = e.target.closest('.meal-item');
  if(mi && !e.target.closest('.meal-item-actions') && mi.dataset.detail){
    showDetail(mi.dataset.detail, false);
    return;
  }
  // dupe button
  var du = e.target.closest('[data-duperec]');
  if(du){
    e.stopPropagation();
    dupeRecipe=JSON.parse(decodeURIComponent(du.dataset.duperec));
    var slotNames=MEAL_SLOTS.map(function(s,i){return (i+1)+'. '+s.label;}).join('\n');
    var choice=prompt('Copy "'+dupeRecipe.name+'" to which slot?\n\n'+slotNames+'\n\nEnter 1-'+MEAL_SLOTS.length+':');
    var idx=parseInt(choice,10)-1;
    if(idx>=0&&idx<MEAL_SLOTS.length){dupeToSlot(MEAL_SLOTS[idx].id);}
    else{dupeRecipe=null;}
    return;
  }
  // remove button
  var rb = e.target.closest('.meal-item-remove');
  if(rb){
    e.stopPropagation();
    removeMeal(rb.dataset.day, rb.dataset.slot, parseInt(rb.dataset.idx,10));
    return;
  }
  // add meal button
  var ab = e.target.closest('.add-meal-btn');
  if(ab && ab.dataset.slotid){
    openPicker(ab.dataset.slotid);
    return;
  }
  // recipe-row -> addRecipe (opens serves modal)
  var rr = e.target.closest('[data-addrec]');
  if(rr){
    addRecipe(rr.dataset.addrec);
    return;
  }
  // edit custom
  var ec = e.target.closest('[data-editcustom]');
  if(ec){
    editCustom(ec.dataset.editcustom);
    return;
  }
  // delete custom
  var dc = e.target.closest('[data-delcustom]');
  if(dc){
    deleteCustom(dc.dataset.delcustom);
    return;
  }
  // filter chip
  var fc = e.target.closest('[data-setfilter]');
  if(fc){
    setFilter(fc.dataset.setfilter);
    return;
  }
  // copy day toggle
  var ct = e.target.closest('[data-togglecopy]');
  if(ct){
    toggleCopyDay(ct.dataset.togglecopy);
    return;
  }
  // week day card
  var wd = e.target.closest('[data-weekday]');
  if(wd){
    closeWeekModal();
    currentDay=wd.dataset.weekday;
    renderAll();
    return;
  }
});
