 Sweet Potatoes and Smashed Avocado","calories":507,"protein":12,"carbs":72,"fats":19,"category":"dinner","time":"60 mins","serves":2,"book":"Book 25","ingredients":["600g sweet potatoes","2 tsp sunflower seeds","75g frozen garden peas","130g avocado flesh","1 tbsp fresh coriander roughly chopped","5 mint leaves shredded","1 tsp hot pepper sauce","Juice of half a lime","30g light feta crumbled"],"method":"Bake sweet potatoes at 200C 50 minutes. Toast sunflower seeds in oven last 5 minutes. Boil peas 3-4 minutes, drain. Crush avocado with peas, add herbs, hot pepper sauce, salt and lime juice. Cut potatoes down centre, fill with mashed avocado and peas, sprinkle feta and sunflower seeds."},{"id":"dbb0338","name":"Glazed Chicken Legs New Potatoes and Asparagus","calories":496,"protein":33,"carbs":37,"fats":24,"category":"dinner","time":"50 mins","serves":4,"book":"Book 25","ingredients":["3 tbsp wholegrain mustard","1 tbsp olive oil","1 tbsp honey","4 chicken thigh quarters 600g","800g new potatoes","240g asparagus trimmed"],"method":"Preheat oven 200C. Mix mustard, oil and honey with salt and pepper, rub over chicken in roasting tray. Bake skin side up 45 minutes. Boil potatoes in salted water 10 minutes, add asparagus last 2 minutes. Drain. Serve chicken, asparagus and potatoes with pan juices."},{"id":"dbb0339","name":"Roasted Squash Tomato and Goat's Cheese Omelette","calories":327,"protein":22,"carbs":17,"fats":19,"category":"dinner","time":"30 mins","serves":1,"book":"Book 25","ingredients":["125g butternut squash peeled and cut into 1cm cubes","1 tsp olive oil","3 sprigs fresh thyme","8 cherry tomatoes","2 medium eggs","15g soft goat's cheese","25g rocket"],"method":"Preheat oven 220C. Toss squash and tomatoes with 1/2 tsp oil and thyme. Roast 10 minutes. Heat remaining oil in non-stick pan over medium heat. Whisk eggs, add to pan tipping to coat. Cook 2 minutes, add goat's cheese and roasted squash and tomatoes on one side, fold omelette over. Cook 30 more seconds. Slide onto plate with rocket."},{"id":"dbb0340","name":"Mustard Stuffed Chicken with Oven Wedges and Green Beans","calories":561,"protein":51,"carbs":33,"fats":25,"category":"dinner","time":"35 mins","serves":4,"book":"Book 25","ingredients":["600g white potatoes","2 tbsp olive oil","100g mascarpone cheese","50g cheddar cheese grated","2 tsp wholegrain mustard","8 slices parma ham","600g chicken breasts","240g fine trimmed green beans"],"method":"Preheat oven 200C. Parboil potato wedges 8 minutes, drain, toss in oil and seasoning, roast 30 minutes. Mix mascarpone, cheddar and mustard. Cut into each chicken breast to make pocket, stuff with mustard mixture. Wrap each in 2 parma ham slices. Roast 20-25 minutes. Boil green beans 4-6 minutes. Divide everything between four dishes."},{"id":"dbb0341","name":"Beetroot and Feta Spaghetti","calories":434,"protein":17,"carbs":60,"fats":14,"category":"dinner","time":"20 mins","serves":2,"book":"Book 25","ingredients":["150g wholewheat spaghetti","125g pre-packed cooked beetroot","90g tenderstem broccoli chopped","15g pine nuts","1/2 tbsp olive oil","1 garlic clove thinly sliced","1 tsp dried parsley","40g feta cheese crumbled"],"method":"Boil spaghetti in salted water with beetroot juices 8 minutes. Add broccoli, cook 5 more minutes. Drain. Toast pine nuts in dry pan, set aside. Heat oil, add beetroot and garlic, cook 2-3 minutes. Add pasta and broccoli, toss well. Mix in parsley and pine nuts, season. Scatter with feta to serve."},{"id":"dbb0342","name":"Tuna Melt","calories":393,"protein":24,"carbs":27,"fats":21,"category":"dinner","time":"20 mins","serves":4,"book":"Book 25","ingredients":["4 sliced white rolls","2 spring onions sliced","2 red chillies deseeded and chopped","200g 2 cans tuna drained","65g mayonnaise","Dash of Worcestershire sauce","125g mozzarella grated"],"method":"Preheat oven 220C. Reserve some spring onions and chillies for garnish. Mix remaining ingredients except cheese. Add 1/4 tuna mixture to four bun bases on baking tray. Add cheese on top, distribute remaining chillies and spring onion. Bake until cheese melted 10-15 minutes. Add tops and serve."},{"id":"dbb0343","name":"No Bake Protein Bars","calories":241,"protein":13,"carbs":18,"fats":13,"category":"dessert","time":"15 mins","serves":12,"book":"Book 25","ingredients":["125g almond milk","250g chunky peanut butter","100g maple syrup","100g whey protein","150g oats"],"method":"Heat almond milk, peanut butter and maple syrup in saucepan over low heat, stirring until combined and warmed. Remove from heat. Add protein powder and oats, mix very well. Press firmly into greased 8x8 pan. Cool completely, refrigerate 30 minutes before cutting into squares."},{"id":"dbb0344","name":"Flourless Brownies","calories":124,"protein":7,"carbs":15,"fats":4,"category":"dessert","time":"40 mins","serves":6,"book":"Book 25","ingredients":["240g banana ripe","60g apple sauce","60g cocoa powder","30g vanilla or chocolate vegan protein","30g plain chocolate cut into chunks"],"method":"Preheat oven 180C. Mash banana into smooth paste. Add remaining ingredients and mix into thick batter. Spread into lined 9 inch loaf pan. Bake 20 minutes. Cool in pan 10-15 minutes. Lift out, slice into 6 squares."},{"id":"dbb0345","name":"Frozen Yoghurt Berry Bark","calories":100,"protein":5,"carbs":11,"fats":4,"category":"dessert","time":"4 hrs","serves":4,"book":"Book 25","ingredients":["200g full fat plain yogurt","1 tbsp agave nectar","1 tbsp maca powder","150g mixed berries strawberries blueberries raspberries","15g pistachios"],"method":"Line metal baking sheet with baking paper. Mix agave and maca into yoghurt until smooth. Pour onto baking sheet, distribute berries and pistachios on top then freeze at least 4 hours. Remove from freezer, cut or break into shards. Keep frozen."},{"id":"dbb0346","name":"Chocolate Orange Yoghurt Bowl","calories":238,"protein":21,"carbs":34,"fats":2,"category":"dessert","time":"5 mins","serves":4,"book":"Book 25","ingredients":["700g 0% strained greek yoghurt","200g banana flesh frozen","32g cocoa powder","60g honey","2 oranges peeled and segmented"],"method":"Blend 560g yoghurt, bananas, cocoa powder and honey until smooth. Divide between four bowls, top with remaining yoghurt and orange segments."},{"id":"dbb0347","name":"Banana Almond Protein Pancakes","calories":225,"protein":13,"carbs":23,"fats":9,"category":"dessert","time":"15 mins","serves":2,"book":"Book 25","ingredients":["250g banana flesh","30g whey protein","2 large whole eggs","35g ground almonds","2 tbsp maple syrup"],"method":"Blend 200g banana, whey, eggs and ground almonds until smooth fluffy batter. Heat oiled non-stick pan on high then reduce to medium-low. Add 1/6th of batter per pancake, flip when bubbles form. Repeat for 6 pancakes. Serve 3 per plate with remaining banana and 1 tbsp maple syrup each."},{"id":"dbb0348","name":"Ricotta and Blueberry Bagels","calories":423,"protein":20,"carbs":52,"fats":15,"category":"breakfast","time":"15 mins","serves":2,"book":"Book 26","ingredients":["Zest and juice of 1 lemon","200g frozen blueberries","1 tbsp powdered sweetener","2 bagels","250g ricotta"],"method":"Squeeze lemon juice into pan over medium-low heat. Add blueberries and sweetener, cook 4-6 minutes until slightly syrupy. Toast bagels. Whisk half the lemon zest into ricotta and spread onto bagel halves. Add blueberries and finish with leftover zest."},{"id":"dbb0349","name":"Tuna and Boiled Egg Toasts","calories":261,"protein":24,"carbs":21,"fats":9,"category":"breakfast","time":"10 mins","serves":2,"book":"Book 26","ingredients":["2 eggs","2 slices of sourdough","12g flat parsley","100g canned tuna drained","40g half fat creme fraiche","Dash of hot pepper sauce","1/2 tsp dijon mustard","1 tsp lemon juice"],"method":"Boil eggs 6 minutes. Toast bread, finely chop parsley. Heat tuna, creme fraiche, pepper sauce and mustard 2 minutes over medium-low heat until warmed. Add lemon juice and most of parsley. Divide over toast. Peel boiled eggs, halve on top, season. Finish with remaining parsley."},{"id":"dbb0350","name":"Cinnamon and Pear Baked Oats","calories":393,"protein":12,"carbs":66,"fats":9,"category":"breakfast","time":"40 mins","serves":2,"book":"Book 26","ingredients":["Light spray oil","100g oats","1 tsp baking powder","1 medium banana","100g full fat milk","1 large egg","2 tbsp maple syrup","1 tsp ground cinnamon","1 pear peeled halved and cored"],"method":"Preheat oven 180C, spray 18cm round dish. Blend oats and baking powder to flour. Blend banana, milk, egg, 1.5 tbsp maple syrup, cinnamon and pinch of salt. Stir wet into dry, pour into dish. Toss pear with remaining 1/2 tbsp maple syrup, scatter on top. Bake 25 minutes."},{"id":"dbb0351","name":"Overnight Bran","calories":246,"protein":16,"carbs":41,"fats":2,"category":"breakfast","time":"Overnight","serves":1,"book":"Book 26","ingredients":["40g bran flake cereal","150g 0% fat greek style yoghurt","80g frozen raspberries","1 tsp stevia or powdered sweetener"],"method":"Combine all ingredients in a bowl or dish, mixing together very well. Leave to set in the fridge overnight."},{"id":"dbb0352","name":"Cherry Chocolate Smoothie Bowl","calories":380,"protein":23,"carbs":36,"fats":16,"category":"breakfast","time":"10 mins","serves":1,"book":"Book 26","ingredients":["100g frozen cherries","60g frozen banana","20g vegan protein blend","150g unsweetened almond milk","15g peanut butter","10g muesli","5g cocoa nibs","15g cherries"],"method":"Blend frozen cherries, banana, protein and almond milk until very smooth. Pour into bowl. Top with peanut butter, muesli, cacao nibs and fresh cherries."},{"id":"dbb0353","name":"Garlic Bread and Brie","calories":455,"protein":17,"carbs":36,"fats":27,"category":"snack","time":"60 mins","serves":4,"book":"Book 26","ingredients":["270g ciabatta loaf","200g brie cheese","1 tsp garlic paste","45g butter","1/2 tsp chilli flakes","2 tbsp parsley chopped"],"method":"Preheat oven 180C. Mix garlic paste with butter, chilli flakes, salt and parsley. Slice ciabatta in half, spread garlic butter. Place on baking tray with brie cheese. Bake 10-15 minutes until bread is toasted."},{"id":"dbb0354","name":"Salmon Fishcakes","calories":324,"protein":34,"carbs":2,"fats":20,"category":"lunch","time":"20 mins","serves":4,"book":"Book 26","ingredients":["600g skinless salmon fillets cut into chunks","1 tbsp red curry paste","Thumb-size piece fresh root ginger peeled and grated","1 tsp soy sauce","1/2 bunch coriander leaves chopped","1 tbsp olive oil"],"method":"Add salmon, curry paste, ginger, soy sauce and coriander to food processor, pulse until roughly minced. Shape into four burgers. Fry in olive oil over medium heat 4-5 minutes each side until crisp, firm and cooked through."},{"id":"dbb0355","name":"Steamed Cabbage Dumplings with Dipping Sauce","calories":87,"protein":11,"carbs":4,"fats":3,"category":"lunch","time":"20 mins","serves":10,"book":"Book 26","ingredients":["For filling: 450g turkey thigh mince, 4 spring onions thinly sliced, 5 cloves garlic grated, 2 tbsp fresh ginger grated, 1 tbsp gluten-free tamari","1 head savoy cabbage","For dipping sauce: 60g gluten-free tamari, 1 tsp rice vinegar, 1 tsp toasted sesame oil"],"method":"Combine all filling ingredients, refrigerate. Blanch whole cabbage in boiling water 45-60 seconds, remove 2-3 softened leaves, cool in ice water. Repeat until 10 leaves. Dry each leaf. Place filling at base of leaf, fold and roll into dumpling. Steam 15 minutes seam-side down. Whisk dipping sauce ingredients, serve alongside."},{"id":"dbb0356","name":"Alu Gobi","calories":248,"protein":3,"carbs":14,"fats":20,"category":"lunch","time":"30 mins","serves":4,"book":"Book 26","ingredients":["75g olive oil","175g white potato peeled and diced into 1/2 inch pieces","250g cauliflower florets","150g onion finely diced","1 medium tomato finely diced","1/2 tsp green chilli paste","1.5 tsp ginger paste","1.5 tsp garlic paste","1/2 tsp cumin seeds","1/2 tsp turmeric","1/4 tsp chilli powder","2 tbsp fresh coriander","1/2 tsp garam masala"],"method":"Heat oil, add cumin seeds until sizzling. Add onions, cook 3-4 minutes. Add ginger and garlic pastes, cook 1 minute. Add turmeric, chilli powder, tomato and pinch of salt, cook 1 minute. Add potatoes with 120ml water, cover and simmer 8-10 minutes. Add cauliflower with 120ml water, cook covered 10 minutes. Add green chilli paste, garam masala and coriander, cook 1 minute."},{"id":"dbb0357","name":"Tomato Horseradish Toasts","calories":383,"protein":10,"carbs":43,"fats":19,"category":"lunch","time":"25 mins","serves":2,"book":"Book 26","ingredients":["400g cherry tomatoes","2 cloves of garlic sliced","2.5 tbsp olive oil","1/2 tsp dried thyme","Pinch of brown sugar","4 medium slices of wholemeal bread","25g horseradish sauce","25g reduced fat creme fraiche","Handful fresh basil"],"method":"Preheat oven 180C. Toss tomatoes, garlic, oil, thyme and sugar in roasting dish with salt. Roast 25 minutes stirring halfway. Toast bread. Remove tomatoes, gently stir through horseradish and creme fraiche. Pile onto toasts with black pepper and basil."},{"id":"dbb0358","name":"Bacon and Spinach Salad","calories":441,"protein":38,"carbs":7,"fats":29,"category":"dinner","time":"15 mins","serves":2,"book":"Book 26","ingredients":["250g reduced fat plain cottage cheese","250g back bacon chopped","1/2 cos lettuce sliced","225g spinach","1 tbsp apple cider vinegar","1/4 tbsp fresh grated onion","1 tbsp olive oil","1/2 tsp mustard","1/2 tsp sugar"],"method":"Dry fry bacon in non-stick pan until crisp and rendered. Add spinach and sliced lettuce to large bowl, mix and add bacon. Mix olive oil, sugar, onion and mustard. Add vinegar, season and mix once more. Add dressing to salad, toss well and transfer to two bowls. Sprinkle cottage cheese over to serve."},{"id":"dbb0359","name":"Minty Lamb Koftas","calories":523,"protein":50,"carbs":2,"fats":35,"category":"dinner","time":"45 mins","serves":4,"book":"Book 26","ingredients":["1kg lamb mince","1 tsp olive oil","2 tsp sea salt","2 tsp ground cumin","3 tsp coriander seeds crushed","4 garlic cloves crushed","3 tbsp fresh mint chopped","1/4 red onion thinly sliced"],"method":"Soak 8 skewers in water 20 minutes. Mix lamb mince, salt, cumin, coriander seeds, garlic and mint with hands. Shape into 8 sausages, compact. Thread onto skewers, refrigerate 30+ minutes to set. Grill under preheated high grill, brushed with olive oil, 4 minutes each side. Serve garnished with sliced red onion."},{"id":"dbb0360","name":"Mushroom and Prawn Coconut Curry","calories":448,"protein":32,"carbs":17,"fats":28,"category":"dinner","time":"50 mins","serves":2,"book":"Book 26","ingredients":["260g oyster mushrooms","2 tbsp olive oil","1 large onion diced","10g fresh root ginger grated","2 tomatoes roughly chopped","400ml light coconut milk","300g raw prawns","2 tsp curry powder"],"method":"Roughly slice mushrooms. Brown in hot oil 4 minutes. Remove mushrooms. Cook onion 5 minutes in same oil. Add ginger 1 minute, add curry powder and combine. Return mushrooms, add tomatoes with pinch of salt, cook 2 minutes. Add coconut milk, bring to boil, simmer 25 minutes. Add prawns, cook 5 more minutes until pink."},{"id":"dbb0361","name":"Egg Fried Rice and Hot Prawns","calories":480,"protein":36,"carbs":48,"fats":16,"category":"dinner","time":"25 mins","serves":2,"book":"Book 26","ingredients":["1 tbsp olive oil","15g fresh root ginger chopped","2 cloves of garlic chopped","1/2 red chilli deseeded and chopped","2 spring onions sliced","1/2 bok choy finely shredded","250g microwaveable rice packet","1 large egg","1 tsp soy sauce","1 tsp chilli oil","300g raw prawns"],"method":"Heat half tbsp oil, fry ginger, garlic, chilli and spring onions 1 minute. Add bok choy on high heat, stir fry 3-4 minutes. Add rice, heat through. Push to one side, heat remaining oil, scramble egg through. Mix egg through rice with half tsp soy. In separate pan, heat chilli oil and remaining soy, cook prawns 3-4 minutes until pink."},{"id":"dbb0362","name":"Baked Tahini Chicken with Rice","calories":566,"protein":41,"carbs":42,"fats":26,"category":"dinner","time":"45 mins","serves":4,"book":"Book 26","ingredients":["600g boneless skinless chicken thighs","100g tahini stirred","4 cloves garlic finely grated","2 tsp paprika","2 tsp ground cumin","Juice of 1/2 lemon 1/2 cut into wedges","2 tbsp olive oil","200g basmati rice"],"method":"Season chicken. Whisk 2 tbsp tahini with garlic, paprika, cumin, lemon juice and oil. Coat chicken, marinate 1-4 hours. Roast at 200C 30-35 minutes. Whisk remaining tahini with 60-100ml water to double cream consistency. Season. Rinse rice, cook in 400ml water on low heat 10-12 minutes. Rest chicken 5 minutes before serving with tahini sauce and lemon wedges."},{"id":"dbb0363","name":"Salmon Mayonnaise on Wholemeal","calories":426,"protein":27,"carbs":30,"fats":22,"category":"dinner","time":"8 mins","serves":2,"book":"Book 26","ingredients":["180g salmon fillets","1 tsp lemon juice","2 tbsp mayonnaise","1 tsp torn fresh basil","40g rocket","4 medium slices of wholemeal bread"],"method":"Poach salmon in water with lemon juice, salt and pepper at low boil, turn and switch off heat, leave 3 minutes. Remove with slotted spoon, cool. Flake and transfer to bowl with mayonnaise, basil and seasoning. Spread onto bread slices, add generous handful rocket and serve."},{"id":"dbb0364","name":"Weeknight Pasta Arrabiata","calories":427,"protein":18,"carbs":64,"fats":11,"category":"dinner","time":"25 mins","serves":4,"book":"Book 26","ingredients":["2 tbsp olive oil","2 cloves of garlic","2 red chillies deseeded and chopped","1 tbsp tomato puree","2 x 400g cans chopped tomatoes","320g wholewheat pasta","50g vegetarian Parmesan"],"method":"Heat 1 tbsp oil, cook garlic and chilli 2 minutes. Stir in tomato puree, add tomatoes crushing in pan. Season and simmer 20 minutes. Boil pasta in salted water 10-12 minutes, drain. Toss pasta into sauce. Divide among four serving dishes. Drizzle with remaining 1 tbsp oil and scatter with Parmesan."},{"id":"dbb0365","name":"Rolled Turkey with Goat's Cheese and Cranberry","calories":218,"protein":34,"carbs":7,"fats":6,"category":"dinner","time":"50 mins","serves":4,"book":"Book 26","ingredients":["1 tsp olive oil","120g spinach","500g turkey breasts","50g goat's cheese crumbled","1/2 stock cube","200g frozen cranberries","Juice of 1 orange","20g honey"],"method":"Saute spinach in olive oil until wilted. Flatten turkey between clingfilm to 1cm thick. Season, spread goat's cheese leaving 1/2 inch border, add spinach and roll up. Tie with twine. Add reconstituted stock to baking dish, set turkey inside, roast at 200C 40 minutes. Cook cranberries, orange juice and honey 15 minutes until thickened. Rest turkey 6-8 minutes, serve with cranberry sauce."},{"id":"dbb0366","name":"Stir Fried Greens with Honey Soy Salmon","calories":486,"protein":36,"carbs":9,"fats":34,"category":"dinner","time":"30 mins","serves":4,"book":"Book 26","ingredients":["600g salmon","15g honey","20ml soy or tamari","1 tsp powdered ginger","1 clove garlic finely diced","1/4 red chilli sliced","4 tbsp olive oil","350g asparagus cut into 3 inch chunks","250g mangetout","1 clove garlic grated","1 tbsp balsamic vinegar","2 tbsp chopped fresh chives"],"method":"Mix honey, soy, ginger, garlic and chilli, coat salmon in marinade. Marinate 30 minutes minimum. Roast salmon at 200C 12-15 minutes. Stir fry asparagus, grated garlic and mangetout in olive oil with dash of water over medium-high 3 minutes. Remove from heat, add vinegar and chives, season. Divide into 4 and serve."},{"id":"dbb0367","name":"Chicken Nacho Traybake","calories":595,"protein":49,"carbs":66,"fats":15,"category":"dinner","time":"40 mins","serves":2,"book":"Book 26","ingredients":["600g sweet potato cut into 1cm chips","300g chicken breast sliced","1 tbsp olive oil","10g tomato puree","8g balsamic vinegar","1 tsp cumin","1 tsp smoked paprika","1 large clove garlic diced","4 spring onions diced","60g reduced fat cheddar grated"],"method":"Preheat oven 180C. Add sweet potato and chicken to bowl with all ingredients except spring onion and cheese. Season well, rub until coated. Place in deep roasting dish, bake 30 minutes turning halfway. Add spring onion, top with cheddar, return to oven 6-8 minutes until cheese melted."},{"id":"dbb0368","name":"Sweet Potato Beef Chilli","calories":314,"protein":32,"carbs":33,"fats":6,"category":"dinner","time":"60 mins","serves":4,"book":"Book 26","ingredients":["240g red onion diced","120g carrot diced","1 celery stick sliced","1 clove garlic diced","450g 5% lean minced beef","30g tomato puree","1 tbsp Worcestershire sauce","1 tsp chipotle paste","400g can chopped tomatoes","400g can of kidney beans","200g sweet potato peeled and chunked"],"method":"Sweat onion, carrot and celery on low 10 minutes until soft. Add beef and cook through. Add tomato puree, stir and cook few minutes. Add tomatoes, chipotle, Worcestershire, sweet potato and tin of water. Season and bring to boil. Simmer on low 30-40 minutes until sweet potatoes tender, stirring occasionally."},{"id":"dbb0369","name":"Smokey Sweet Potato Pork and White Bean One Pot","calories":382,"protein":32,"carbs":41,"fats":10,"category":"dinner","time":"1 hr","serves":4,"book":"Book 26","ingredients":["450g pork shoulder steaks","450g sweet potato peeled and diced","1 tbsp olive oil","1 leek diced and rinsed","30g garlic paste","250g fresh tomatoes diced","1 tsp sweet smoked paprika","1 tbsp chipotle paste","125g fresh corn","400g can cannellini beans drained"],"method":"Cube pork, roast in 250ml boiling water covered at 200C 60 minutes. Shred. Sweat leek with garlic paste, paprika, chipotle in oil 5-6 minutes. Add sweet potato and tomatoes, cook covered 6-8 minutes. Add hot water to just cover, add corn and beans, simmer 20 minutes until reduced. Blend half the mix to a paste, return to pot with shredded pork, stir through."},{"id":"dbb0370","name":"Tuna Pasta Bake","calories":429,"protein":28,"carbs":41,"fats":17,"category":"dinner","time":"35 mins","serves":4,"book":"Book 26","ingredients":["200g pasta","1 tbsp olive oil","1 onion diced","2 garlic cloves diced","400g can of chopped tomatoes","2 tins tuna in olive oil","1 tsp dried oregano","100g cheddar"],"method":"Cook pasta 8-10 minutes, drain and rinse. Preheat oven 180C. Cook onion in oil 8 minutes until soft. Add garlic 2 more minutes. Add tomatoes with half tin of water, simmer 10 minutes. Drain and stir tuna with oregano into sauce. Add pasta, toss, tip into baking dish. Top with grated cheese, bake 20-25 minutes."},{"id":"dbb0371","name":"Guacamole Chicken Pasta Salad","calories":523,"protein":49,"carbs":48,"fats":15,"category":"dinner","time":"50 mins","serves":4,"book":"Book 26","ingredients":["600g chicken breast","400g can of black beans drained","250g avocado flesh","40g red onion","Juice of 1 lime","1/2 tsp smoked paprika","1/2 tsp cumin","1 clove of garlic grated","150g Greek yoghurt","160g wholegrain pasta","80g rocket","2 medium tomatoes diced"],"method":"Roast chicken in 125ml boiling water covered at 220C 45 minutes. Shred. Mash avocado with diced onion, lime juice, garlic, smoked paprika, cumin and Greek yoghurt. Cook pasta 8-10 minutes, drain and cool. Combine rocket, tomatoes, pasta, black beans, chicken and guacamole in salad bowl. Divide between 4."},{"id":"dbb0372","name":"Paprika Chicken Traybake","calories":557,"protein":20,"carbs":72,"fats":21,"category":"dinner","time":"60 mins","serves":2,"book":"Book 26","ingredients":["60g olive oil","400g chicken breast","4 red bell peppers","1 leek diced and soaked","4 garlic cloves","15g sweet smoked paprika","Pinch of oregano","1 tbsp red wine vinegar","30g honey","1 tbsp sea salt","80g white rice"],"method":"Preheat oven 200C. Chop and dice all ingredients, add to deep roasting tray. Rub together and mix very well. Roast top shelf 50 minutes, mixing halfway. Cook rice in 180ml water with pinch of salt, bring to boil, add lid and turn heat low. Leave until water absorbed. Rest 5 minutes. Serve together."},{"id":"dbb0373","name":"Blueberry Mousse","calories":240,"protein":5,"carbs":10,"fats":20,"category":"dessert","time":"5 mins","serves":6,"book":"Book 26","ingredients":["140g cashews","300g frozen blueberries","115g full fat coconut milk","36g coconut oil","12g maple syrup","1 tsp vanilla extract"],"method":"Place all ingredients except berries into blender and blend 3 minutes until very smooth. Add frozen berries and blitz 1 minute until mixture becomes blueberry mousse. Divide into 6 pots."},{"id":"dbb0374","name":"Chocolate Coated Peanut Butter Bites","calories":151,"protein":4,"carbs":9,"fats":11,"category":"dessert","time":"45 mins","serves":10,"book":"Book 26","ingredients":["140g peanut butter","25g desiccated coconut","30g maple syrup","1/4 tsp vanilla extract","70g plain chocolate chips","1 tsp coconut oil"],"method":"Mix peanut butter, coconut, maple syrup and vanilla until well combined. Divide into 10 portions, roll into balls, freeze or refrigerate 10 minutes. Melt chocolate chips and coconut oil in microwave in 10-15 second intervals. Dip balls in chocolate using toothpick, tap off excess. Refrigerate 30 minutes until set."},{"id":"dbb0375","name":"Protein Cookie Bake","calories":327,"protein":17,"carbs":13,"fats":23,"category":"dessert","time":"20 mins","serves":4,"book":"Book 26","ingredients":["100g ground almonds","60g whey protein vanilla","60g apple sauce","30g coconut oil","30g maple syrup","8g plain chocolate chips"],"method":"Preheat oven 180C. Combine almond flour, whey protein, apple sauce, coconut oil and maple syrup, mix into sticky dough. Mix in chocolate chips. Transfer to small ovenproof dish, flatten into even layer with back of spoon. Bake 15 minutes until top turns golden brown."},{"id":"dbb0376","name":"Vegan Raspberry Almond Brownies","calories":224,"protein":5,"carbs":24,"fats":12,"category":"dessert","time":"60 mins","serves":16,"book":"Book 26","ingredients":["30g milled flaxseed","180g water","120g ground almonds","75g unsweetened cocoa powder","1 tsp baking powder","325g caster sugar","1 tsp vanilla extract","120g almond butter","120g raspberries","40g almonds"],"method":"Mix flaxseed and water, stand 15 minutes. Combine almond flour, cocoa, baking powder and sugar. Mix vanilla, almond butter and flax eggs. Combine wet and dry, fold in half the almonds and half the raspberries. Spoon into lined 23x23cm tin. Top with remaining almonds and raspberries. Bake at 180C 30-35 minutes until middle is slightly wobbly. Cool completely before cutting into 16 pieces."},{"id":"dbb0377","name":"Apricot and Raspberry Tarts","calories":230,"protein":4,"carbs":40,"fats":6,"category":"dessert","time":"45 mins","serves":4,"book":"Book 26","ingredients":["3 sheets 160g filo pastry","2 tbsp butter melted","3 tbsp apricot jam","240g apricots stoned and roughly sliced","85g raspberries","2 tsp caster sugar"],"method":"Preheat oven 200C with baking tray inside. Brush each large sheet of filo with butter, layer together, fold in half to make 6 layers. Fold in edges to make 2cm border, spread apricot jam inside border. Slide onto hot baking tray, bake 5 minutes. Arrange apricots over tart, brush with butter, bake 10 minutes. Scatter raspberries and sugar, bake final 10 minutes until golden."},{"id":"dbb0378","name":"Blackberry and Pear Crumble Bars","calories":275,"protein":3,"carbs":41,"fats":11,"category":"breakfast","time":"50 mins","serves":10,"book":"Book 27","ingredients":["For biscuit: 200g flour, 100g oats, 125g cold butter, 125g sugar, 1 tsp cinnamon, 1 tsp ground ginger, pinch of salt","For filling: 200g blackberries, 2 pears grated, 3 tsp cornflour"],"method":"Preheat oven 180C. Blend all crumble ingredients in blender until combined and chunky. Mix berries, grated pears and cornflour in bowl. Press 2/3 of crumble into lined 20cm square tin, top with berry mixture, layer remaining crumble over top. Bake 40 minutes. Cool and cut."},{"id":"dbb0379","name":"Yoghurt Berry Bake","calories":330,"protein":25,"carbs":35,"fats":10,"category":"breakfast","time":"35 mins","serves":2,"book":"Book 27","ingredients":["4 eggs","250g Greek yoghurt","1 tbsp cornflour","3 tbsp honey","1 tsp vanilla extract","150g frozen berries"],"method":"Preheat oven 160C. Whisk all ingredients except berries together. Lay half the berries at bottom of greased rectangular baking dish (20x15cm), pour over yoghurt mixture. Top with remaining berries. Bake 25-30 minutes until just firm."},{"id":"dbb0380","name":"Red Berry Crumble","calories":294,"protein":6,"carbs":45,"fats":10,"category":"breakfast","time":"30 mins","serves":1,"book":"Book 27","ingredients":["For berries: 150g frozen red berries, 1/2 tbsp maple syrup, juice of 1/2 lemon","For topping: 8g ground almonds, 25g ground oats, 15g maple syrup, 1 tsp coconut oil, 1/2 tsp cinnamon"],"method":"Preheat oven 180C. Combine berry mixture ingredients in ramekin. Mix crumble ingredients together, scatter over berries. Bake 20-25 minutes until golden."},{"id":"dbb0381","name":"Vegan Peanut Butter Smoothie","calories":348,"protein":13,"carbs":38,"fats":16,"category":"breakfast","time":"5 mins","serves":2,"book":"Book 27","ingredients":["2 bananas frozen","90g soya yoghurt","250ml almond milk","24g cacao powder","40g peanut butter","20g maple syrup","1/2 tsp cinnamon"],"method":"Place all of the ingredients into a blender and blend until smooth."},{"id":"dbb0382","name":"Raspberry and Lemon Bars","calories":106,"protein":2,"carbs":20,"fats":2,"category":"breakfast","time":"45 mins","serves":16,"book":"Book 27","ingredients":["For bars: 280g oats half whole half ground, 4 tbsp sweetener, 1 tsp baking powder, 1/4 tsp salt, 80g maple syrup, zest of 2 lemons","For berries: 250g frozen raspberries, juice and zest of 1 lemon, 2 tbsp sweetener, 1.5 tbsp cornflour"],"method":"Preheat oven 180C. Mix ground oats, sweetener, baking powder and salt. Rub in maple syrup and lemon zest. Press 3/4 into lined 8 inch square tin. Mix all raspberry layer ingredients, pour over base. Sprinkle remaining oat mixture on top. Bake 35-40 minutes until golden. Cool before slicing."},{"id":"dbb0383","name":"Tomato Bruschetta Toasts","calories":233,"protein":10,"carbs":37,"fats":5,"category":"lunch","time":"6 mins","serves":2,"book":"Book 27","ingredients":["2 large slices sourdough bread 80g each","60g 0% strained greek yoghurt","2 heirloom tomatoes 80g each sliced","2 tsp olive oil","1 garlic clove halved","1 tsp chives"],"method":"Toast bread until golden. Rub each slice with halved garlic. Top toast with yoghurt, then tomato slices. Add salt and pepper, drizzle olive oil and dress with chives."},{"id":"dbb0384","name":"Spiced Sweet Potatoes with Spinach and Chickpeas","calories":311,"protein":13,"carbs":40,"fats":11,"category":"lunch","time":"50 mins","serves":4,"book":"Book 27","ingredients":["500g sweet potato","150g shallots halved","2 tsp cumin","1 tsp turmeric","1 tsp chilli flakes","2 tsp salt","1 clove garlic finely diced","3 tbsp olive oil","400g can chickpeas drained","225g 0% Greek yoghurt"],"method":"Steam sweet potatoes 15 minutes until tender. Toss with shallots, 1 tsp cumin, garlic, chilli flakes, turmeric, salt and 2 tbsp oil. Roast at 200C 25-30 minutes. Fry chickpeas in 1 tbsp oil 6-7 minutes, add 1 tsp cumin, cook 8 more minutes until crispy. Steam wet spinach with lid on until wilted. Remove potatoes, toss with spinach leaves, add yoghurt to serve."},{"id":"dbb0385","name":"Celeriac and Horseradish Mashed Potatoes","calories":307,"protein":7,"carbs":45,"fats":11,"category":"lunch","time":"25 mins","serves":4,"book":"Book 27","ingredients":["1kg white potatoes","500g celeriac","50g butter","1 tbsp horseradish sauce","100ml 0% milk","3 spring onions"],"method":"Peel and cube potatoes and celeriac, cook in separate pans of boiling salted water 15-20 minutes. Drain and dry. Mash potato with half the butter until no lumps. Blend celeriac with remaining butter until smooth. Mix celeriac into mash with horseradish, milk, seasoning and spring onions. Transfer to serving dish."},{"id":"dbb0386","name":"Salmon Soup","calories":496,"protein":33,"carbs":10,"fats":36,"category":"lunch","time":"45 mins","serves":4,"book":"Book 27","ingredients":["150g onion chopped","150g leek sliced","50g butter","350g swede peeled and diced","200g tomatoes","600g salmon fillets","60g half fat creme fraiche","1 lemon cut into quarters"],"method":"Melt butter in deep saucepan, add onion and leek. Cook partially covered over medium-low heat 20 minutes, stirring regularly. Add swede, cook 10 more minutes. Add 1L water, bring to boil, season. Add chopped tomatoes. When swede is tender, cut salmon into large pieces, lower into soup. Cook 5 minutes until just done. Serve with creme fraiche and lemon wedge."},{"id":"dbb0387","name":"Mediterranean Vegetables","calories":149,"protein":4,"carbs":13,"fats":9,"category":"lunch","time":"20 mins","serves":4,"book":"Book 27","ingredients":["3 tbsp olive oil","4 shallots","1/4 tsp oregano and marjoram","2 red bell peppers sliced","2 yellow bell peppers sliced","120g aubergine","120g courgette","4 tomatoes","2 garlic cloves crushed","4 tbsp parsley"],"method":"Heat 1 tbsp oil in heavy saucepan over medium-low. Add shallots with salt and stir until translucent, add herbs and peppers, cook until soft. Cut tomatoes, aubergine and courgette to same size, add to pan. Simmer 15 minutes on low stirring occasionally. Add garlic and 2 more tbsp oil, cook 5 more minutes. Mix in parsley, season and serve hot."},{"id":"dbb0388","name":"Chicken Traybake and Sweet Potato Mash","calories":497,"protein":42,"carbs":44,"fats":17,"category":"dinner","time":"30 mins","serves":2,"book":"Book 27","ingredients":["2 courgettes cut into 1cm thick slices","1 red onion cut into wedges","3 cloves garlic 2 sliced and 1 crushed","50g light cream cheese","40g red pesto","320g chicken thighs skinless and boneless","1/2 tbsp olive oil","300g sweet potato peeled and cut into 2cm chunks","1 tsp dried tarragon"],"method":"Preheat oven 220C. Place courgette, onion and sliced garlic in baking tray. Mix cream cheese (minus 1 tsp) with red pesto. Cut open chicken thighs, add pesto mixture inside, roll up and place on tray with vegetables. Drizzle with oil, season. Roast 25 minutes. Boil sweet potatoes 15 minutes, mash with reserved cream cheese, crushed garlic and seasoning. Serve with tray juices."},{"id":"dbb0389","name":"Chicken Parm with Salsa","calories":587,"protein":57,"carbs":29,"fats":27,"category":"dinner","time":"25 mins","serves":2,"book":"Book 27","ingredients":["300g chicken breasts skinless","50g breadcrumbs","40g parmesan finely grated","1 medium egg beaten","1 tbsp butter","1 tbsp olive oil","300g jar of salsa","60g mozzarella"],"method":"Preheat oven 200C. Flatten chicken breasts to 5mm, cut each in half to make four escalopes. Mix breadcrumbs and parmesan. Dip each in beaten egg then breadcrumb mix. Fry in butter and oil 3 minutes each side until golden. Transfer to ovenproof dish. Pour salsa over, scatter torn mozzarella. Bake top of oven 5 minutes until mozzarella melted and sauce bubbling."},{"id":"dbb0390","name":"Pesto Peas on Toast","calories":411,"protein":16,"carbs":26,"fats":27,"category":"dinner","time":"10 mins","serves":2,"book":"Book 27","ingredients":["2 medium slices white bread","2 eggs","2 tsp olive oil","180g frozen peas","40g green pesto","2 tbsp butter","Pinch of chilli flakes"],"method":"Cook peas in boiling salted water 3-4 minutes. Toast bread, fry eggs in olive oil over medium-high 3-4 minutes. Drain peas, add pesto and stir through. Crush lightly with back of spoon. Spread toast with butter, add crushed peas on top and finally the egg. Scatter chilli flakes and serve."},{"id":"dbb0391","name":"Pistachio Crusted Salmon","calories":432,"protein":36,"carbs":9,"fats":28,"category":"dinner","time":"20 mins","serves":4,"book":"Book 27","ingredients":["600g salmon skinless","2 tbsp Dijon mustard","2 cloves garlic grated","2 tbsp olive oil","1/2 tsp chilli flakes","Juice and zest of one lemon","2 tbsp honey","50g pistachios roughly chopped"],"method":"Preheat oven 200C. Mix pistachios with salt and pepper. Combine mustard, olive oil, chilli flakes, juice of half lemon and zest, 1 tbsp honey and garlic, pour evenly over salmon. Top with pistachios. Bake 15 minutes. Sprinkle with remaining lemon juice and zest, drizzle remaining 1 tbsp honey."},{"id":"dbb0392","name":"Cheese and Onion Chicken","calories":545,"protein":51,"carbs":56,"fats":13,"category":"dinner","time":"40 mins","serves":2,"book":"Book 27","ingredients":["450g white potato","1 head of broccoli","30g cheddar cheese","40g caramelised onion chutney","300g chicken breast","2 cloves garlic","1 tsp olive oil","1 tsp butter"],"method":"Preheat oven 200C. Boil potato chunks and garlic 15 minutes until tender. Flatten chicken with rolling pin to even 2cm thickness. Fry in olive oil 5-7 minutes until golden each side. Add to roasting tray, top with onion chutney and cheese. Roast 8 minutes. Stir fry broccoli in same pan 4-5 minutes, steam with water 3-4 minutes. Mash potatoes with butter. Serve with chicken, broccoli and tray juices."},{"id":"dbb0393","name":"Chickpea and Wholewheat Spaghetti Soup","calories":384,"protein":18,"carbs":42,"fats":16,"category":"dinner","time":"45 mins","serves":4,"book":"Book 27","ingredients":["2 tbsp olive oil","50g salami","200g frozen carrot celery onion mix","1 tbsp tomato puree","1 large pinch chilli flake","2 sprigs rosemary","800g canned chickpeas including water","2 stock pots reconstituted in 2 pints water","100g wholewheat spaghetti","200g kale"],"method":"Fry salami in oil on low-medium heat 2 minutes until crisp. Remove. Add frozen vegetables, cook 10-15 minutes until soft and golden. Stir in tomato puree, chilli and rosemary 30 seconds. Add chickpeas with water and stock, season and simmer 15 minutes. Crush with potato masher, add spaghetti and kale. Simmer 10-15 minutes until tender. Serve with cooked salami."},{"id":"dbb0394","name":"Chunky Cottage Casserole","calories":475,"protein":42,"carbs":61,"fats":7,"category":"dinner","time":"35 mins","serves":2,"book":"Book 27","ingredients":["300g 5% beef mince","1 medium onion sliced into wedges","1 carrot peeled and cut into 1 inch chunks","1 tsp dried oregano","1 stock cube","15ml Worcestershire sauce","30g tomato puree","200g passata","3 medium potatoes cut into 1 inch chunks"],"method":"Preheat oven 220C. Heat oven-proof casserole dish over high heat. Add beef mince in large chunks, cook 1-2 minutes until lightly browned. Add onion, carrot, oregano and tomato paste, stir well. Add 300ml boiled water, stock cube, passata and Worcestershire, season. Bring to boil, add potatoes. Add lid, bake 20 minutes. Remove lid, return to oven 10 more minutes to thicken sauce."},{"id":"dbb0395","name":"Cajun Chicken and Sweetcorn Casserole","calories":590,"protein":56,"carbs":51,"fats":18,"category":"dinner","time":"25 mins","serves":2,"book":"Book 27","ingredients":["320g chicken thighs skinless and boneless","2 cloves garlic grated","1 tsp smoked paprika","1 tsp cumin","1 tsp ground coriander","1/2 tsp chilli powder","1 tsp dried oregano","1 tbsp olive oil","80g green beans trimmed","50g light cream cheese","150g tinned sweetcorn","400g tin cannellini beans","1 stock cube","1 tbsp flour","1 tsp sugar"],"method":"Mix paprika, chilli powder, coriander, oregano, cumin with pinch of sugar, salt and pepper. Coat chicken in spice mix. Fry in olive oil 3 minutes each side. Add green beans. Reconstitute stock cube in 230ml boiling water with cream cheese and garlic to make creamy stock. Add flour to pan, stir, add creamy stock. Drain and add sweetcorn and beans. Cook covered, stirring occasionally 12 minutes until chicken cooked through."},{"id":"dbb0396","name":"Veggie Packed Pollo Verde Rice","calories":450,"protein":37,"carbs":53,"fats":10,"category":"dinner","time":"45 mins","serves":4,"book":"Book 27","ingredients":["1.5 tbsp olive oil","540g chicken thighs skinless and boneless","2 red onions 1.5 roughly chopped and 0.5 thinly sliced","2 jalapenos 1 roughly chopped and 1 thinly sliced","4 cloves garlic","100g fresh coriander roughly chopped","200g paella rice","1 chicken stock cube reconstituted in 500ml water","250g frozen sweetcorn","1 red pepper finely chopped","2 limes"],"method":"Brown chicken in half tbsp oil 5 minutes. Blend roughly chopped onion, jalapeno, garlic, most of coriander and remaining 1 tbsp oil into paste. Add paste to pan, cook 5 minutes. Return chicken with rice, stock and 500ml water. Simmer 20 minutes. Add sweetcorn and pepper, cook 5 more minutes. Stir in lime zest and juice. Serve topped with sliced onion, jalapeno, reserved coriander and lime wedges."},{"id":"dbb0397","name":"Steak and Ginger Stir Fry with Broccoli and Sugar Snaps","calories":529,"protein":37,"carbs":66,"fats":13,"category":"dinner","time":"25 mins","serves":2,"book":"Book 27","ingredients":["1 tbsp fresh ginger grated","1 tbsp honey","1 tbsp rice vinegar","2 tbsp soy sauce","1/2 tbsp cornflour","200g rump steak fat trimmed","300g broccoli cut into bite-sized pieces","200g trimmed sugar snaps","250g microwave pouch rice","1 tbsp sesame oil"],"method":"Mix ginger, honey, vinegar, soy and cornflour until smooth. Thinly slice beef, add to mixture, toss to coat, marinate 15 minutes. Cook broccoli in boiling water 4 minutes, add sugar snaps last 1 minute. Microwave rice. Heat sesame oil in pan or wok over high heat. Add steak, fry 1-2 minutes until browned. Add remaining marinade and 4 tbsp water stirring vigorously. Serve over hot rice and vegetables."},{"id":"dbb0398","name":"Salmon and Roasted Pepper Pasta","calories":590,"protein":40,"carbs":67,"fats":18,"category":"dinner","time":"25 mins","serves":2,"book":"Book 27","ingredients":["180g red peppers","150g wholegrain spaghetti","300g passata","3 spring onions","50g black olives from brine sliced","1/2 tbsp capers drained","Pinch chilli flakes","170g pre-cooked salmon fillets","20g parmesan"],"method":"Grill peppers under high heat 10 minutes, turning halfway. Cook pasta 10-12 minutes. Heat passata, onions, olives and capers over low heat. Remove and skin peppers, chop roughly, add to sauce and simmer. Add cooked pasta to sauce then salmon in large flakes without skin. Mix together adding pasta water a splash at a time. Divide between two dishes and serve."},{"id":"dbb0399","name":"Veg Filled Pasta Bake","calories":671,"protein":48,"carbs":68,"fats":23,"category":"dinner","time":"25 mins","serves":2,"book":"Book 27","ingredients":["1 tbsp olive oil","1 courgette quartered","220g chicken thighs boneless and skinless sliced","2 cloves garlic grated","125g cherry tomatoes halved","1 tbsp tomato paste","200g passata","15g balsamic vinegar","1 vegetable stock cube","1 tsp dried basil","150g spaghetti","35g parmesan","40g cheddar","1 tsp sugar"],"method":"Preheat oven 220C. Boil spaghetti 8-12 minutes, drain. Cook chicken and courgette in oil 4 minutes. Mix stock, basil, balsamic, tomato paste and sugar in 100ml water. Add garlic 30 seconds, add stock mixture, tomatoes and passata, bring to boil 3-4 minutes. Add pasta to sauce, mix. Layer half in ovenproof dish, top with cheddar, add remaining pasta then parmesan. Bake 5-10 minutes."},{"id":"dbb0400","name":"Pesto Baked Gnocchi","calories":501,"protein":15,"carbs":45,"fats":29,"category":"dinner","time":"55 mins","serves":4,"book":"Book 27","ingredients":["100g spinach","500g gnocchi","90g frozen peas","150g pesto","65g sundried tomatoes","125g mozzarella","1 tbsp olive oil"],"method":"Preheat oven 200C. Boil kettle. Wilt spinach by covering with boiling water, drain. Add gnocchi, peas, pesto and 150ml of water to bowl with spinach. Mix with seasoning, add to roasting dish. Top with tomatoes and mozzarella, dress with olive oil. Bake 45 minutes until golden and bubbling."},{"id":"dbb0401","name":"Egg Ricotta Chickpea and Pine Nut Salad","calories":396,"protein":23,"carbs":13,"fats":28,"category":"dinner","time":"20 mins","serves":4,"book":"Book 27","ingredients":["4 eggs","30g pine nuts","400g ricotta","15g basil roughly torn","160g mixed salad leaves","2 heads chicory","2 tbsp red wine vinegar","2 tbsp olive oil","400g can of chickpeas drained","1/2 tsp paprika"],"method":"Boil eggs 6 minutes, cool and peel. Toast pine nuts in dry pan. Dry drained chickpeas on kitchen towel. Mix ricotta with torn basil and seasoning. Arrange salad leaves and torn chicory on plates. Whisk vinegar and oil, dress each portion. Add chickpeas and toss. Spoon mounds of ricotta over salad, slice and add one egg to each serving, sprinkle with paprika and basil."},{"id":"dbb0402","name":"Kale Pasta in a Cream Sauce","calories":546,"protein":18,"carbs":60,"fats":26,"category":"dinner","time":"25 mins","serves":4,"book":"Book 27","ingredients":["300g fusilli pasta","2 tbsp olive oil","30g butter","2 cloves garlic finely chopped","1 red chilli finely chopped","250g chopped kale","250g ricotta","1 lemon zest and juice","30g pine nuts"],"method":"Cook pasta in boiling water 10-12 minutes. Heat oil and butter, melt butter, add garlic and chilli cooking few seconds. Add kale with 2 tbsp water, cover and cook 5 minutes. Drain pasta, transfer to kale pan, reserving cooking water. Add ricotta, lemon zest, juice and seasoning. Stir well, adding pasta water until coated in sauce. Sprinkle with pine nuts."},{"id":"dbb0403","name":"Almond Millionaire's Shortbread","calories":352,"protein":11,"carbs":14,"fats":28,"category":"dessert","time":"40 mins","serves":10,"book":"Book 27","ingredients":["200g ground almonds","200g almond butter","2 tbsp honey","100g ready-made caramel","100g 85% dark chocolate"],"method":"Mix almonds, almond butter and honey with fingers until combined. Press firmly into bottom of loaf tin, smooth surface. Spoon caramel sauce over in thin layer, freeze. Melt dark chocolate in microwave in 15-second blasts. Remove from freezer, drizzle chocolate over to coat. Set in fridge 30 minutes. Cut into 10."},{"id":"dbb0404","name":"Blueberry Chocolate Bark","calories":143,"protein":2,"carbs":9,"fats":11,"category":"dessert","time":"70 mins","serves":6,"book":"Book 27","ingredients":["120g dark chocolate chips","3g coconut oil","300g blueberries","Pinch of flaky salt"],"method":"Melt chocolate chips and coconut oil in microwave in short 15-second bursts, stirring at each interval. Add blueberries and coat in chocolate. Spread mixture evenly onto baking parchment, add pinch of sea salt, freeze 1 hour. Break into chunks and store covered in freezer."},{"id":"dbb0405","name":"Cooked Berries with Yoghurt and Jelly","calories":275,"protein":36,"carbs":26,"fats":3,"category":"dessert","time":"6 mins","serves":1,"book":"Book 27","ingredients":["300g 0% Greek yoghurt","15g whey protein","150g frozen berries","1 zero calorie jelly pot"],"method":"Add whey to Greek yoghurt, mix well. Microwave berries 1-2 minutes until defrosted and broken down. Add berries and jelly with yoghurt mixture and combine."},{"id":"dbb0406","name":"Dairy Free Ice Cream","calories":295,"protein":5,"carbs":17,"fats":23,"category":"dessert","time":"Up to 6 hrs","serves":4,"book":"Book 27","ingredients":["400g full fat coconut milk","40g maple syrup","1 tsp vanilla extract","30g peanut butter","25g oats","25g cocoa powder"],"method":"Blend all ingredients in a blender until smooth consistency. Pour into parchment lined dish and freeze up to 6 hours. Thaw slightly to soften, then serve."},{"id":"dbb0407","name":"Toffee Apple Rice Pudding","calories":274,"protein":11,"carbs":53,"fats":2,"category":"dessert","time":"35 mins","serves":4,"book":"Book 27","ingredients":["150g pudding rice","850ml skimmed milk","160g 0% toffee yogurt","1 tbsp granulated sweetener","1 red apple cored and thinly sliced"],"method":"Place rice and milk in non-stick saucepan over high heat, bring to boil, reduce to low and simmer 25 minutes, stirring occasionally. Remove from heat, stir in yoghurt and sweetener. Divide between dessert glasses or bowls. Add apple slices on top and serve."},{"id":"dbb0408","name":"Banana Bread","calories":264,"protein":8,"carbs":40,"fats":8,"category":"breakfast","time":"45 mins","serves":8,"book":"Book 21","ingredients":["3 medium bananas well ripened","125g plain white flour","125g spelt flour","95g ground oats","500ml soya milk","50g walnuts roughly chopped","1 tsp baking soda","1/2 tsp cinnamon"],"method":"Preheat oven 200C. Mash banana, mix with all ingredients except walnuts in large mixing bowl. Add big pinch of sea salt and mix. Line 22cm bread tin with parchment paper, pour in batter, add walnuts on top. Bake 35-40 minutes. Allow to fully cool before slicing."},{"id":"dbb0409","name":"Chickpea Protein Breakfast Bars","calories":189,"protein":6,"carbs":21,"fats":9,"category":"breakfast","time":"45 mins","serves":20,"book":"Book 21","ingredients":["200g oats","125g almonds roughly chopped","75g raisins chopped","75g dried apricots chopped","3 tbsp ground flaxseed","125g almond milk","400g can of chickpeas rinsed and drained","120g peanut butter","110g dates pitted","60g honey","1 tsp ground cinnamon"],"method":"Preheat oven 180C. Toast oats and nuts 6-8 minutes. Pulse oat and nuts until coarsely chopped, transfer to large bowl, add dried fruit. Combine flaxseed meal and warm milk in small bowl. Process chickpeas, peanut butter, dates, honey, cinnamon and flaxseed mix until smooth. Add chickpea mixture to oats mixture, mix, transfer to lined pan. Spread evenly. Bake 15-18 minutes until edges golden. Cool completely, cut into 20 bars."},{"id":"dbb0410","name":"Salted Caramel Oats","calories":556,"protein":32,"carbs":53,"fats":24,"category":"breakfast","time":"30 mins","serves":1,"book":"Book 21","ingredients":["45g oats","20g whey protein chocolate flavoured","1/2 tsp maca powder","250ml almond milk","20g 70% dark chocolate","1 tsp coconut oil","1 tbsp crushed peanuts"],"method":"Mix oats, protein, maca and almond milk in a jar and leave to set. Melt chocolate and coconut oil in microwave in 10 second blasts until fully melted. Add peanuts on top of the oats, top with chocolate mixture. Allow to fully cool until top has set. Refrigerate 30 minutes or ideally overnight."},{"id":"dbb0411","name":"Ham and Swiss Cheese Baked Eggs","calories":342,"protein":34,"carbs":2,"fats":22,"category":"breakfast","time":"20 mins","serves":2,"book":"Book 21","ingredients":["10g butter","20g onion diced","4 eggs","4 egg whites","60g sliced ham","60g swiss cheese grated","60g asparagus trimmed and diced","1 tsp American mustard"],"method":"Preheat grill to high. Melt butter, add onion and asparagus, cook 5 minutes. Add ham. Whisk eggs, salt, pepper and half the cheese, add to pan. Cook stirring constantly until eggs form soft curds about 5 minutes. Remove from heat. Sprinkle remaining cheese over top. Place under grill until cheese bubbly and golden, about 3 minutes. Slide onto serving platter and cut into two."},{"id":"dbb0412","name":"Cheeseburger Omelette","calories":407,"protein":40,"carbs":10,"fats":23,"category":"lunch","time":"20 mins","serves":2,"book":"Book 21","ingredients":["3 medium eggs","2 tsp butter","1.5 red peppers deseeded and sliced","1 small red onion sliced","120g mushrooms sliced","200g 5% beef mince","40g cheddar grated"],"method":"Whisk eggs in bowl. Fry vegetables in 1 tsp butter until soft and golden, remove and set aside. Flatten beef mince into two burger patties, cook in hot pan 2 minutes each side until firm to touch. Add cheese slices, let melt. Heat 1 tsp butter in vegetable pan over medium-low, add beaten eggs and cook 3-4 minutes pushing sides to middle. Place cheeseburgers and cooked veg inside omelette in pan, fold over the top."},{"id":"dbb0413","name":"Baked Tortilla Chips","calories":112,"protein":3,"carbs":16,"fats":4,"category":"snack","time":"10 mins","serves":4,"book":"Book 21","ingredients":["3 soft white tortilla wraps","Light spray oil","2 tsp cumin","1 tsp smoked paprika","1 tsp celery salt"],"method":"Preheat oven 180C. Spray oil on both sides of each tortilla and cut into 8 triangles. Lay evenly onto baking trays. Mix spices together and sprinkle over the tortillas. Roast 6-7 minutes until crispy and golden."},{"id":"dbb0414","name":"Parmesan Courgette Stacks","calories":46,"protein":2,"carbs":1,"fats":4,"category":"snack","time":"25 mins","serves":12,"book":"Book 21","ingredients":["2 courgettes sliced into discs","1 tsp dried oregano","1 tbsp smoked paprika","60g vegetarian Parmesan","2 tbsp olive oil"],"method":"Preheat oven 220C. Slice courgette into 0.5cm thick rounds. Add to mixing bowl along with oregano, smoked paprika, black pepper, Parmesan and olive oil, make sure slices are coated well on both sides. Stack slices on top of each other in groups of 6. Add each stack to individual section of muffin tray and roast 18-20 minutes until golden and caramelised."},{"id":"dbb0415","name":"Spiced Almond Butter Popcorn","calories":149,"protein":5,"carbs":12,"fats":9,"category":"snack","time":"15 mins","serves":4,"book":"Book 21","ingredients":["1 tbsp sunflower oil","100g popcorn maize","1 tsp sweet smoked paprika","1 tsp cumin","30g crunchy almond butter"],"method":"Heat 1/2 tbsp oil in large frying pan over medium-high. Add popcorn maize, cover with lid. Wait for popping and gently shake pan intermittently. When pops are often, remove from heat. Heat second 1/2 tbsp oil with cumin, paprika and pinch of salt in another pan until aromatic, add almond butter, stir through. Transfer popcorn to large bowl and coat well with almond butter mix."},{"id":"dbb0416","name":"Roasted Tomatoes with Mozzarella","calories":169,"protein":9,"carbs":4,"fats":13,"category":"lunch","time":"30 mins","serves":6,"book":"Book 21","ingredients":["600g beef tomatoes","1/2 head garlic","2 tbsp plus 2 tsp olive oil","1 tbsp balsamic vinegar","250g mozzarella","Handful of torn basil"],"method":"Preheat oven 200C. Slice any large tomatoes in half, toss with 2 tbsp olive oil, garlic and balsamic vinegar. Spread into roasting tin and season. Roast 25 minutes. Once cooked add to sharing plate and top with torn mozzarella, basil and 2 tsp of olive oil."},{"id":"dbb0417","name":"Beetroot Feta and Quinoa Salad","calories":457,"protein":23,"carbs":44,"fats":21,"category":"dinner","time":"12 mins","serves":2,"book":"Book 21","ingredients":["160g pre-cooked beetroot","1 clove of garlic","30g spring onion","150g Greek yoghurt","10g lime juice","100g quinoa","100g feta","60g red cabbage","40g grated carrot","80g spinach"],"method":"Boil quinoa per packet with pinch of salt. Cut beetroot into chunks, blend with garlic, spring onions, yoghurt and lime juice, season and blitz. Grate or finely slice cabbage, carrot and spinach. In a jar or dish, add beetroot dressing, then quinoa and crumbled feta, then cabbage, carrot and spinach. Combine when ready to eat."},{"id":"dbb0418","name":"Cottage Pie with Root Veg Mash","calories":439,"protein":44,"carbs":23,"fats":19,"category":"dinner","time":"90 mins","serves":4,"book":"Book 21","ingredients":["500g 5% beef mince","50g streaky bacon diced","1 onion diced finely","2 cloves of garlic","60g brussel sprouts grated","1 stock cube","1 tbsp tomato puree","125g sweet potato peeled and diced","250g butternut squash peeled and diced","25g goat butter","4 tbsp milk","1 tsp sage"],"method":"Cook beef, bacon, onion and garlic in deep saucepan 6-8 minutes. Boil sweet potato and butternut 8-12 minutes until tender. Add sprouts, cook 2 minutes, add tomato puree 2 minutes, add reconstituted stock with 1 pint water, simmer 12-15 minutes. Drain and mash sweet potato and butternut with butter, milk and sage. Preheat oven 220C. Pour beef mixture into deep roasting tray, add mash on top, roast 25 minutes."},{"id":"dbb0419","name":"Sriracha Wing Rice Salad","calories":567,"protein":40,"carbs":50,"fats":23,"category":"dinner","time":"70 mins","serves":4,"book":"Book 21","ingredients":["400g chicken wings","80g white rice","40g cabbage sliced","40g carrot grated","40g cucumber diced","40g corn","80g tomatoes diced","50g sriracha hot sauce"],"method":"Trim wings of any excess fat, add to bowl with Sriracha hot sauce. Toss to combine, marinate 30 minutes. Bake at 220C 35 minutes turning halfway. Cook rice in 180ml water with pinch of salt. Finely slice cabbage, grate carrot and dice cucumbers and tomatoes, add all to large bowl with corn kernels. Add wings and rice and toss to combine."},{"id":"dbb0420","name":"Dressed Lentil and Squash Salad with Halloumi","calories":425,"protein":28,"carbs":40,"fats":17,"category":"dinner","time":"40 mins","serves":2,"book":"Book 21","ingredients":["500g butternut squash seeds removed and cut into 1cm slices","28g olive oil","225g light halloumi","25g fresh coriander","25g fresh parsley","10g diced onion","1 clove of garlic","60g pickles","1 tbsp red wine vinegar","200g puy lentils"],"method":"Preheat oven 220C. Roast butternut with 1 tsp olive oil 25 minutes adding halloumi in quarters for last 10 minutes. Rinse lentils, boil in 750ml water 15-20 minutes. Mix salsa verde by crushing coriander, garlic, onion, remaining oil, vinegar and pickles. Spread the lentils, top evenly with squash and halloumi, dress with salsa verde."},{"id":"dbb0421","name":"Garlicky Steak Mince with Pasta","calories":582,"protein":46,"carbs":68,"fats":14,"category":"dinner","time":"20 mins","serves":2,"book":"Book 21","ingredients":["160g wholewheat pasta","300g 5% beef mince","1 tablespoon olive oil","2 cloves garlic minced","1 red onion diced","80g spinach","1/2 teaspoon honey","3 tablespoons soy sauce","1 teaspoon smoked paprika"],"method":"Boil pasta 10 minutes. Add beef, onion and garlic to pan and cook through 4-6 minutes until onion softens. Add honey, soy, paprika, plenty of black pepper and a little pasta water with spinach and stir very well. Cook another 4-6 minutes until any water is reduced and beef fully cooked. Drain pasta and stir into the beef with olive oil. Serve whilst hot."},{"id":"dbb0422","name":"Cheese Stuffed Mexican Meatballs with Coriander Salsa","calories":416,"protein":40,"carbs":10,"fats":24,"category":"dinner","time":"1 hr 20 mins","serves":4,"book":"Book 21","ingredients":["500g 5% beef mince","1 tsp cinnamon","1 tsp cumin","100g mozzarella grated","100g cheddar grated","11g olive oil","1 onion finely chopped","2 garlic cloves finely chopped","2 tsp chipotle paste","400g tin of tomatoes","25g 70% dark chocolate","1 cup coriander diced","1 lime juice","1/4 red onion finely chopped","1 green chilli deseeded and chopped"],"method":"Combine cinnamon, beef, cumin and seasoning. Divide into 4 balls. Squeeze grated cheeses together to make 4 balls. Press beef ball flat, add cheese ball in middle, enclose and mould. Heat oven 200C, cook onion in olive oil 10 minutes, add garlic 1 minute. Add to food processor with tomatoes, chipotle, chocolate and seasoning. Blitz until smooth. Pour into deep roasting tray, add meatballs. Bake 45 minutes. Mix coriander, 1/4 onion, lime juice and green chilli for salsa. Serve meatballs with salsa."},{"id":"dbb0423","name":"Squash Kale and Halloumi Traybake","calories":611,"protein":38,"carbs":36,"fats":35,"category":"dinner","time":"40 mins","serves":1,"book":"Book 21","ingredients":["500g butternut squash diced","2 red onions cut into wedges","2 tablespoons olive oil","1 teaspoon cumin seeds","1 teaspoon hot smoked paprika","2 cloves garlic whole and unpeeled","150g full leaf kale","250g pack light halloumi","1 lemon zest and juice","1 teaspoon capers"],"method":"Preheat oven 220C. Roast butternut and onions with 1 tbsp oil, cumin and paprika 20 minutes until tender. Reduce oven to 200C. Roast garlic and kale in another tin with 1/2 tbsp oil, add halloumi to butternut tin, roast both 15-20 minutes until golden. Remove garlic from skin, mash with fork, add lemon zest, juice, capers and remaining 1/2 tbsp oil. Tip kale into butternut tin, drizzle over dressing and stir together."},{"id":"dbb0424","name":"Chickpea and Sweet Potato Salad","calories":557,"protein":20,"carbs":72,"fats":21,"category":"dinner","time":"40 mins","serves":4,"book":"Book 21","ingredients":["220g tinned drained chickpeas","1.2kg sweet potato cut into 2cm pieces","2 tablespoon olive oil","1 teaspoon sea salt","1 teaspoon cumin seeds","1 red onion cut into 8ths","150g spinach leaves","150g pumpkin seeds","300g low fat plain yoghurt","1 tablespoon tahini","2 garlic cloves minced","1/2 teaspoon ground coriander","3 tablespoon lemon juice"],"method":"Preheat oven 180C. Toss sweet potato, salt and cumin seeds with oil on baking tray. Roast 10 minutes, add red onion wedges and cook 10 more minutes. Allow to cool. Whisk yoghurt, tahini, garlic, ground coriander and lemon juice together for dressing. When sweet potato and onion have cooled, drain and rinse chickpeas, place in bowl with spinach and pumpkin seeds. Gently add dressing and combine."},{"id":"dbb0425","name":"Asparagus Salad with Mozzarella and Cherry Tomatoes","calories":495,"protein":20,"carbs":7,"fats":43,"category":"dinner","time":"15 mins","serves":2,"book":"Book 21","ingredients":["20 asparagus spears trimmed","125ml olive oil","6 garlic cloves sliced","14 cherry tomatoes cut in half","15 black olives from brine drained and sliced","Juice of 2 lemons","1 handful of fresh parsley","2 balls of mozzarella","Pinch of chilli flake","Torn basil leaves"],"method":"Blanch asparagus in boiling water 2 minutes, add to iced water until cold. Remove and place on kitchen towel. Place pan on medium heat with olive oil, add garlic until fragrant and slightly golden. Add cherry tomatoes, olives, lemon juice and parsley and cook 30 seconds. Add asparagus and cook 30 seconds. Arrange asparagus salad on plates, season. Top with roughly torn mozzarella, sprinkle with chilli flakes and torn basil leaves."},{"id":"dbb0426","name":"Diced Steak and Squash Stew","calories":451,"protein":59,"carbs":29,"fats":11,"category":"dinner","time":"2 hrs 30 mins","serves":4,"book":"Book 21","ingredients":["1 diced onion","2 cloves garlic crushed","1kg lean diced steak or beef shin","1 tablespoon tomato paste","1 beef stock cube","1 teaspoon dried oregano","1 sprig fresh thyme","1 bay leaf","1kg butternut squash peeled and cut into 2cm cubes"],"method":"Add all ingredients minus squash to slow cooker and cook on low 6 hours. Add squash for final two hours. Alternatively, brown beef with onion and garlic, add tomato paste, reconstituted stock and herbs, simmer 1.5-2 hours. Add butternut squash and cook 30 minutes. Serve with dark greens."},{"id":"dbb0427","name":"Stuffed Pasta Shells","calories":315,"protein":29,"carbs":16,"fats":15,"category":"dinner","time":"25 mins","serves":6,"book":"Book 21","ingredients":["18 uncooked jumbo pasta shells","450g lean beef mince","2 teaspoons chilli powder","85g fat-free cream cheese","170g cheddar cheese","250ml tomato sauce"],"method":"Preheat oven 180C. Cook pasta per package directions, drain and rinse. Cook and crumble beef over medium-high heat 6-8 minutes. Stir in chilli powder, cream cheese and 1/2 cup tomato sauce. Stir in 1/4 cup shredded cheese. Spoon about 2 tbsp filling into each shell. Place in greased baking dish, top with remaining tomato sauce. Bake covered 20-25 minutes. Sprinkle with remaining cheese, bake uncovered until cheese is melted about 5 minutes."},{"id":"dbb0428","name":"Avocado Mac and Cheese","calories":425,"protein":13,"carbs":55,"fats":17,"category":"dinner","time":"20 mins","serves":4,"book":"Book 21","ingredients":["170g dry macaroni cooked","2 ripe fresh avocados halved pitted and peeled","2 cloves garlic minced","1/2 teaspoon salt","200ml soy milk","2 tablespoons all-purpose flour","4oz vegan cheese shredded","80g tinned black beans rinsed and drained","2 tablespoons salsa verde","60g cherry tomatoes cut in half"],"method":"Mash one avocado with garlic and salt. Cut remaining avocado into 0.5cm pieces and set aside. Heat milk in medium saucepan until just simmering. Add flour, whisking until smooth and thickened. Add cheese, avocado mixture, cooked macaroni, black beans and salsa verde stirring until evenly coated, remove from heat. Top with tomatoes and avocado pieces, serve immediately."},{"id":"dbb0429","name":"Cod and Sweet Potato Fries","calories":432,"protein":34,"carbs":47,"fats":12,"category":"dinner","time":"40 mins","serves":4,"book":"Book 21","ingredients":["450g sweet potatoes about 2 medium","2 tablespoons olive oil","1/4 teaspoon black pepper","For the fish: 40g all-purpose flour, 1/4 tsp black pepper, 2 large eggs, 2 tbsp water, 35g crushed cornflakes, 1 tbsp grated parmesan, 1/8 tsp cayenne pepper, 450g cod fillets"],"method":"Preheat oven 220C. Cut potatoes into 1cm thick sticks, toss with oil and pepper, bake 25-30 minutes until golden and crisp. Mix flour and pepper in shallow bowl. Whisk egg with water. Toss cornflakes with parmesan and cayenne. Dip fish in flour mixture, then egg mixture, then cornflake mixture. Bake 10-12 minutes until fish flakes easily."},{"id":"dbb0430","name":"Prawn Stuffed Avocados","calories":325,"protein":39,"carbs":13,"fats":13,"category":"dinner","time":"15 mins","serves":4,"book":"Book 21","ingredients":["1 small shallot finely chopped","50g mayonnaise","3 tablespoons sour cream","3 tablespoons lime juice","2 tablespoons orange juice","450g cooked shelled prawns chopped","200g grape tomatoes halved","1 serrano chilli thinly sliced","2 ripe avocados halved pits removed","Coriander for garnish"],"method":"Whisk shallot, mayonnaise, sour cream, lime juice, orange juice and 3/4 teaspoon salt in small bowl. Toss prawns, tomatoes and chilli with half of the dressing, refrigerate 20 minutes or up to 2 hours. To serve, spoon into avocado halves and drizzle with remaining dressing. Garnish with coriander."},{"id":"dbb0431","name":"Caesar Salad","calories":409,"protein":44,"carbs":20,"fats":17,"category":"dinner","time":"25 mins","serves":4,"book":"Book 21","ingredients":["1 half baguette","1 tablespoon olive oil","4 tablespoon mayonnaise","2 tablespoon white wine vinegar","1 Romaine lettuce","4 cooked chicken skinless breast fillets","4 anchovy fillets in olive oil each cut into 4","2 tablespoon freshly grated Parmigiano Reggiano","2 tablespoon chives"],"method":"Preheat oven 200C. Tear bread into bite-size pieces, toss with garlic oil. Spread on large baking sheet, bake 10-15 minutes until golden. Stir together mayonnaise and vinegar to make pourable dressing. Tear lettuce, place in large salad bowl. Slice chicken into bite-size pieces, add to lettuce. Scatter anchovies, warm croutons, Parmigiano and chives over salad. Drizzle over dressing, finish with black pepper and serve."},{"id":"dbb0432","name":"Raspberry and Chocolate Cookies","calories":154,"protein":4,"carbs":21,"fats":6,"category":"dessert","time":"20 mins","serves":10,"book":"Book 21","ingredients":["80g raspberries","200g ripe banana flesh","50g plain chocolate cut into chunks","100g oats","80g oats blended into flour","1/4 tsp bicarbonate of soda","50g smooth peanut butter"],"method":"Preheat oven 180C. Mash bananas, stir through peanut butter. Add oats, oat flour and bicarbonate, stir to combine. Add raspberries and chocolate, fold through. Divide dough into 10 cookies, roll into balls with wet hands, press firmly into lined baking tray. Bake 12-14 minutes until golden. Allow to cool and store in airtight container."},{"id":"dbb0433","name":"Crispy Squares","calories":91,"protein":3,"carbs":13,"fats":3,"category":"dessert","time":"4 hrs or overnight","serves":12,"book":"Book 21","ingredients":["45g butter","100g marshmallows","30g vanilla soy protein","75g puffed rice cereal"],"method":"Melt together butter and marshmallows in pan on low heat until completely melted. Remove from heat and stir in protein powder. Add puffed rice cereal, making sure it is completely coated. Transfer to lined baking tray, place in fridge 4 hours or overnight. Cut into 12 and store in airtight container in refrigerator."},{"id":"dbb0434","name":"Coconut Rice Pudding","calories":266,"protein":5,"carbs":30,"fats":14,"category":"dessert","time":"25 mins","serves":2,"book":"Book 21","ingredients":["40g short grain pudding rice","200g light coconut milk","200g unsweetened almond milk","15g brown sugar","1/2 tsp vanilla extract","15g desiccated coconut"],"method":"In a saucepan with a lid, add rice, coconut milk, almond milk, 12g of sugar and a pinch of salt. Mix well. Bring to a boil over low to medium heat then reduce to a simmer, covering partially, stirring occasionally for around 20 minutes. When rice has thickened, add vanilla extract and mix through. Toast desiccated coconut with 1 tsp sugar in non-stick pan until slightly golden. Divide rice and top each serving with half of the coconut mixture."},{"id":"dbb0435","name":"Raspberry and Pistachio Marshmallow Mug Cake","calories":297,"protein":5,"carbs":49,"fats":9,"category":"dessert","time":"5 mins","serves":1,"book":"Book 21","ingredients":["20g mini marshmallows","25g puffed rice","10g plain chocolate chunked","1 tbsp dried raspberries","1 tbsp pistachios roughly chopped"],"method":"Place the marshmallows in a large mug and microwave for 10-15 seconds. Fold in the raspberries, pistachios, puffed rice and chocolate chunks. Cook in the microwave for 10 seconds at 800w. Serve warm and gooey or leave to set and enjoy like a crispy cake."},{"id":"dbb0436","name":"Raw Cacao Brownie","calories":321,"protein":5,"carbs":19,"fats":25,"category":"dessert","time":"30 mins","serves":9,"book":"Book 21","ingredients":["100g pecans","100g walnuts","220g medjool dates","50g cacao powder","25g desiccated coconut","30g cherries","50g coconut oil"],"method":"Place pecans, walnuts and coconut in food processor and mix until fine texture. Add the coconut oil, dates and cherries. Finish with cacao powder and sea salt. Place the mix in a rectangular or square tray and flatten. Place in the fridge at least 2 hours or the freezer for 20 minutes to set."},{"id":"dbb0437","name":"Cinnamon Apple Breakfast Bowl","calories":444,"protein":31,"carbs":26,"fats":24,"category":"breakfast","time":"10 mins","serves":1,"book":"Book 28","ingredients":["250g cottage cheese","35g apple diced","30g chopped walnuts","1 tbsp maple syrup","1 pinch cinnamon"],"method":"Add all the ingredients to a bowl. Enjoy immediately or refrigerate in an air-tight container for up to four days."},{"id":"dbb0438","name":"Full Breakfast Stack","calories":389,"protein":26,"carbs":15,"fats":25,"category":"breakfast","time":"12 mins","serves":1,"book":"Book 28","ingredients":["1cm thick slice of beef tomato","60g slice of black pudding","1 reduced fat pork sausage sliced in half","1 rasher of back bacon","1 medium egg","Handful of spinach"],"method":"Heat grill to medium-high. Arrange black pudding, sausage, tomato and bacon across grill pan, cook 8 minutes turning occasionally. Prepare poached egg by first placing it in mug of boiling water 1 minute. Bring pan of salted water to boil, reduce heat to low, crack egg into middle, poach 2 minutes. Remove with slotted spoon. Arrange breakfast stack with spinach at base, tomato, black pudding, sausage, bacon and top with poached egg."},{"id":"dbb0439","name":"Cherry Chocolate Overnight Oats","calories":463,"protein":35,"carbs":56,"fats":11,"category":"breakfast","time":"10 mins + overnight","serves":1,"book":"Book 28","ingredients":["65g rolled oats","1 tbsp cocoa powder","125ml unsweetened almond milk","65g frozen dark cherries","30g chocolate whey protein"],"method":"Add all ingredients into a serving bowl and mix until very well combined. Cover and place in the fridge overnight, by which point the oats will have absorbed the liquid and the cherries will have defrosted. When ready to serve, add extra almond milk if needed."},{"id":"dbb0440","name":"Date and Banana Oats and Whey","calories":481,"protein":35,"carbs":56,"fats":13,"category":"breakfast","time":"8 mins","serves":2,"book":"Book 28","ingredients":["100g oats","50g banana flesh mashed","38g dates diced","500g almond milk","12g honey","1/4 tsp cinnamon","14g ground almonds","60g whey protein"],"method":"Add all of the ingredients to a large saucepan over a medium heat and bring to a low boil. Stir frequently for 5 minutes, cooking until desired fluffy consistency. Divide between two bowls and eat warm."},{"id":"dbb0441","name":"Apple Almond Butter Salad","calories":339,"protein":8,"carbs":34,"fats":19,"category":"breakfast","time":"6 mins","serves":1,"book":"Book 28","ingredients":["80g apple diced","1 tbsp oats","28g crunchy almond butter","1 teaspoon honey","10g 70% dark chocolate diced","1/4 lemon juiced","Powdered sweetener to taste"],"method":"Place nut butter and lemon juice into a mixing bowl and mash to break down and combine. Add oats, apple, dark chocolate and honey and toss very well to combine and coat all ingredients. Serve by itself or with your favourite Skyr or protein yoghurts."},{"id":"dbb0442","name":"Tortilla Chicken Pinwheels","calories":209,"protein":16,"carbs":16,"fats":9,"category":"snack","time":"12 mins","serves":2,"book":"Book 28","ingredients":["40g tortilla","2 chicken sausages peeled","30g reduced fat cheddar","10g spinach","1/2 medium tomato flesh only diced"],"method":"Preheat oven 200C. Lay out the tortilla and cover with the chicken sausage meat. Add the cheese, spinach and diced tomato. Fold the base an inch from the bottom then roll the tortilla into a roulade. Slice into finger width pieces. Lay the slices onto a foil lined baking sheet and roast in the oven for 5 minutes. Turn them over and cook for 5 more minutes until the cheese is coloured and the meat is cooked through."},{"id":"dbb0443","name":"Egg Noodle Pot","calories":408,"protein":26,"carbs":40,"fats":16,"category":"lunch","time":"5 mins","serves":2,"book":"Book 28","ingredients":["200g cooked egg noodles","100g cooked chicken breast pulled","80g carrot peeled and grated","120g red cabbage thinly sliced","80g red pepper","For dressing: 2 tbsp apple cider vinegar, 40g tahini, 2 tbsp soy sauce, 2 tsp toasted sesame seeds, 1 tsp peeled grated fresh ginger"],"method":"Grate ginger and combine all dressing ingredients. Add dressing to the bottom of a mason jar. Add chicken and noodles then layer the vegetables on top. Garnish with the sesame seeds."},{"id":"dbb0444","name":"Beetroot Salad","calories":150,"protein":5,"carbs":10,"fats":10,"category":"lunch","time":"30 mins","serves":4,"book":"Book 28","ingredients":["3 beetroot 110g each","1 lemon zested and juiced","2 tbsp olive oil","1 tbsp cider vinegar","2 tsp maple syrup","1 tsp dijon mustard","60g rocket","60g goat's cheese"],"method":"Thinly slice beets into rounds. Add to bowl with half of lemon juice, half of olive oil and 1 tsp cider vinegar, season and toss and marinate minimum 15 minutes. Make dressing by combining remaining olive oil, lemon juice and cider vinegar with dijon mustard and maple syrup, add salt and whisk. Arrange beet slices on platter, pile rocket on top with goat's cheese, then scatter lemon zest and dress."},{"id":"dbb0445","name":"Spiced Tzatziki","calories":78,"protein":3,"carbs":3,"fats":6,"category":"snack","time":"60 mins","serves":4,"book":"Book 28","ingredients":["200g Greek yoghurt","1 small garlic clove crushed","1 tsp red wine vinegar","80g cucumber","2 tsp harissa paste"],"method":"Mix all of the ingredients together in a bowl. Deseed the cucumber and grate with box grater over paper towel then add a pinch of salt and leave for 5 minutes. Squeeze as much water as you can from cucumbers and add them to the yoghurt mixture. Mix well and keep refrigerated."},{"id":"dbb0446","name":"Cumin Spiced Cheese Straws","calories":60,"protein":2,"carbs":4,"fats":4,"category":"snack","time":"40 mins","serves":25,"book":"Book 28","ingredients":["1 tsp cumin seeds","1/4 tsp black pepper","100g 1/2 fat cheddar cheese grated","320g ready rolled puff pastry halved","1 egg lightly beaten"],"method":"Preheat oven 200C. Combine cumin seeds, pepper and cheddar in a bowl. Place 1 sheet of pastry on prepared tray. Brush with egg, top with half the cumin mixture. Top with second sheet, press down firmly. Brush with egg and add remaining mixture. Refrigerate 10 minutes until firm. Cut pastry in half then into 3cm wide strips, twist the strips and place on prepared tray. Bake 12 minutes until browned and crisp."},{"id":"dbb0447","name":"Stuffed Tomatoes","calories":476,"protein":37,"carbs":37,"fats":20,"category":"dinner","time":"35 mins","serves":6,"book":"Book 28","ingredients":["12 vine tomatoes","400g beef mince","2 cloves garlic","1 red onion chopped","20g basil dried","15g oregano dried","1 teaspoon cinnamon ground","50g pine nuts","100g basmati rice cooked","1 tablespoon olive oil"],"method":"Cut tops from tomatoes and reserve, scoop out insides. Brown beef 5 minutes. Preheat oven 220C. Place tomatoes in lined roasting tin. Put garlic, onion, herbs and cinnamon in food processor and pulse until finely chopped. Add cooked beef and pulse until roughly combined. Stir in pine nuts and cooked rice then season. Spoon into tomatoes and finish with reserved tops. Roast 20-30 minutes."},{"id":"dbb0448","name":"Sweet Potato Hash Browns with Poached Eggs","calories":230,"protein":10,"carbs":25,"fats":10,"category":"dinner","time":"20 mins","serves":4,"book":"Book 28","ingredients":["300g sweet potatoes grated","6 medium eggs","1 teaspoon dried sage","Vegetable oil for frying","120g pack baby spinach"],"method":"Coarsely grate sweet potatoes. Beat 2 of the eggs, add sweet potato and sage, mix well and season. Warm large non-stick frying pan with vegetable oil over medium heat. Cook 4 flattened rounds of sweet potato mixture 2-3 minutes on each side until golden and crisp. Stir-fry spinach with 2 tsp water in same pan 1-2 minutes. Poach remaining 4 eggs 2-3 minutes. Place a hash brown on each plate, top with spinach then an egg. Season before serving."},{"id":"dbb0449","name":"Chicken with Vegetables in a Bowl","calories":304,"protein":42,"carbs":7,"fats":12,"category":"dinner","time":"30 mins","serves":4,"book":"Book 28","ingredients":["3 tablespoons low-sodium soy sauce","1 teaspoon corn flour","450g chicken mince","3 cloves garlic","1 small bunch spring onions divided","2 tablespoons vegetable oil","100g grated carrots","1 tablespoon minced fresh ginger","1 tablespoon rice vinegar","2 teaspoons fresh chilli paste or hot sauce","1/4 teaspoon ground black pepper","1 yellow bell pepper sliced"],"method":"Whisk together 1 tbsp soy sauce and cornflour. Add chicken and let marinate 10 minutes. Thinly slice spring onions and garlic. Heat wok or large deep pan over high heat. Add oil, swirl to coat. Add marinated chicken and cook breaking apart into small bits until no longer pink about 5 minutes. Add spring onions. Reduce heat to medium-low. Add carrots, bell pepper, ginger and garlic. Stir-fry 2 minutes. Add rice vinegar, chilli paste, black pepper and remaining 2 tbsp soy sauce, stir to combine. Cook 1 additional minute. Scoop into serving bowls."},{"id":"dbb0450","name":"Grilled Greek Pita Salad","calories":252,"protein":11,"carbs":34,"fats":8,"category":"dinner","time":"15 mins","serves":4,"book":"Book 28","ingredients":["4 wholemeal pittas","125g Greek feta cheese","2 tomatoes chopped","3 spring thyme","1/2 red onion sliced","20g fresh parsley chopped"],"method":"Cut each pitta lengthwise and open to create a pocket. In large bowl, mix the remaining ingredients and season with black pepper. Warm griddle or non-stick frying pan over high heat. When hot, press each stuffed pitta firmly down onto pan for about 1 minute on each side, in batches, until
