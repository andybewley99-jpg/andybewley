ans 1 minute, cool. Mix lemon juice and zest with oil, stir through soya beans, lentils and spring onions. Divide, flake salmon on top with egg wedges."},{"id":"dbb0210","name":"Turkey with Tabbouleh and Tahini Dressing","calories":407,"protein":46,"carbs":31,"fats":11,"category":"dinner","time":"35 mins","serves":4,"book":"Book 16","ingredients":["200g quinoa","1/2 cucumber cut into 1cm chunks","175g cherry tomatoes halved","3 spring onions finely sliced","Handful parsley roughly chopped","Handful coriander roughly chopped","1 tbsp olive oil plus 1 tsp","1 lemon juiced","4 turkey steaks","1.5 tbsp tahini paste","1.5 tbsp low-fat yoghurt","1/2 lemon juiced","1/2 garlic clove crushed","1/2 tsp clear honey"],"method":"Cook quinoa in 600ml water 20 minutes. Mix cucumber, tomatoes, spring onions, herbs, 1 tbsp oil and lemon juice. Griddle turkey with 1 tsp oil 5 minutes each side. Mix dressing ingredients with 3 tbsp water. Toss quinoa with salad, pile turkey on top, drizzle dressing."},{"id":"dbb0211","name":"Chicken a la King","calories":167,"protein":19,"carbs":16,"fats":3,"category":"dinner","time":"6 hrs 10 mins","serves":6,"book":"Book 16","ingredients":["1 tin 400g condensed cream of chicken soup","3 tbsp plain flour","1/4 tsp pepper","Dash cayenne pepper","450g boneless skinless chicken breasts cubed","1 celery stalk chopped","90g green pepper chopped","75g onion chopped","1 package 280g frozen peas thawed","2 tbsp pimientos diced"],"method":"Combine soup, flour, pepper and cayenne in slow cooker. Stir in chicken, celery, pepper and onion. Cook on low 7-8 hours. Add peas and pimientos, cook 30 more minutes. Serve with rice."},{"id":"dbb0212","name":"Salt and Pepper Chicken","calories":390,"protein":25,"carbs":14,"fats":26,"category":"dinner","time":"25 mins","serves":2,"book":"Book 16","ingredients":["35g plain flour","2 tsp sea salt flakes","2 tsp Chinese five spice","1 tsp black pepper","2 x 200g chicken breasts sliced into strips","3 tbsp vegetable oil","3 cloves garlic diced","2 sprigs spring onion diced","2 long red chilli diced"],"method":"Mix flour, salt, five spice and pepper. Coat chicken strips. Heat oil to high, cook chicken 7 minutes. Add garlic, spring onion and chillies, cook 5 more minutes. Drain on paper towel and serve hot."},{"id":"dbb0213","name":"Thai Red Curry","calories":340,"protein":7,"carbs":42,"fats":16,"category":"dinner","time":"30 mins","serves":4,"book":"Book 16","ingredients":["2 tbsp vegetable oil","1 tin 400ml reduced-fat coconut milk","150ml vegetable stock","1 tbsp palm sugar","2 tbsp agave syrup","4 tbsp soy sauce","2 peppers deseeded and cut into chunks","1 red chilli sliced","200g mushrooms sliced","160g baby plum tomatoes","60g baby corn halved","50g mangetout","For paste: 1 tsp cumin seeds, 2 tbsp coriander seeds, 2cm ginger, 5 shallots, 5 garlic cloves, 2 lemongrass stalks, 3 red chillies, 1 tsp black peppercorns, 2 tbsp tomato puree, juice 1/2 lime, 10g coriander"],"method":"Toast cumin and coriander seeds. Blend all paste ingredients until smooth. Fry 100g paste 2 minutes, add coconut milk and stock. Add sugar, agave, soy and all vegetables. Bring to boil, simmer 7-10 minutes."},{"id":"dbb0214","name":"Vegan Spaghetti and Meatballs","calories":326,"protein":19,"carbs":58,"fats":2,"category":"dinner","time":"40 mins","serves":4,"book":"Book 16","ingredients":["1 packet red lentil spaghetti","Marinara sauce to taste","1 tin 400g kidney beans drained","6 tbsp gluten-free quick oats","1 tbsp onion powder","1 tbsp garlic powder","1 tbsp oregano","1 tbsp chili powder","1 tbsp tamari","2 tbsp mustard","3 tbsp marinara sauce"],"method":"Preheat oven 180C. Mash kidney beans, add all meatball ingredients and stir. Scoop 1 tbsp portions, form into balls. Bake 20-22 minutes until slightly crispy. Cook pasta, warm marinara sauce. Serve topped with meatballs."},{"id":"dbb0215","name":"Baked Lemon Pepper Wings","calories":281,"protein":23,"carbs":0,"fats":21,"category":"dinner","time":"50 mins","serves":8,"book":"Book 16","ingredients":["1.3kg chicken wings","2 tbsp butter melted","4 tsp seasoned salt","2 tsp lemon pepper","1 tsp cayenne pepper","1 tsp paprika","1 tsp black pepper"],"method":"Preheat oven 200C. Line baking sheets with foil and wire racks. Toss wings with butter and all spices. Lay on wire racks spread out. Cook 40-45 minutes until crispy."},{"id":"dbb0216","name":"Kale Mushroom and Cashew Stir Fry","calories":237,"protein":13,"carbs":16,"fats":14,"category":"dinner","time":"25 mins","serves":10,"book":"Book 16","ingredients":["1 tsp sesame oil","300g button mushrooms sliced","25g fresh ginger grated","1-2 mild red chillies deseeded and sliced","400g kale shredded","350g frozen peas","75g unsalted cashews","2 tsp Chinese five spice","2 tbsp reduced salt soy sauce"],"method":"Heat sesame oil in wok. Add mushrooms, ginger and chilli until browning. Add kale and peas 2-3 minutes. Add cashews 2 minutes. Stir in five spice and soy sauce. Serve hot with jasmine rice."},{"id":"dbb0217","name":"Mushroom Couscous","calories":386,"protein":15,"carbs":77,"fats":2,"category":"dinner","time":"25 mins","serves":4,"book":"Book 16","ingredients":["300g pearl couscous","60ml olive oil","600g mushrooms sliced","1 brown onion diced","3 tbsp maple syrup","3 tbsp soy sauce","2.5 tbsp rice wine vinegar"],"method":"Cook pearl couscous per packet. Heat 1 tbsp oil, add mushrooms and onion, cook 3-4 minutes. Mix maple syrup, soy and rice wine vinegar, pour over mushrooms, cook 1 minute. Add couscous, cook stirring on low 3-4 minutes."},{"id":"dbb0218","name":"Vietnamese Salad","calories":416,"protein":28,"carbs":58,"fats":8,"category":"dinner","time":"30 mins","serves":2,"book":"Book 16","ingredients":["100g rice vermicelli noodles","1 tsp coconut oil","1 stalk lemongrass finely chopped","1 small shallot diced","200g beef mince","1 tbsp lime juice","2 tsp tamari","1 tsp rice malt syrup","1 tsp mirin","6 iceberg lettuce leaves shredded","1/2 Lebanese cucumber sliced","1/2 tbsp peanuts roughly chopped","2 tbsp fresh mint","1 small red chilli finely chopped"],"method":"Cook noodles. Heat oil in wok, add lemongrass and shallot 2 minutes. Add beef 6-8 minutes. Add lime, tamari, rice malt syrup and mirin, cook 1 minute. Toss noodles, lettuce and cucumber. Top with mince, peanuts, mint and chilli."},{"id":"dbb0219","name":"Fennel and White Fish Risoni Salad","calories":392,"protein":35,"carbs":48,"fats":7,"category":"dinner","time":"40 mins","serves":4,"book":"Book 16","ingredients":["200g risoni or orzo","600g white fish 4 pieces","1 lemon sliced","1 tbsp olive oil","1 red onion thinly sliced","1 small fennel thinly sliced","85g white beans rinsed and drained","2 tbsp oregano chopped","1 tbsp white wine vinegar","Sea salt and fresh pepper"],"method":"Cook risoni. Bake fish on lined tray with lemon 30 minutes. Heat oil, cook onion and fennel 3 minutes. Add beans, oregano, white wine vinegar, cook 6 minutes. Toss through risoni. Top with fish."},{"id":"dbb0220","name":"Vietnamese Beef Roll","calories":366,"protein":18,"carbs":41,"fats":14,"category":"dinner","time":"20 mins + 8 hrs","serves":2,"book":"Book 16","ingredients":["1 carrot shredded","1/2 Lebanese cucumber cut into matchsticks","1/2 red onion thinly sliced","80ml Vietnamese dressing","100g rump steak trimmed","25g coriander leaves picked","2 long wholemeal soft rolls","2 tsp kewpie mayonnaise","2 tsp sriracha"],"method":"Marinate carrot, cucumber and onion in dressing overnight. Grill steak 3 minutes each side, rest and slice thin. Drain vegetables, divide between rolls. Layer with beef, coriander, mayonnaise and sriracha."},{"id":"dbb0221","name":"Avocado Zoodle Pasta","calories":408,"protein":11,"carbs":26,"fats":30,"category":"dinner","time":"15 mins","serves":4,"book":"Book 16","ingredients":["3 courgettes spiralised","180g rocket","1 tin 400g chickpeas drained","1 avocado sliced","60g green olives sliced","2 tbsp pine nuts","For sauce: 1 avocado, 1/2 tbsp apple cider vinegar, 1.5 tbsp olive oil, 2.5 tbsp mayonnaise, sea salt and pepper"],"method":"Boil spiralised courgette 2-3 minutes, drain. Blend all sauce ingredients until smooth. Toss rocket, chickpeas and sauce. Mix through courgette noodles. Top with avocado, olives, pine nuts and chilli flakes."},{"id":"dbb0222","name":"Roast Potato and Prawn Salad","calories":317,"protein":36,"carbs":25,"fats":6,"category":"dinner","time":"60 mins","serves":5,"book":"Book 16","ingredients":["600g baby new potatoes halved","200g green beans","600g cooked prawns","300ml Greek yoghurt","1 tbsp lemon juiced","2 tbsp red onion diced","2 tbsp dill chopped","2 tbsp mint chopped","2 tsp olive oil","2 tsp Dijon mustard"],"method":"Boil potatoes 10 minutes, add beans last 3-4 minutes. Cool 30-40 minutes. Mix all dressing ingredients. Toss everything together, season and divide between five plates."},{"id":"dbb0223","name":"Chargrilled Veg and Black Rice","calories":293,"protein":8,"carbs":52,"fats":7,"category":"dinner","time":"20 mins","serves":4,"book":"Book 16","ingredients":["2 red onions cut into chunks","2 red bell peppers cut into chunks","2 courgettes cut into chunks","1.5 tbsp olive oil","225g black rice uncooked","2 cloves garlic minced","430ml water","1 vegetable stock cube"],"method":"Preheat oven 200C. Toss onion, peppers and courgettes in 1 tbsp oil, roast on lined tray. Heat remaining oil, add black rice and garlic, cook 6-7 minutes. Add water and stock, simmer covered 25-30 minutes. Divide rice into bowls, top with vegetables."},{"id":"dbb0224","name":"Chilled Summer Pudding","calories":175,"protein":4,"carbs":40,"fats":1,"category":"dessert","time":"6 hrs 20 mins","serves":8,"book":"Book 16","ingredients":["300g strawberries","250g blackberries","100g redcurrants","500g raspberries","175g golden caster sugar","7 thin slices white bread"],"method":"Heat sugar with 3 tbsp water, boil 1 minute, add all fruit except strawberries, cook 3 minutes. Sieve fruit. Line pudding basin with clingfilm and bread dipped in juice. Add strawberries to fruit, fill basin, top with bread lid. Weight down, chill 6 hours. Turn out to serve."},{"id":"dbb0225","name":"Blueberry Yoghurt Bark","calories":202,"protein":13,"carbs":18,"fats":9,"category":"dessert","time":"45 mins","serves":1,"book":"Book 16","ingredients":["125g plain low-fat Greek yoghurt","1 tsp honey","1/4 tsp vanilla extract","25g blueberries fresh or frozen","1 tbsp unsweetened shredded coconut","5 almonds roughly chopped"],"method":"Line shallow freezer-safe container with parchment. Combine yoghurt, honey and vanilla. Pour into container in thin layer, top with blueberries, coconut and almonds. Cover and freeze until solid. Break into pieces."},{"id":"dbb0226","name":"Matcha Ice Cream","calories":313,"protein":4,"carbs":18,"fats":25,"category":"dessert","time":"5 mins + 8 hrs","serves":6,"book":"Book 16","ingredients":["150ml condensed milk","300ml double cream","2 tbsp matcha green tea powder","1 tsp honey"],"method":"Stir condensed milk to loosen. Add cream and whisk until thickening. Whisk in green tea powder until whipped green cream. Pour into airtight container, freeze overnight. Soften 5 minutes before serving."},{"id":"dbb0227","name":"Red Plum Tart","calories":260,"protein":6,"carbs":32,"fats":12,"category":"dessert","time":"45 mins","serves":16,"book":"Book 16","ingredients":["525g plums deseeded and sliced","1 tbsp molasses","3 tbsp honey","For crust: 1 tbsp cornstarch, 450g cashews, 10 large medjool dates, 85g honey"],"method":"Preheat oven 180C. Blend all crust ingredients in food processor. Press into tart pan. Mix filling ingredients, pour into crust. Bake 45 minutes until cooked through and crust lightly toasted."},{"id":"dbb0228","name":"Dark Choc Date Slice","calories":136,"protein":1,"carbs":15,"fats":8,"category":"dessert","time":"35 mins","serves":16,"book":"Book 16","ingredients":["150g digestive biscuits crumbled","25g butter","2 tbsp maple syrup","180g dates pitted","1 tbsp almond butter","1 tbsp coconut oil","150ml cream","1 tsp salt flakes"],"method":"Line square pan. Blend biscuits, butter and 1 tbsp maple syrup, press into base, chill. Process dates, almond butter, oil, remaining maple syrup and 60ml boiling water. Pour over base, freeze 30 minutes. Melt chocolate and cream, pour over date layer. Sprinkle with salt, freeze 3 hours. Cut with hot knife."},{"id":"dbb0229","name":"Key Lime Pie Protein Shake","calories":172,"protein":36,"carbs":7,"fats":0,"category":"breakfast","time":"5 mins","serves":1,"book":"Book 22","ingredients":["175g low-fat cottage cheese","1 tbsp vanilla protein powder","1 lime juiced","5-10 ice cubes","175ml water","3 packets stevia sweetener","Handful spinach"],"method":"Add all ingredients to food processor and blend until milkshake consistency. Add more water if too thick or more ice if too thin."},{"id":"dbb0230","name":"Spinach Protein Pancakes","calories":234,"protein":17,"carbs":10,"fats":14,"category":"breakfast","time":"40 mins","serves":12,"book":"Book 22","ingredients":["284ml buttermilk","1 egg beaten plus poached eggs to serve","200g spinach","175g buckwheat flour","1 tsp gluten-free baking powder","Pinch of paprika","Rapeseed oil for frying"],"method":"Pour boiling water over spinach to wilt, squeeze dry. Blend buttermilk, egg and spinach. Mix dry ingredients, gradually mix in puree. Fry ladlefuls 1-2 minutes per side. Serve topped with poached eggs."},{"id":"dbb0231","name":"Asparagus and Soft Eggs on Toast","calories":348,"protein":20,"carbs":22,"fats":20,"category":"breakfast","time":"20 mins","serves":4,"book":"Book 22","ingredients":["4 slices rustic country bread","455g asparagus tough ends trimmed","2 tbsp olive oil","Kosher salt and black pepper","8 large eggs","1 tsp vinegar","28g Parmesan"],"method":"Preheat grill. Drizzle bread and asparagus with oil, season, grill bread 1-2 minutes per side. Grill asparagus 4-8 minutes. Poach eggs 3-4 minutes. Serve toast with asparagus, eggs and parmesan."},{"id":"dbb0232","name":"Poached Eggs with Mushrooms and Tomatoes","calories":362,"protein":22,"carbs":28,"fats":18,"category":"breakfast","time":"20 mins","serves":4,"book":"Book 22","ingredients":["2 tsp white vinegar","1 tbsp plus 1 tsp olive oil","2 medium tomatoes quartered","455g assorted mushrooms sliced","1 tbsp fresh thyme leaves","8 large eggs","4 slices country bread toasted","28g parmesan shaved","2 tbsp fresh chives chopped"],"method":"Cook tomatoes in 1 tsp oil 1-2 minutes each side. Cook mushrooms with thyme in 1 tbsp oil 6-7 minutes. Poach eggs 4 at a time 3-4 minutes. Top toast with tomatoes, mushrooms, eggs, parmesan and chives."},{"id":"dbb0233","name":"Pan Cooked Eggs and Vegetables","calories":340,"protein":17,"carbs":32,"fats":16,"category":"lunch","time":"30 mins","serves":2,"book":"Book 22","ingredients":["300g baby new potatoes halved","1/2 tbsp rapeseed oil","1 knob butter","1 courgette cut into chunks","1 yellow pepper cut into chunks","1 red pepper cut into chunks","2 spring onions finely sliced","1 garlic clove crushed","1 sprig thyme","4 eggs"],"method":"Boil potatoes 8 minutes, drain. Heat oil and butter, add courgette, peppers and potatoes, cook 10 minutes. Add spring onions, garlic and thyme 2 more minutes. Make four spaces, crack in eggs, cover and cook 4 minutes."},{"id":"dbb0234","name":"German Red Cabbage","calories":61,"protein":1,"carbs":12,"fats":1,"category":"lunch","time":"1 hr","serves":10,"book":"Book 22","ingredients":["1 tsp olive oil","1 white onion finely sliced","1 apple sliced","1 red cabbage finely chopped","40g sugar","40ml white wine vinegar","Pinch salt and pepper"],"method":"Cook onion and apple in oil 5 minutes. Stir in remaining ingredients, cover and stew 1 hour until cabbage is soft, stirring occasionally."},{"id":"dbb0235","name":"Colcannon Potatoes","calories":169,"protein":4,"carbs":27,"fats":5,"category":"lunch","time":"60 mins","serves":12,"book":"Book 22","ingredients":["1 white cabbage finely chopped","2kg potatoes peeled and quartered","1/2 litre milk","350g spring onions finely chopped","Pinch salt and pepper","60g butter","Handful fresh parsley chopped","2 rashers bacon grilled and finely chopped"],"method":"Simmer cabbage 10 minutes, drain. Boil potatoes 20 minutes. Heat milk with spring onions and seasoning. Mash potatoes until smooth, combine with milk mixture. Mix in cabbage, top with parsley and crispy bacon."},{"id":"dbb0236","name":"Hummus Quesadillas","calories":481,"protein":11,"carbs":35,"fats":34,"category":"lunch","time":"15 mins","serves":1,"book":"Book 22","ingredients":["1 8-inch wholegrain vegan tortilla","80g hummus","Handful raw spinach","10 cherry tomatoes chopped","10 Kalamata olives thinly sliced","1/2 tbsp olive oil for brushing"],"method":"Spread hummus on one half of tortilla, top with spinach, tomatoes and olives. Fold in half. Warm in pan over medium heat, flip, brush with olive oil, cook until golden and crisp on both sides. Cut into wedges."},{"id":"dbb0237","name":"Wilted Kale with Toasted Shallots","calories":204,"protein":25,"carbs":8,"fats":8,"category":"lunch","time":"10 mins","serves":2,"book":"Book 22","ingredients":["1 tbsp olive oil","2 shallots thinly sliced","455g lacinato kale stemmed and chopped","1/4 tsp each kosher salt and pepper"],"method":"Heat olive oil over medium-high. Add shallots, saute 2 minutes until golden brown. Add kale, cook 3 minutes until wilted. Sprinkle with salt and pepper."},{"id":"dbb0238","name":"Pear Bacon and Brie Flatbread","calories":503,"protein":29,"carbs":41,"fats":26,"category":"dinner","time":"16 mins","serves":2,"book":"Book 22","ingredients":["2 prebaked flatbreads","50g mozzarella cheese","60g brie very thinly sliced","1/2 pear thinly sliced","4 rashers bacon cooked and crumbled","Spinach and rocket salad to garnish","Balsamic glaze to drizzle"],"method":"Preheat oven 190C. Warm flatbreads 2 minutes. Sprinkle with both cheeses, pear slices and crumbled bacon. Return to oven 3-4 minutes until cheese is bubbling. Garnish with salad and balsamic glaze."},{"id":"dbb0239","name":"Pad Thai","calories":139,"protein":14,"carbs":5,"fats":7,"category":"dinner","time":"20 mins","serves":4,"book":"Book 22","ingredients":["1 tsp sesame oil","1 red chilli diced","1 tbsp ginger grated","1 clove garlic crushed","2 sliced spring onions","1 egg beaten and seasoned","1 mooli shredded","2 courgettes shredded or spiralised","50g beansprouts","200g cooked and peeled prawns","Juice of 1 lime","1 tbsp fish sauce","1/2 bunch coriander chopped","2 tbsp roasted peanuts chopped"],"method":"Heat oil in wok until smoking. Stir fry chilli, ginger and garlic, add spring onions 2 minutes. Scrape to side, add egg and scramble into mix. Add mooli, stir fry 4 minutes. Add beansprouts and prawns, cook 2 minutes. Season with lime and fish sauce. Top with coriander and peanuts."},{"id":"dbb0240","name":"Moroccan Chickpea Quinoa Salad","calories":470,"protein":16,"carbs":70,"fats":14,"category":"dinner","time":"30 mins","serves":4,"book":"Book 22","ingredients":["1/2 tbsp coconut oil","1 white onion finely diced","1 tsp ground turmeric","1/2 tsp ground cumin","1/2 tsp ground cinnamon","1/2 tsp salt and pepper","260ml vegetable stock","130g quinoa","1 tin 400g chickpeas drained","100g dried cranberries","Handful parsley chopped","70g flaked almonds toasted"],"method":"Fry onion in coconut oil 5 minutes. Add spices and roast 2 minutes. Add stock and quinoa, boil then simmer covered 15 minutes. Stir in chickpeas, cranberries and parsley. Sprinkle with toasted almonds."},{"id":"dbb0241","name":"Italian Turkey and Penne","calories":341,"protein":39,"carbs":35,"fats":5,"category":"dinner","time":"35 mins","serves":2,"book":"Book 22","ingredients":["1 tsp dried Italian seasoning","1/4 tsp smoked paprika","1/4 tsp black pepper","250g ground turkey breast","2 cloves garlic crushed","1 white onion diced","200ml water","60g multi-grain penne pasta","200g tomato sauce","150g baby spinach","3 tbsp parmesan cheese"],"method":"Mix spices with turkey and garlic. Cook onion 5 minutes, add turkey, brown 8 minutes. Remove turkey. Add water, bring to boil, cook pasta al dente. Drain, return pasta with tomato sauce and turkey, heat through. Add spinach to wilt, scatter parmesan."},{"id":"dbb0242","name":"Chicken Saag","calories":330,"protein":43,"carbs":28,"fats":4,"category":"dinner","time":"45 mins","serves":4,"book":"Book 22","ingredients":["2 red chillies seeded","2 cloves garlic","4cm piece ginger peeled","1 onion chopped","Olive oil","1 tsp ground cumin","1 tsp ground coriander","1 tsp garam masala","1/2 tsp turmeric","4 cloves","4 skinless chicken breasts cut into large chunks","150g red split lentils","1 tin 400g chopped tomatoes","260g fresh spinach","4 small rotis warmed"],"method":"Blend chillies, garlic, ginger and onion into paste. Fry paste 2 minutes. Add dry spices, cook 1 minute. Add chicken, coat and cook 5 minutes. Add lentils, tomatoes and 1.5 tins water, simmer 25 minutes. Add spinach, stir until wilted. Serve with rotis."},{"id":"dbb0243","name":"Chicken Feta Pasta","calories":399,"protein":19,"carbs":56,"fats":11,"category":"dinner","time":"35 mins","serves":6,"book":"Book 22","ingredients":["2 tbsp olive oil","680g boneless skinless chicken breasts halved lengthways","1 tsp kosher salt","1/4 tsp black pepper","2 tins 400g diced tomatoes with basil garlic and oregano","500ml water","455g whole wheat fettuccine","110g reduced-fat feta cheese divided","Fresh basil finely chopped"],"method":"Cook chicken in hot olive oil 8 minutes each side. Add tomatoes and water. Stir in pasta, cook uncovered 5 minutes. Cover, cook 10 more minutes. Add 3/4 feta, stir, cook uncovered 5 more minutes. Serve with remaining feta and basil."},{"id":"dbb0244","name":"Beef and Leek Lasagne","calories":339,"protein":29,"carbs":22,"fats":15,"category":"dinner","time":"1-2 hrs","serves":6,"book":"Book 22","ingredients":["2 leeks trimmed","500g beef mince","1 white onion diced","2 celery sticks diced","2 carrots peeled and diced","2 garlic cloves crushed","150g chestnut mushrooms roughly chopped","2 tbsp plain flour","150ml red wine","200ml beef stock","1 tin 400g chopped tomatoes","2 tbsp tomato puree","1 tsp dried oregano","500ml milk","2 tbsp corn flour","20g parmesan","20g cheddar"],"method":"Trim leeks, separate large leaves for lasagne sheets. Brown beef, leeks, onion, celery, carrots and garlic. Add mushrooms, flour, red wine, stock, tomatoes, puree and oregano, simmer 30 minutes. Make white sauce with milk, cornflour. Layer mince and leek sheets in dish, top with white sauce and cheese. Bake at 200C 30 minutes."},{"id":"dbb0245","name":"Red Lentil Curry","calories":229,"protein":10,"carbs":23,"fats":9,"category":"dinner","time":"55 mins","serves":8,"book":"Book 22","ingredients":["2 tbsp coconut oil","2 medium yellow onions","400g fresh tomatoes diced","1 tsp sea salt","1/4 tsp ground black pepper","3 garlic cloves minced","1 tsp freshly minced ginger","2 tbsp garam masala","1 tsp curry powder","1 tbsp red curry paste","1/4 tsp cumin","1 cup dry red lentils rinsed","470ml water","400g tin coconut milk","1 small lime"],"method":"Cook onions, tomatoes and seasoning in coconut oil over medium heat. Add all dry spices and stir. Add water and coconut milk, bring to boil. Simmer covered on medium-low 35 minutes, stirring occasionally."},{"id":"dbb0246","name":"Meat Free Meatballs","calories":67,"protein":3,"carbs":10,"fats":2,"category":"dinner","time":"1 hr 15 mins","serves":12,"book":"Book 22","ingredients":["185g cooked and cooled quinoa","1 tin 400g black beans rinsed drained and dried","2 tbsp water","3 cloves garlic minced","75g diced shallot","1/4 tsp sea salt","2.5 tsp fresh oregano","1/2 tsp red pepper flake","25g vegan parmesan","2 tbsp tomato puree","3 tbsp chopped fresh basil or parsley"],"method":"Preheat oven 180C. Bake black beans 15 minutes until dry. Increase to 190C. Saute garlic and shallot in water 2-3 minutes. Blend beans with spices to loose mix, add quinoa, parmesan, tomato paste and herbs. Roll into balls, refrigerate 15 minutes. Sear in pan then bake 20-30 minutes until golden."},{"id":"dbb0247","name":"Pesto Baked Chicken","calories":187,"protein":28,"carbs":3,"fats":7,"category":"dinner","time":"32 mins","serves":4,"book":"Book 22","ingredients":["4 boneless skinless chicken breasts flattened","4 tsp basil pesto","30g mozzarella cheese shredded","4 Roma tomatoes thinly sliced"],"method":"Preheat oven 200C. Flatten chicken breasts to 2.5cm thickness, place in casserole dish. Spread 1 tsp pesto on each breast, bake uncovered 15 minutes. Remove, add sliced tomato and 1 tbsp mozzarella to each, bake 5-7 more minutes."},{"id":"dbb0248","name":"Cajun Shrimp in Foil","calories":308,"protein":29,"carbs":21,"fats":12,"category":"dinner","time":"35 mins","serves":4,"book":"Book 22","ingredients":["1 tbsp Cajun seasoning","Salt and black pepper","450g cleaned large shrimp","85g fully cooked turkey chicken Andouille sausage very thinly sliced","1 medium courgette sliced","1 large red bell pepper cut into thin strips","260g corn kernels","5g fresh Italian parsley chopped","5g fresh basil chopped","60ml dry white wine","2 tbsp olive oil"],"method":"Mix Cajun seasoning, salt and pepper with shrimp. Place 4 pieces of foil on flat surface. Divide sausage, courgette, peppers and corn among foil. Top each with shrimp, herbs, 1 tbsp wine and 1/2 tbsp oil. Seal into packets. Bake at 202C 10 minutes."},{"id":"dbb0249","name":"Shepherd's Pie","calories":275,"protein":22,"carbs":31,"fats":7,"category":"dinner","time":"50 mins","serves":6,"book":"Book 22","ingredients":["700g potatoes peeled and diced","200ml chicken stock","2 tbsp sour cream","2 tsp paprika","450g lean beef mince","1 tsp olive oil","1 white onion finely diced","2 cloves garlic crushed","1 celery stalk chopped","225g mushrooms chopped","2 tbsp flour","300g frozen mixed vegetables","250ml beef stock","2 tsp tomato puree","1 tsp Worcestershire sauce","Handful rosemary and thyme chopped"],"method":"Boil and mash potatoes with stock, sour cream and paprika. Brown beef, set aside. Saute onion, garlic, celery and mushrooms. Add flour, vegetables, stock, tomato puree, Worcestershire and herbs, simmer 10 minutes. Top mince with mash, bake at 200C 25 minutes until golden."},{"id":"dbb0250","name":"Artichoke Heart Parmesan Bake","calories":215,"protein":22,"carbs":16,"fats":7,"category":"dinner","time":"25 mins","serves":4,"book":"Book 22","ingredients":["2 tins 425g artichoke hearts drained and halved","1 lemon juiced","1 tbsp butter","2 cloves garlic minced","2 tins 125g tuna in spring water","45g Italian style breadcrumbs","3 tbsp flat leaf parsley chopped","50g fresh grated Parmesan","Salt and cracked pepper"],"method":"Preheat oven 200C. Arrange artichokes cut side up in baking dish, spoon tuna through. Melt lemon juice, butter and garlic in pan, add breadcrumbs and toast. Add parsley, parmesan and seasoning, pour over artichokes. Bake 20 minutes."},{"id":"dbb0251","name":"Chicken Mole","calories":243,"protein":24,"carbs":10,"fats":12,"category":"dinner","time":"40 mins","serves":4,"book":"Book 22","ingredients":["2 red onions 1 chopped 1 sliced into rings","2 cloves garlic crushed","1 tbsp olive oil","6 skinless chicken thighs cut into strips","1 tin 400g chopped tomatoes","500ml chicken stock","45g cacao powder","Pinch chilli powder","Small bunch coriander","500g cooked rice to serve"],"method":"Cook chopped onion and garlic in 1 tsp olive oil. Add chicken, fry 2 minutes. Add tomatoes and stock, bring to simmer. Add cacao and chilli, cook 30 minutes until thick and rich. Stir in half the coriander. Serve with rice and onion rings."},{"id":"dbb0252","name":"Grilled Mackerel with Soy Lime and Ginger","calories":582,"protein":33,"carbs":61,"fats":25,"category":"dinner","time":"25 mins","serves":2,"book":"Book 22","ingredients":["300g mackerel","100g jasmine rice","4 spring onions sliced","1 red pepper deseeded and diced","For marinade: 1 tbsp low-sodium soy sauce, 1 lime juiced, 2cm fresh ginger grated, 1 garlic clove crushed, 2 tbsp honey"],"method":"Mix marinade ingredients, pour over mackerel. Chill 30 minutes. Grill mackerel skin-side up 5 minutes, turn, baste with marinade, grill 5 more minutes. Cook rice per packet, toss with spring onions and pepper. Serve hot with mackerel."},{"id":"dbb0253","name":"Tiramisu","calories":339,"protein":10,"carbs":41,"fats":16,"category":"dessert","time":"25 mins","serves":4,"book":"Book 22","ingredients":["3 egg whites","30g icing sugar","115g whipped low fat cream cheese softened","120ml strong espresso","120ml coffee liqueur","200g angel food cake or sponge cake","30g dark chocolate finely shaved"],"method":"Beat egg whites to soft peaks, add sugar and fold in. Fold cream cheese into half the whites, then remaining whites. Combine espresso and liqueur. Layer cake in wine glasses, soak with coffee mixture. Divide cream cheese mixture between glasses, top with dark chocolate shavings."},{"id":"dbb0254","name":"Strawberry Sorbet","calories":56,"protein":1,"carbs":13,"fats":0,"category":"dessert","time":"5 mins","serves":4,"book":"Book 22","ingredients":["300g frozen strawberries","1 tbsp maple syrup","180ml cold water"],"method":"Add frozen strawberries and maple syrup to food processor. Add half the water and blitz until smooth, gradually adding more water until correct consistency. Serve immediately or freeze. Soften 20 minutes before serving if frozen."},{"id":"dbb0255","name":"Vegan Peanut Butter Blossoms","calories":123,"protein":2,"carbs":13,"fats":7,"category":"dessert","time":"30 mins","serves":36,"book":"Book 22","ingredients":["3 tbsp water","1 tbsp ground flaxseed","120g granulated sugar","105g organic brown sugar","135g creamy natural peanut butter","120g butter softened","1 tsp vanilla extract","180g all-purpose flour","3/4 tsp baking soda","1/2 tsp baking powder","175g vegan chocolate chips","250ml coconut cream"],"method":"Preheat oven 190C. Mix water and flaxseed, set aside. Beat sugars, peanut butter, butter and vanilla with flax mixture. Add flour, baking powder, soda and salt. Roll into 2cm balls, roll in remaining sugar, place on baking sheets. Bake 10 minutes. Drizzle cooled cookies with melted chocolate chips mixed with coconut cream."},{"id":"dbb0256","name":"Protein Rice Krispie Treats","calories":145,"protein":4,"carbs":21,"fats":5,"category":"dessert","time":"40 mins","serves":14,"book":"Book 22","ingredients":["100g crispy rice cereal","55g protein powder","65g creamy almond butter","1 tbsp coconut oil","150g brown rice syrup","Optional 2-3 tbsp chocolate chips for drizzling"],"method":"Spray 8x8 pan with cooking spray. Combine cereal and protein powder. Heat almond butter, coconut oil and rice syrup to boil, cool slightly. Pour over cereal mix, stir. Press firmly into pan. Drizzle melted chocolate over top. Refrigerate 30 minutes then cut into squares."},{"id":"dbb0257","name":"Dark Chocolate Cherry Protein Bites","calories":176,"protein":4,"carbs":31,"fats":4,"category":"dessert","time":"35 mins","serves":12,"book":"Book 22","ingredients":["175g pitted dates","2 tbsp nut butter","225g dried sour cherries","1 scoop chocolate protein powder","50g rolled oats","45g dark chocolate chips"],"method":"Soak dates in warm water 20 minutes, drain. Blend dates and nut butter to a paste. Add cherries, protein powder and oats, blend. Mix in chocolate chips. Roll into small balls. Store in refrigerator or freezer."},{"id":"dbb0258","name":"Tropical Flapjacks","calories":255,"protein":3,"carbs":27,"fats":15,"category":"breakfast","time":"55 mins","serves":20,"book":"Book 23","ingredients":["80g dried mango","200g butter","80g creamed coconut","140g light brown soft sugar","100g golden syrup","350g oats","100g desiccated coconut"],"method":"Preheat oven 160C, line 20cm square tin. Melt butter, creamed coconut, sugar and syrup. Add oats, desiccated coconut, dried mango and pinch of salt. Tip into tin, press down. Bake 30-35 minutes until light gold. Store overnight then cut into 20 pieces."},{"id":"dbb0259","name":"Smoked Salmon Scramble Croissants","calories":439,"protein":23,"carbs":26,"fats":27,"category":"breakfast","time":"20 mins","serves":4,"book":"Book 23","ingredients":["4 croissants","6 medium eggs","25g butter cold and diced","1/2 tsp dried chives","150g smoked salmon slices"],"method":"Halve croissants, season lightly. Break eggs into cold non-stick pan, add half butter, stir frequently over low heat. Remove from heat and scrape sides repeatedly until soft curds form, about 5-6 minutes. Toast croissants. Add remaining butter to eggs, season, fold in chives. Spoon onto croissants, drape smoked salmon on top."},{"id":"dbb0260","name":"Fluffy Pancakes","calories":262,"protein":7,"carbs":54,"fats":2,"category":"breakfast","time":"15 mins","serves":2,"book":"Book 23","ingredients":["1 medium banana very ripe","100g white flour","1 tsp baking powder","1/2 tsp cinnamon","Light oil spray","125ml soya milk","2 tsp icing sugar"],"method":"Mash banana well. Add milk and vanilla, mix. Sift in flour, baking powder and cinnamon, mix into thick batter. Heat oiled pan, cook small ladlefuls 1-2 minutes each side. Sift icing sugar over each plate and serve."},{"id":"dbb0261","name":"Raspberry and Chocolate Pots","calories":196,"protein":15,"carbs":25,"fats":4,"category":"breakfast","time":"10 mins","serves":2,"book":"Book 23","ingredients":["200g frozen raspberries thawed","2 egg whites","320g vanilla low-fat yoghurt","4 level tsp cocoa powder","2 tbsp artificial sweetener","60g 0% Greek-style yoghurt","8 fresh raspberries","7g dark chocolate finely grated"],"method":"Divide frozen raspberries between four dessert glasses. Whisk egg whites to stiff peaks, fold in vanilla yoghurt, cocoa and sweetener. Spoon over raspberries. Top with fat-free yoghurt, fresh raspberries and grated chocolate."},{"id":"dbb0262","name":"Vegetarian English Breakfast","calories":434,"protein":32,"carbs":36,"fats":18,"category":"breakfast","time":"30 mins","serves":1,"book":"Book 23","ingredients":["2 medium eggs","200g baked beans","2 white mushrooms","3 cherry tomatoes","1 vegetarian sausage","20ml skimmed milk","Light oil spray"],"method":"Heat oiled pan, cook sausage and mushrooms 12-14 minutes turning frequently. Add tomatoes last 5 minutes. Whisk eggs with milk and black pepper. Scramble eggs in another pan 3-4 minutes. Microwave beans 1 minute. Serve all together."},{"id":"dbb0263","name":"Cheesy Courgette Muffins","calories":131,"protein":7,"carbs":10,"fats":7,"category":"snack","time":"45 mins","serves":12,"book":"Book 23","ingredients":["1 tbsp olive oil","300g courgette cut into small cubes","Salt and cracked pepper","125g Greek yoghurt","120g self-raising flour","1/4 tsp baking powder","1 tsp dried oregano","120g cheddar cheese cut into little cubes","1 egg"],"method":"Preheat oven 180C. Roast courgette 15-20 minutes. Cool, blend with Greek yoghurt and seasoning. Combine flour, baking powder, oregano and cheese. Whisk egg into courgette mixture, add to dry ingredients. Spoon into greased 12-cup muffin tray. Bake 15-18 minutes until golden."},{"id":"dbb0264","name":"Asian Style Pork Meatballs","calories":268,"protein":26,"carbs":5,"fats":16,"category":"lunch","time":"45 mins","serves":4,"book":"Book 23","ingredients":["500g pork mince","2 stalks spring onion diced","2 cloves garlic minced","1 tsp ginger paste","1 tbsp soy sauce","2 tsp sesame oil","2 tsp chilli paste","1/2 tsp Chinese five spice","1 egg","1 tbsp corn flour"],"method":"Preheat oven 180C. Add all ingredients to large mixing bowl, combine gently with hands. Roll into balls (about 2 tbsp each), place on lined baking tray. Cook 12-15 minutes until golden. Cool 10 minutes and serve with Asian-style dipping sauce."},{"id":"dbb0265","name":"Roasted Carrots","calories":124,"protein":2,"carbs":20,"fats":4,"category":"lunch","time":"45 mins","serves":4,"book":"Book 23","ingredients":["8 carrots sliced","1 red onion diced","1 tbsp olive oil","1/2 tsp cumin","40g raisins","10g fresh parsley"],"method":"Preheat oven 180C. Toss carrot, onion, olive oil and cumin together, lay on lined tray, cook 20-25 minutes. Transfer to serving plate, cool. Toss through raisins and sprinkle with fresh parsley."},{"id":"dbb0266","name":"Bacon and Tomato Salad","calories":260,"protein":11,"carbs":9,"fats":20,"category":"lunch","time":"30 mins","serves":4,"book":"Book 23","ingredients":["5 rashers bacon chopped","3 tbsp sherry vinegar","2 tbsp olive oil","2 tsp Dijon mustard","100g halloumi cheese chopped into cubes","1 tsp olive oil","500g heirloom tomatoes cut into wedges","1 tbsp fresh chives chopped"],"method":"Cook bacon in oven at 200C 20-25 minutes until very crispy. Mix sherry vinegar, olive oil and mustard for dressing. Fry halloumi in 1 tsp oil 2 minutes each side. Arrange tomatoes on large plate, toss with dressing, top with halloumi and chives."},{"id":"dbb0267","name":"Lentil Tomato and Kale Soup","calories":196,"protein":31,"carbs":10,"fats":4,"category":"lunch","time":"20 mins","serves":6,"book":"Book 23","ingredients":["1 tbsp extra virgin olive oil","1 sweet onion diced","2 large garlic cloves minced","3 celery stalks diced","1 bay leaf","1.5 tsp ground cumin","2 tsp chilli powder","1/2 tsp ground coriander","1/2 tsp smoked sweet paprika","1 tin 400ml diced tomatoes with juices","1.25-1.5L low-sodium vegetable broth","190g dried red lentils rinsed","3 handfuls kale or baby spinach"],"method":"Saute onion and garlic in olive oil 4-5 minutes. Add celery, cook few minutes. Add bay leaf and all spices. Add tomatoes, broth and lentils. Bring to boil, simmer uncovered 20-25 minutes. Stir through kale until wilted. Divide into bowls."},{"id":"dbb0268","name":"Creamy Salmon Pasta","calories":414,"protein":22,"carbs":59,"fats":10,"category":"dinner","time":"20 mins","serves":4,"book":"Book 23","ingredients":["300g dried farfalle pasta","180g light soft cheese","150g smoked salmon sliced into trimmings","4 tbsp fresh diced chives","Juice of half a lemon"],"method":"Boil pasta in salted water 10 minutes, drain reserving 1/2 cup cooking water. Return pasta to pan over medium-low heat. Add soft cheese, lemon juice and salmon with cracked pepper, mix well. Add pasta water to form creamy sauce. Add most of the chives, stir and divide into bowls."},{"id":"dbb0269","name":"Tuna Crunch Wraps","calories":304,"protein":31,"carbs":27,"fats":8,"category":"dinner","time":"5 mins","serves":2,"book":"Book 23","ingredients":["2 tortilla wraps","200g tuna from brine drained","90g plain greek yoghurt","1 red pepper sliced","Juice of half a lemon"],"method":"Drain tuna, prepare red pepper into 1cm strips. Combine tuna, yoghurt and lemon juice with black pepper, mix well. Spread equally over both tortillas, lay over pepper slices. Fold in sides then roll up. Slice in half and serve."},{"id":"dbb0270","name":"Mustard Glazed Chicken Legs and Boiled New Potatoes","calories":488,"protein":32,"carbs":36,"fats":24,"category":"dinner","time":"50 mins","serves":4,"book":"Book 23","ingredients":["3 tbsp wholegrain mustard","1 tbsp olive oil","1 tbsp honey","4 chicken thigh quarters 600g","800g new potatoes"],"method":"Preheat oven 200C. Mix mustard, olive oil and honey with salt and pepper, rub over chicken in deep roasting tray. Bake skin side up 45 minutes. Boil potatoes in salted water 10-12 minutes until fork tender. Drain. Divide chicken and potatoes between four dishes, coat with pan juices."},{"id":"dbb0272","name":"Mexican Bake","calories":372,"protein":40,"carbs":17,"fats":16,"category":"dinner","time":"35 mins","serves":4,"book":"Book 23","ingredients":["500g 5% minced beef","30g packet of fajita seasoning","400g can of red kidney beans drained","175g salsa","120g cheddar grated"],"method":"Preheat oven 180C. Brown beef in large heatproof frying pan. Add fajita seasoning and 200ml water, simmer 3-4 minutes. Stir in salsa and beans, cook 2-3 more minutes. Top with grated cheese, transfer to oven 15-20 minutes until cheese is bubbly and golden."},{"id":"dbb0273","name":"Red Chicken Curry","calories":349,"protein":33,"carbs":7,"fats":21,"category":"dinner","time":"70 mins","serves":4,"book":"Book 23","ingredients":["500g chicken breast diced","180g red curry paste","1 tbsp butter","400g can light coconut milk","180g mangetout"],"method":"Heat butter in deep lidded pan over medium-high until foaming. Add chicken and cook until lightly brown. Add red curry paste and coconut milk, mix thoroughly. Cook covered on hob 1 hour until chicken tender. Add mangetout for last 5 minutes."},{"id":"dbb0274","name":"One Pot Spaghetti","calories":427,"protein":38,"carbs":53,"fats":7,"category":"dinner","time":"15 mins","serves":4,"book":"Book 23","ingredients":["500g 5% beef mince","2 garlic cloves grated","1 onion finely sliced","500g carton of passata","250g wholewheat spaghetti"],"method":"Fry beef mince, garlic and onion until browned 6-8 minutes. Add passata, season with salt, pepper and pinch of sugar, simmer 5 more minutes. Add 500ml boiling water and break spaghetti in half into pan. Cook over medium heat 12-14 minutes until pasta cooked and sauce thickened."},{"id":"dbb0275","name":"Seafood Pasta","calories":453,"protein":23,"carbs":61,"fats":13,"category":"dinner","time":"15 mins","serves":2,"book":"Book 23","ingredients":["160g spaghetti","2 tbsp extra-virgin olive oil","1 garlic clove finely chopped","150g prawns","10g spinach"],"method":"Boil pasta in salted water 8-10 minutes. Heat 1 tbsp olive oil with garlic over low-medium heat until sizzling. Add prawns and cook until pink. Add cooked pasta and spinach over low heat, toss with tongs. Season, add final tbsp oil."},{"id":"dbb0276","name":"Black Bean Chicken with Broccoli and Cashews","calories":555,"protein":41,"carbs":64,"fats":15,"category":"dinner","time":"25 mins","serves":4,"book":"Book 23","ingredients":["400g chicken breast cut into chunks","2 tbsp sesame oil","220g broccoli","1 onion sliced","1 red chilli deseeded and sliced","275g fresh egg noodles","120g black bean stir fry sauce","50g cashews"],"method":"Season chicken. Stir fry in 1 tbsp sesame oil 10 minutes until golden, set aside. Add broccoli, onion and chilli to pan with 1 tbsp sesame oil, stir fry 3 minutes, add half cup water, cover until water evaporates. Cook noodles 6-8 minutes. Reduce heat, add chicken, black bean sauce and half cashews, heat through. Serve with noodles and remaining cashews."},{"id":"dbb0277","name":"Honey Chicken and Stir Fried Rice","calories":484,"protein":45,"carbs":49,"fats":12,"category":"dinner","time":"35 mins","serves":4,"book":"Book 23","ingredients":["220g broccoli","0.5 tsp chinese five-spice","600g chicken breast diced","25g honey","4 spring onions thinly sliced","2 red peppers deseeded and diced","2 tbsp rice wine vinegar","20g sesame seeds","2 tbsp tomato puree","150g sweetcorn drained","2 tbsp tamari","160g brown rice","2 tbsp olive oil"],"method":"Cook rice in 800ml boiling water 20-25 minutes. Toast sesame seeds, set aside. Mix tamari, honey, vinegar, tomato puree and five-spice for sauce. Cook peppers and sweetcorn 5 minutes, add rice. Cook chicken 6 minutes, add sauce and 4 tbsp water, cook 2 more minutes. Simmer broccoli 2 minutes. Serve with spring onions and sesame seeds."},{"id":"dbb0278","name":"Halloumi and Chickpea Curry","calories":610,"protein":43,"carbs":42,"fats":30,"category":"dinner","time":"25 mins","serves":2,"book":"Book 23","ingredients":["400g can of chickpeas plus their water","225g light halloumi cut into 1 inch cubes","500g passata","100g fresh spinach","30g curry powder","1 medium onion finely diced","1 tbsp olive oil"],"method":"Saute onion in oil with pinch of salt 2-3 minutes until soft. Add curry powder, stir into onion. Add halloumi and coat in spices, then chickpeas including water, simmer 2 minutes. Add passata, simmer 10 minutes. Add spinach, cook 2-3 minutes until wilted. Serve between two."},{"id":"dbb0279","name":"Creamy Asparagus Pasta","calories":601,"protein":25,"carbs":69,"fats":25,"category":"dinner","time":"20 mins","serves":4,"book":"Book 23","ingredients":["350g spaghetti","3 tbsp olive oil","225g asparagus tips trimmed and halved","20g pine nuts","1 garlic clove crushed","2 tsp dried basil","4 eggs","100g single cream","40g vegetarian Parmesan grated"],"method":"Cook spaghetti 10 minutes, drain, return to pan. Heat oil, fry asparagus and pine nuts 2 minutes. Add 3 tbsp water, cover 4 minutes. Add garlic and basil, cook 1 minute. Beat eggs and cream together. Stir into pasta with asparagus, heat 1 minute. Serve topped with parmesan."},{"id":"dbb0280","name":"Pan Fried Sole with Peas and Crispy Bacon","calories":454,"protein":40,"carbs":15,"fats":26,"category":"dinner","time":"35 mins","serves":4,"book":"Book 23","ingredients":["8 rashers streaky bacon","40g plain flour","2 tbsp sunflower oil","40g butter","320g frozen peas","600g lemon sole fillets","Juice of 1/4 lemon","1 tsp parsley finely chopped"],"method":"Grill bacon until crisp, keep warm. Boil peas. Dip sole in seasoned flour. Melt half oil and 20g butter in large pan, fry half the fillets 2 minutes each side until golden. Keep warm. Melt remaining butter until pale brown, add lemon juice and parsley. Season and spoon over fish. Serve with bacon and peas."},{"id":"dbb0281","name":"Traybaked Hoisin Chicken and Rice","calories":645,"protein":60,"carbs":81,"fats":9,"category":"dinner","time":"40 mins","serves":2,"book":"Book 23","ingredients":["1 clove garlic grated","1 medium red onion chopped","1/2 head broccoli florets","1 tbsp olive oil","2 tbsp soy sauce","3 tbsp hoisin sauce 60g","120g basmati rice","400g chicken breast"],"method":"Preheat oven 200C. Mix hoisin with soy and garlic. Add chicken, red onion and half hoisin mixture to roasting dish with oil, coat well. Roast 15 minutes. Add broccoli, stir, roast another 15 minutes. Cook rice in 300ml water covered 10 minutes. Thicken remaining sauce in pan 1 minute. Serve rice with chicken and sauce."},{"id":"dbb0282","name":"Peri Peri Chicken and Oregano Potatoes","calories":582,"protein":43,"carbs":62,"fats":18,"category":"dinner","time":"35 mins","serves":2,"book":"Book 23","ingredients":["1 clove garlic grated","450g potatoes diced into 1 inch chunks","2 tsp oregano","15g peri peri seasoning","3 tbsp olive oil","30g honey","300g chicken breast","30g apple cider vinegar","125g cherry tomatoes","40g rocket"],"method":"Preheat oven 200C. Toss potatoes with 1/2 tbsp oil, oregano and season. Mix peri-peri seasoning, garlic and half honey with 1/2 tbsp oil, coat chicken. Roast potatoes top shelf and chicken middle shelf 25-30 minutes. Mix cider vinegar, 2 tbsp oil and remaining honey for dressing. Toss tomatoes and rocket in dressing. Divide between two."},{"id":"dbb0283","name":"Strawberry and Elderflower Sorbet","calories":112,"protein":1,"carbs":27,"fats":0,"category":"dessert","time":"25 mins + freezing","serves":4,"book":"Book 23","ingredients":["75g sugar","250g strawberries chopped","50g elderflower cordial","Juice of 1 lemon"],"method":"Heat 1/2 cup water with sugar, stir to dissolve, cool completely. Blend strawberries and elderflower cordial to puree, sieve to remove seeds. Add lemon juice. Stir syrup into strawberry mix, pour into shallow container, freeze at least 6 hours, beating every 2 hours until smooth."},{"id":"dbb0284","name":"Protein Fudge","calories":175,"protein":6,"carbs":13,"fats":11,"category":"dessert","time":"2 hrs 10 mins","serves":10,"book":"Book 23","ingredients":["180g 70% dark chocolate","120g smooth peanut butter","30g chocolate whey protein"],"method":"Break chocolate and add to bowl with peanut butter. Melt in microwave in 15-second bursts until fully melted. Fold in protein powder until smooth. Transfer to silicone moulds, refrigerate 2 hours until set."},{"id":"dbb0285","name":"Chocolate Hazelnut Cheesecakes","calories":385,"protein":7,"carbs":15,"fats":33,"category":"dessert","time":"10 mins","serves":2,"book":"Book 23","ingredients":["50g dark chocolate","80g cream cheese","50g roast hazelnuts"],"method":"Add chopped dark chocolate to bowl with 2 tbsp boiling water, stand 1 minute to melt, stir until glossy. Chop hazelnuts and divide between two small glasses. Slice cheese into 4 rounds, place one in each bowl, drizzle with half the chocolate, top with remaining cheese and chocolate."},{"id":"dbb0286","name":"Banoffee Pie","calories":217,"protein":7,"carbs":27,"fats":9,"category":"dessert","time":"40 mins","serves":1,"book":"Book 23","ingredients":["2 reduced-fat plain biscuits","1 tsp butter melted","50g plain Skyr","10g toffee sauce","10g squirty cream UHT","30g banana"],"method":"Crush biscuits, mix with melted butter, press into small glass. Chill 30 minutes. Mix Skyr with toffee sauce, add as second layer. Slice banana and lay on top, reserving a slice to decorate. Add cream layer, top with last banana slice."},{"id":"dbb0287","name":"Vanilla Chocolate and Strawberry Ice Cream","calories":248,"protein":11,"carbs":42,"fats":4,"category":"dessert","time":"20 mins + 5 hrs freezing","serves":4,"book":"Book 23","ingredients":["1kg vanilla flavoured 0% yoghurt","1 tsp vanilla extract","1-2 tsp artificial sweetener","6 strawberries 4 roughly chopped 2 sliced to decorate","7g dark chocolate"],"method":"Mix yoghurt, vanilla and sweetener. Add 4 strawberries, freeze 30 minutes. Stir to break ice crystals. Freeze 4 hours, stirring hourly. Before serving, melt chocolate. Serve topped with remaining strawberries and drizzled chocolate."},{"id":"dbb0288","name":"Protein Banana Parfait","calories":449,"protein":43,"carbs":49,"fats":9,"category":"breakfast","time":"25 mins","serves":1,"book":"Book 24","ingredients":["30g whey protein","170g strained greek yoghurt","2 plain digestive biscuits crushed","1/2 small banana sliced","20g honey"],"method":"Mix whey protein with 1/2 scoop water to thick paste. In a glass, add crushed digestives, half the yoghurt and half the protein mixture. Top with banana slices, honey, then layer again with protein mixture and finish with yoghurt. Refrigerate 20 minutes or overnight."},{"id":"dbb0289","name":"Pizza Croissant","calories":397,"protein":19,"carbs":33,"fats":21,"category":"breakfast","time":"15 mins","serves":2,"book":"Book 24","ingredients":["2 x 60g croissants","80ml tomato puree","60g half fat cheddar cheese grated","6 slices pepperoni"],"method":"Preheat oven 180C. Cut croissants down the side to make a pocket. Spread puree inside each, add cheese and pepperoni slices. Bake 8-10 minutes until cheese fully melted. Cool 1 minute before eating."},{"id":"dbb0290","name":"Scrambled Eggs and Beans","calories":495,"protein":36,"carbs":36,"fats":23,"category":"breakfast","time":"15 mins","serves":1,"book":"Book 24","ingredients":["1 tsp butter","1 tbsp ketchup","3 eggs beaten","200g can baked beans"],"method":"Cook mushrooms in non-stick pan 5 minutes, remove and set aside. Pour beaten eggs into pan over low heat, cook 1-2 minutes stirring until scrambled to liking. Heat baked beans until piping hot. Add eggs and beans to plate and serve."},{"id":"dbb0291","name":"Caprese Breakfast Sandwich","calories":400,"protein":20,"carbs":35,"fats":20,"category":"breakfast","time":"10 mins","serves":1,"book":"Book 24","ingredients":["60g avocado flesh only","2 medium slices of brown bread","6 cherry tomatoes halved","1 tbsp balsamic vinegar","1/2 ball of light mozzarella drained and sliced"],"method":"Mash avocado flesh with balsamic vinegar and pinch of salt into chunky consistency. Lay out bread, spread chunky avocado onto one half, add tomatoes and mozzarella. Top with other slice. Slice and serve fresh."},{"id":"dbb0292","name":"Peanut Butter Jelly Cottage Cheese Bowl","calories":501,"protein":35,"carbs":52,"fats":17,"category":"breakfast","time":"10 mins","serves":1,"book":"Book 24","ingredients":["250g cottage cheese","30g oats","20g jam","20g crunchy peanut butter","40g banana sliced"],"method":"Add all of the ingredients to a bowl or container. Enjoy immediately or refrigerate overnight."},{"id":"dbb0293","name":"Portobello Mushroom Stir-Fry","calories":173,"protein":6,"carbs":26,"fats":5,"category":"lunch","time":"30 mins","serves":3,"book":"Book 24","ingredients":["2 portobello mushrooms","1 medium red bell pepper thinly sliced","90g broccoli","100g chopped spring onions","For marinade: 2 cloves garlic minced, 2 tsp minced ginger, 3-4 tbsp maple syrup, 1/2 tsp red pepper flake, 3-4 tbsp tamari, 1 tbsp sesame oil, 3 tbsp lime juice, 1 tbsp water","500g cooked brown rice to serve","1 tsp sesame seeds"],"method":"Whisk marinade ingredients. Slice portobellos into thin strips, marinate 10-12 minutes. Saute mushrooms in sesame oil 2-4 minutes each side until golden. Set aside. Stir fry red pepper and broccoli 2-3 minutes, add spring onions and remaining marinade, toss and cook 1 minute. Serve with rice and sesame seeds."},{"id":"dbb0294","name":"Cheese Pie","calories":448,"protein":11,"carbs":29,"fats":32,"category":"lunch","time":"1 hr 20 mins","serves":16,"book":"Book 24","ingredients":["150g feta cheese","500g ricotta cheese","1 egg","4 pieces puff pastry","Fresh dill optional"],"method":"Grate feta and mix with ricotta and egg. Roll out puff pastry, spread 1/4 cheese mixture on each, roll up. Brush with egg wash, poke holes. Bake at 190C about 1 hour until golden brown. Cool on rack 10 minutes and cut."},{"id":"dbb0295","name":"Pork Tenderloin with Potatoes and Apple","calories":362,"protein":42,"carbs":26,"fats":10,"category":"dinner","time":"50 mins","serves":4,"book":"Book 24","ingredients":["800g pork tenderloin","1 tbsp olive oil","1 tsp salt pepper and rosemary","1 onion sliced","450g potatoes","200g apples Golden Delicious","60ml chicken stock","2 tbsp fresh parsley"],"method":"Preheat oven 230C. Coat pork with oil, salt, pepper and rosemary. Brown in hot pan with onion. Transfer to casserole dish. Parboil potatoes 5 minutes, quarter apples. Arrange around meat. Roast 30 more minutes. Add stock to pan, boil 5 minutes. Serve with potatoes, apples and sauce, sprinkled with parsley."},{"id":"dbb0296","name":"Spicy Tomato Basil Soup","calories":156,"protein":3,"carbs":9,"fats":12,"category":"lunch","time":"80 mins","serves":6,"book":"Book 24","ingredients":["8 plum tomatoes","1 onion chopped","6 cloves garlic","2 tbsp butter","3 tbsp olive oil","1L vegetable broth","20g basil chopped","2 tsp tomato puree","1/2 tsp each salt pepper thyme and paprika","1 tsp sriracha","1 tsp crushed red pepper","1/2 tsp cayenne"],"method":"Roast halved tomatoes at 200C with oil and salt 40 minutes. Cook onion and garlic in 1 tbsp oil 5 minutes, add broth, bring to boil. Add roasted tomatoes, basil, butter, tomato puree, spices and simmer 30 minutes. Blend until smooth."},{"id":"dbb0297","name":"Cucumber and Olive Salad","calories":129,"protein":6,"carbs":15,"fats":5,"category":"lunch","time":"15 mins","serves":4,"book":"Book 24","ingredients":["1 large cucumber sliced","1/2 red onion sliced","20 black olives sliced","1 tin 400g chickpeas rinsed and drained","2 tbsp fresh dill","2 tbsp balsamic vinegar","1.5 tbsp lemon juice"],"method":"Toss cucumber, red onion, olives, chickpeas and dill in serving bowl. Whisk lemon juice and balsamic vinegar together. Pour dressing all over the salad."},{"id":"dbb0298","name":"Salmon Asparagus Traybake","calories":617,"protein":56,"carbs":42,"fats":25,"category":"dinner","time":"30 mins","serves":2,"book":"Book 24","ingredients":["440g salmon fillets","1 tsp zaatar seasoning","1 tsp olive oil","400g potatoes diced into 1 inch cubes","220g asparagus"],"method":"Preheat oven 200C. Rub salmon with zaatar, olive oil, salt and pepper, marinate 10 minutes. Roast potatoes 10 minutes. Add salmon and asparagus to tray, roast 20 minutes until fish firm, asparagus tender and potatoes golden."},{"id":"dbb0299","name":"Tofu Sweet Potatoes","calories":321,"protein":16,"carbs":44,"fats":9,"category":"dinner","time":"20 mins","serves":2,"book":"Book 24","ingredients":["300g firm tofu","1 tsp olive oil","60g spinach","1 red pepper sliced very finely","1 tsp Cajun seasoning","2 medium sweet potatoes 180g each"],"method":"Pierce sweet potatoes and microwave 6 minutes until soft. Cut tofu into small cubes. Heat oil in non-stick pan, add tofu and Cajun seasoning, cook 4 minutes. Transfer tofu to bowl, add red pepper to pan then spinach, stir until wilted. Mix with tofu. Slice potatoes open, mash insides, fill with tofu mix."},{"id":"dbb0300","name":"Mushroom and Chilli Pasta","calories":470,"protein":17,"carbs":78,"fats":10,"category":"dinner","time":"25 mins","serves":4,"book":"Book 24","ingredients":["500g white button mushrooms sliced","1 tbsp olive oil","3 garlic cloves crushed","1 red chilli deseeded and diced","75g half fat creme fraiche","400g pasta of choice","1 tbsp parsley","40g vegetarian Parmesan"],"method":"Cook pasta in salted boiling water 10-12 minutes. Dry fry mushrooms over medium-low heat until juices run, increase heat until liquid evaporates. Add olive oil, garlic, chilli and creme fraiche, simmer 4 minutes. Combine with pasta and parsley. Top with Parmesan."},{"id":"dbb0301","name":"Honey Baked Feta with Pitta","calories":453,"protein":26,"carbs":58,"fats":13,"category":"dinner","time":"25 mins","serves":2,"book":"Book 24","ingredients":["200g light feta cheese","40g honey","1 tsp olive oil","2 tsp dukkah seasoning","2 small pitta breads 75g"],"method":"Preheat oven 200C. Place feta in small roasting tin, drizzle with oil, add honey on top, coat with dukkah and season. Roast 16-18 minutes until soft inside and crisp on top. Add pitta to oven last 3-4 minutes. Slice pitta and serve with feta."},{"id":"dbb0302","name":"Fast Asian Fishcakes","calories":511,"protein":56,"carbs":2,"fats":31,"category":"dinner","time":"20 mins","serves":2,"book":"Book 24","ingredients":["1 stick lemongrass peeled and finely chopped","6cm piece ginger peeled and finely chopped","15g fresh coriander finely chopped","500g skinless salmon fillets","1 tbsp olive oil"],"method":"Crush lemongrass, remove tough outer layer. Chop salmon into 1cm chunks, chop half until almost a puree, mix chunky bits back through, season. Divide into four, shape into 2cm-thick burger patties. Fry in olive oil over medium-high heat 2 minutes each side until golden."},{"id":"dbb0303","name":"Cumberland Pie","calories":405,"protein":38,"carbs":43,"fats":9,"category":"dinner","time":"60 mins","serves":4,"book":"Book 24","ingredients":["500g white potatoes","500g cauliflower","225g carrots diced","1 large onion diced","500g 5% beef mince","1 beef stock cube","1 can chopped peeled tomatoes","40g reduced-fat cheddar grated"],"method":"Preheat oven 180C. Parboil potato and cauliflower chunks 18 minutes until soft. Brown mince, remove. Sweat onion and carrots 8 minutes. Add mince back, crumble stock cube, add tomatoes, cook 2 minutes. Spoon into ovenproof dish. Mash potato and cauliflower together, season, spoon over mince, top with grated cheese. Bake 30-35 minutes."},{"id":"dbb0304","name":"Hot Pizza","calories":475,"protein":29,"carbs":38,"fats":23,"category":"dinner","time":"20 mins","serves":1,"book":"Book 24","ingredients":["1 flatbread","45g reduced-fat cheddar cheese","100g passata","1 tsp Italian herbs","6 slices pepperoni","1 green chilli deseeded and sliced"],"method":"Spread passata on flatbread, add Italian herbs, then cheese. Top with pepperoni and green chilli. Bake in oven 12-15 minutes until cheese has melted and is crispy."},{"id":"dbb0305","name":"Fish and Chips","calories":639,"protein":29,"carbs":61,"fats":31,"category":"dinner","time":"40 mins","serves":2,"book":"Book 24","ingredients":["30g panko breadcrumbs","1 lemon","250g cod fillets","500g white potatoes cut into chips","2 tbsp olive oil","50g mayonnaise","5g chives"],"method":"Preheat oven 220C. Toss potatoes in 1 tbsp olive oil and seasoning, roast 20 minutes until crisp. Mix chopped chives with breadcrumbs, salt and 1 tbsp olive oil. Top cod fillets with breadcrumb mix, press firmly. Bake 12-15 minutes until golden. Mix juice of 1/4 lemon with mayonnaise. Serve fish with chips and mayonnaise."},{"id":"dbb0306","name":"Sausages with Chips and Beans","calories":563,"protein":30,"carbs":68,"fats":19,"category":"dinner","time":"30 mins","serves":2,"book":"Book 24","ingredients":["2 garlic cloves finely diced","1 can 400g butter beans","1 tbsp balsamic vinegar","2 dried bay leaves","240g 6 reduced-fat sausages","300g potatoes","2 tbsp olive oil","2 tsp tomato paste","1/2 tsp sugar","1 medium onion finely diced","1 can 400g chopped tomatoes"],"method":"Preheat oven 220C. Cut potatoes into wedges, toss in 1 tbsp oil with salt, roast with sausages 25 minutes. Cook onion in 1 tbsp oil until soft, add garlic, balsamic, butter beans, chopped tomatoes, bay leaves and tomato paste with salt and sugar. Cook 10 minutes. Serve sausages, chips and beans together."},{"id":"dbb0307","name":"Kung Pao Chicken","calories":463,"protein":48,"carbs":25,"fats":19,"category":"dinner","time":"25 mins","serves":2,"book":"Book 24","ingredients":["4 garlic cloves finely chopped","5cm piece ginger peeled and finely chopped","2 spring onions chopped","2 red chillies deseeded and chopped","300g skinless chicken breast diced","1 tbsp olive oil","1 tbsp runny honey","2 tbsp soy sauce","1/2 tbsp rice wine vinegar","2 tsp ground black pepper","50g unsalted peanuts"],"method":"Saute garlic, ginger, spring onions and chillies in olive oil with pinch of salt 3-5 minutes. Add chicken, cook 8 minutes until cooked through. Add honey, soy, rice wine vinegar and black pepper, cook 3-4 minutes until glazed. Divide between two, sprinkle peanuts to garnish."},{"id":"dbb0308","name":"Sticky Asian Ribs","calories":348,"protein":24,"carbs":27,"fats":16,"category":"dinner","time":"2 hrs 15 mins","serves":4,"book":"Book 24","ingredients":["100g hoisin sauce","100g ketchup","100g sriracha sauce","1kg rack of pork spare ribs cut into individual ribs"],"method":"Preheat oven 120C. Combine hoisin, ketchup and sriracha, reserve 2 tbsp. Season ribs, coat in sauce. Transfer to foil-lined tray, seal tightly in foil. Cook 2 hours. Increase oven to 200C. Remove top foil, transfer ribs, brush with reserved sauce. Bake uncovered 8 minutes until edges just starting to char."},{"id":"dbb0309","name":"Baked Courgette Slice","calories":258,"protein":22,"carbs":11,"fats":14,"category":"dinner","time":"60 mins","serves":4,"book":"Book 24","ingredients":["80g leek white only washed and thinly sliced","750g courgette thinly sliced","8 medium eggs","40g vegetarian Parmesan","35g plain flour"],"method":"Preheat oven 160C. Soften leek in oiled pan with 1 tbsp water 5 minutes. Add courgette, cover and cook 5 minutes until softened. Whisk eggs, parmesan and flour. Add courgette mixture, season. Pour into lined 20cm square tin, bake 40 minutes until centre just set. Stand 10 minutes, cut into pieces."},{"id":"dbb0310","name":"Butterbean Soup","calories":235,"protein":9,"carbs":34,"fats":7,"category":"dinner","time":"30 mins","serves":2,"book":"Book 24","ingredients":["1 tbsp olive oil","1 large white onion diced","200g carrot diced","240g butter beans including their water","1 vegetable stock cube"],"method":"Heat oil in deep saucepan over low heat, add carrot and onion, cook 6 minutes until onion soft. Add butter beans, stock cube and 500ml water, simmer 10 minutes. Blend until smooth. Add salt if needed before serving."},{"id":"dbb0311","name":"Tuna Salad","calories":358,"protein":27,"carbs":4,"fats":26,"category":"dinner","time":"10 mins","serves":2,"book":"Book 24","ingredients":["200g tuna chunks","60g mayonnaise","1 head of romaine lettuce sliced","1/4 red onion","40g tinned corn drained"],"method":"Combine drained tuna, mayonnaise, onion, corn and black pepper in a bowl, mix well. Divide sliced romaine between two bowls. Add equal amounts of tuna mayo mix to each bowl."},{"id":"dbb0312","name":"Baked Sausage and Beans","calories":446,"protein":30,"carbs":59,"fats":10,"category":"dinner","time":"55 mins","serves":4,"book":"Book 24","ingredients":["800g butternut squash peeled deseeded and cut into small chunks","2 tsp olive oil","12 reduced fat pork sausages","2 x 400g cans baked beans","250g tomatoes cut into wedges"],"method":"Preheat oven 200C. Toss squash with olive oil and seasoning, roast 15 minutes. Brown sausage chunks in pan, cut into pieces, add to squash and roast 15 minutes. Mix beans with 3 tbsp water, add with tomatoes to tin, roast 15-20 minutes."},{"id":"dbb0313","name":"Cup Crumble","calories":245,"protein":5,"carbs":36,"fats":9,"category":"dessert","time":"6 mins","serves":1,"book":"Book 24","ingredients":["75g fresh berries chopped","40g white self-raising flour","2 tsp stevia sweetener","10g butter","3 tsp skimmed milk"],"method":"Add berries to bottom of large microwave-safe cup. Rub flour, sweetener and butter together until like breadcrumbs. Add milk and combine. Spoon roughly over berries. Microwave on high 1.5 minutes. Cool 2 minutes before serving."},{"id":"dbb0314","name":"Vegan Chocolate Bites","calories":63,"protein":2,"carbs":7,"fats":3,"category":"dessert","time":"1 hr 15 mins","serves":20,"book":"Book 24","ingredients":["85g almonds","45g oats","20g desiccated coconut","9 dates pitted","22g cocoa powder"],"method":"Blend almonds, oats and coconut until finely chopped. Add dates, cocoa powder and 1-2 tsp water, process until combined. Roll heaped tsp of mixture into 20 balls with damp hands. Refrigerate 1 hour until firm."},{"id":"dbb0315","name":"Roasted Strawberries and Rice Pudding","calories":287,"protein":4,"carbs":52,"fats":7,"category":"dessert","time":"40 mins","serves":3,"book":"Book 24","ingredients":["175g strawberries halved","50g white sugar","85g pudding rice","325g oat milk","50g single cream"],"method":"Preheat oven 180C. Mix 20g sugar with strawberries, roast 15 minutes until caramelised. Wash rice under cold water 5 minutes. Add to saucepan with oat milk, cream and remaining 30g sugar, simmer over low heat 30 minutes. Divide between three, top with strawberries and syrup."},{"id":"dbb0316","name":"Raspberry Trifles","calories":146,"protein":9,"carbs":14,"fats":6,"category":"dessert","time":"2 hrs","serves":2,"book":"Book 24","ingredients":["1 sachet sugar free raspberry jelly","60g raspberries","150g banana flavoured yoghurt","1 tsp hundreds and thousands sprinkles","4 tbsp 70g reduced fat dairy spray cream"],"method":"Dissolve jelly sachet in 1 cup boiling water, add 1 cup cold water, pour into serving glasses. Add half the raspberries. Cool then refrigerate 1.5 hours to set. Remove from fridge, spoon over yoghurt then spray cream, add hundreds and thousands and remaining raspberries on top."},{"id":"dbb0317","name":"Peanut Butter Protein Cookies","calories":105,"protein":6,"carbs":9,"fats":5,"category":"dessert","time":"20 mins","serves":12,"book":"Book 24","ingredients":["90g oats","50g whey protein vanilla flavoured","100g peanut butter","25g unsweetened applesauce","40g honey"],"method":"Preheat oven 180C. Combine oats and protein powder. Mix peanut butter, applesauce and honey separately. Combine wet and dry mixtures, knead into dough. Form into 1-inch balls, place on lined baking sheet, press into cookie shape with fork. Bake 10 minutes. Cool completely."},{"id":"dbb0318","name":"Tropical Cottage Cheese Breakfast Bowl","calories":319,"protein":28,"carbs":27,"fats":11,"category":"breakfast","time":"5 mins","serves":1,"book":"Book 25","ingredients":["250g cottage cheese","80g pineapple","12g shredded coconut","50g banana sliced"],"method":"Place all ingredients in a bowl. Refrigerate in an air-tight container for up to four days. Mix before serving if desired."},{"id":"dbb0319","name":"Bean and Cheese Crumpets","calories":603,"protein":31,"carbs":68,"fats":23,"category":"breakfast","time":"10 mins","serves":1,"book":"Book 25","ingredients":["2 crumpets","200g tin of baked beans","4 slices of very thin ham","20g 50% reduced fat cheddar cheese","20g butter"],"method":"Toast crumpets 3 minutes. Heat beans in saucepan stirring frequently. Add 10g butter to each crumpet. Add ham, then beans on top, finally the cheese."},{"id":"dbb0320","name":"Baked Oats","calories":287,"protein":21,"carbs":35,"fats":7,"category":"breakfast","time":"20 mins","serves":1,"book":"Book 25","ingredients":["45g oats","15g vegan protein","1/4 tsp baking powder","80ml almond milk","1 egg white"],"method":"Preheat oven 180C. Add all ingredients to a blender and blitz into a batter. Spray an oven safe ramekin with low calorie oil, add half the batter. Bake 15 minutes, cool 2 minutes before eating. Add favourite nutritional toppings."},{"id":"dbb0321","name":"Stacked Raspberry Parfait","calories":318,"protein":29,"carbs":19,"fats":14,"category":"breakfast","time":"30 mins","serves":2,"book":"Book 25","ingredients":["1/4 tsp vanilla extract","45g desiccated coconut","2 tsp calorie free sweetener","150g raspberries","500g 0% strained greek yoghurt"],"method":"Combine yoghurt, 1/2 tsp sweetener and vanilla, mix well. Puree raspberries and remaining sweetener in blender. In tall glass, alternate layers of yoghurt, raspberry puree and coconut, two layers of each. Refrigerate 20 minutes and serve."},{"id":"dbb0322","name":"Eastern Eggs","calories":310,"protein":26,"carbs":2,"fats":22,"category":"breakfast","time":"6 mins","serves":1,"book":"Book 25","ingredients":["3 large eggs whisked","1 tsp butter","1/2 clove of garlic grated","1/2 tsp cumin seeds","35g cherry tomatoes halved"],"method":"Place non-stick frying pan on high heat. Melt butter, drop in garlic and cumin seeds, stir and cook 15 seconds. Pour in eggs, stir well and scramble, remove from heat. Residual heat will finish cooking. Season with sea salt and black pepper, scatter halved cherry tomatoes."},{"id":"dbb0323","name":"Green Beans with Garlic and Walnuts","calories":260,"protein":16,"carbs":22,"fats":12,"category":"lunch","time":"20 mins","serves":4,"book":"Book 25","ingredients":["400g extra fine green beans trimmed","2 tbsp olive oil","1 clove of garlic finely diced","50g walnuts diced","1 tbsp lemon juice"],"method":"Boil beans 2 minutes, drain, rinse under cold water, dry. Heat oil in pan over medium-high, add garlic, season and fry 1 minute. Add walnuts and fry 5 more minutes. When ready to serve, stir through beans and lemon juice, reheat until warm."},{"id":"dbb0324","name":"Bacon Rice and Bean Stuffed Peppers","calories":210,"protein":10,"carbs":20,"fats":10,"category":"lunch","time":"30 mins","serves":4,"book":"Book 25","ingredients":["2 red peppers halved and deseeded","40g red onion diced","50g white rice","1/2 can red kidney beans drained","2 slices of bacon chopped","100g mozzarella","1 tbsp olive oil","1/2 tsp smoked paprika","1 tsp dried mint"],"method":"Preheat oven 180C. Soak rice in water. Roast pepper halves cut side down 12-14 minutes. Rinse soaked rice, cook in 3/4 cup water covered on low. Cook bacon in olive oil 4 minutes, add onion 4 more minutes. Add cooked rice, beans, mint and paprika to pan, cook 6 minutes. Fill pepper halves with mixture, top with mozzarella, bake 8 minutes."},{"id":"dbb0325","name":"Roasted Squash Hummus","calories":269,"protein":10,"carbs":28,"fats":13,"category":"lunch","time":"55 mins","serves":2,"book":"Book 25","ingredients":["800g squash peeled and cut into 2cm cubes","1 tbsp olive oil","6 cloves of garlic","1 tin 400g chickpeas drain and reserve half liquid","3 tbsp tahini","1 lemon juiced","25g coriander leaves"],"method":"Preheat oven 200C. Coat squash with olive oil, season. Roast 45 minutes, add garlic halfway. Blend half the squash with all the garlic and remaining ingredients. Transfer to serving dish, add remaining squash on top, scatter coriander leaves."},{"id":"dbb0326","name":"Red Slaw","calories":73,"protein":2,"carbs":14,"fats":1,"category":"lunch","time":"35 mins","serves":4,"book":"Book 25","ingredients":["250g red cabbage sliced thinly","1/2 red onion sliced thinly","225g carrots grated","80g pickles plus 2 tbsp of their brine","1/2 lime juiced"],"method":"Put cabbage and onion in bowl, season well with salt and a small pinch of sugar, leave 30 minutes. Stir carrot, pickles and their brine through the sliced cabbage. If making in advance, prep vegetables but don't season or dress until ready to eat."},{"id":"dbb0327","name":"Roasted Carrots with an Almond Crumb","calories":85,"protein":2,"carbs":8,"fats":5,"category":"lunch","time":"35 mins","serves":2,"book":"Book 25","ingredients":["500g carrots","1 tbsp olive oil","1 tsp ground ginger","1/2 orange zest","15g flaked almonds","1 tbsp fresh micro diced parsley","1/2 tsp smoked paprika"],"method":"Preheat oven 180C. Cube carrots, add to deep roasting dish, add oil, ginger and paprika, toss together. Roast 25-30 minutes until tender. Zest orange, dice parsley, lightly crush almonds in mortar and pestle. Season carrots, lay crumb over top."},{"id":"dbb0328","name":"Turkey Sausage and Egg Hash","calories":370,"protein":29,"carbs":23,"fats":18,"category":"dinner","time":"30 mins","serves":2,"book":"Book 25","ingredients":["220g lean turkey sausages diced into 1 inch lengths","140g butternut squash cubed","80g mushrooms halved","2 eggs boiled and diced","360g cherry tomatoes halved","1/4 red onion diced","60g avocado diced","1 tbsp fresh coriander chopped","Juice of 1 lemon"],"method":"Hard boil eggs 8 minutes. Cook sausage slices in non-stick pan 5-6 minutes until cooked through, set aside. Add butternut squash and mushrooms, cook 8-10 minutes until squash is very tender. Add sausages back, heat through 1 minute. In salad bowl, add avocado, coriander, tomatoes, lemon juice and season. Toss sausage mixture into salad bowl. Serve between two."},{"id":"dbb0329","name":"Surf and Turf Kebabs with Smoked Mayo","calories":446,"protein":48,"carbs":5,"fats":26,"category":"dinner","time":"15 mins","serves":2,"book":"Book 25","ingredients":["300g rump steak lean only sliced into 1cm strips","150g raw prawns","2 tsp smoked paprika","1 tsp garlic granules","1 tsp sea salt","1 red pepper cubed","1/2 tsp chilli flakes","2 limes","For smoked mayo: 50g mayonnaise, 1 tsp smoked paprika, juice of 1/2 lime"],"method":"Mix steak and prawns with paprika, garlic granules, salt and chilli flakes. Cut each lime into 8 wedges. Thread onto 4 skewers alternating steak, pepper, prawns and lime. Mix smoked mayo ingredients. Grill under high heat 6 minutes, turning halfway. Ensure prawns are pink and cooked. Serve with smoked mayo."},{"id":"dbb0330","name":"Burger Salad","calories":504,"protein":47,"carbs":25,"fats":24,"category":"dinner","time":"25 mins","serves":2,"book":"Book 25","ingredients":["4 lean beef burgers","2 baby gem lettuce","8 spring onions","8 cherry tomatoes","4 radishes","1 small red onion","Juice of 1/2 a lime","60g light mayonnaise","1 tsp smoked paprika"],"method":"Halve lettuce and tomatoes, slice radishes and red onion. Marinate red onion in juice of 1/4 lime with pinch of salt. Grill burgers under maximum heat 6 minutes each side. Arrange salad with marinated onions, add mayonnaise with water and smoked paprika and toss. Top with burgers and grilled onions."},{"id":"dbb0331","name":"Crunchy Black Bean Wraps","calories":542,"protein":18,"carbs":59,"fats":26,"category":"dinner","time":"20 mins","serves":4,"book":"Book 25","ingredients":["1 tbsp olive oil","1 small red onion finely diced","400g tin black beans rinsed and drained","2 roasted red peppers from jar diced","4 x 58g large flour tortillas","100g cheddar grated","50g bag tortilla chips","120g avocado flesh mashed","8 tbsp tomato relish"],"method":"Cook onions in oil 2-3 minutes. Add black beans and peppers, cook until beans heated through and starting to break down 6-8 minutes. Season well. Divide between four tortillas in 10cm circles. Top with cheese, 2-3 crisps, 2 tbsp tomato relish and 1/4 mashed avocado. Fold tortillas into enclosed parcels. Microwave 20 seconds."},{"id":"dbb0332","name":"Oven Baked Chilli","calories":612,"protein":48,"carbs":33,"fats":32,"category":"dinner","time":"35 mins","serves":2,"book":"Book 25","ingredients":["1 tsp olive oil","1 red onion diced","1 clove of garlic sliced","250g 5% beef mince","2 tsp smoked paprika","1 tbsp ground cumin","1/4 tsp chilli powder","30g tomato puree","400g tinned black beans drained","1 beef stock cube","40g cheddar","80g 0% strained greek yoghurt"],"method":"Preheat oven 200C. Heat oven-proof casserole over high heat with oil. Add beef mince and onion, season and break up. Add garlic, cook 20 seconds. Add spices, black beans, tomato puree and 250ml boiling water. Bring to boil, add lid and bake 20 minutes. Remove lid, return to oven 5 more minutes. Top with cheddar and yoghurt."},{"id":"dbb0333","name":"Smoked Salmon and Pea Frittata","calories":388,"protein":29,"carbs":23,"fats":20,"category":"dinner","time":"50 mins","serves":4,"book":"Book 25","ingredients":["500g new potatoes","200g smoked salmon sliced","8 medium eggs","2 tbsp dill chopped","2 tbsp olive oil","100g frozen peas"],"method":"Slice potatoes thick and boil 10 minutes, drain and cool. Beat eggs until foamy, stir in salmon, dill, peas and potatoes. Heat olive oil in large non-stick pan over low heat, add egg mixture, cook 10-15 minutes until starting to set. Invert onto plate, slide back into pan, cook 5 more minutes. Cool 5 minutes before cutting into wedges."},{"id":"dbb0334","name":"Sweet Potato Chicken and Mushroom Pie","calories":563,"protein":47,"carbs":60,"fats":15,"category":"dinner","time":"50 mins","serves":2,"book":"Book 25","ingredients":["1 tbsp olive oil","300g chicken breasts","1 chicken stock cube reconstituted in 1.5 cups water","1 tsp flour","15g wholegrain mustard","150g mushrooms sliced","1 medium onion peeled and finely chopped","450g sweet potatoes","1 tsp butter","50g light soft cheese","150g sliced spring greens"],"method":"Saute onion and mushrooms in oil 5-6 minutes. Add chicken, cook each side 2-3 minutes. Add flour then chicken stock, whisk smooth, cook covered 10-12 minutes. Shred chicken. Boil and mash sweet potatoes. Mix chicken with soft cheese and mustard. Add to dish, top with mash, bake at 200C 10-15 minutes. Serve with steamed spring greens."},{"id":"dbb0335","name":"Parmesan Chicken","calories":510,"protein":56,"carbs":40,"fats":14,"category":"dinner","time":"10 mins","serves":2,"book":"Book 25","ingredients":["1 egg white","60g Parmesan finely grated","300g chicken breasts","400g new potatoes cut into 1 inch cubes","140g frozen peas","40g baby spinach leaves","1 tbsp white wine vinegar","2 tsp olive oil"],"method":"Heat oven grill on high. Dip chicken in beaten egg white then parmesan, coat well. Grill 10-12 minutes turning once until browned and crisp. Boil potatoes 10 minutes, add peas last 2 minutes, drain. Toss potatoes and peas with spinach, vinegar and oil. Divide between two dishes."},{"id":"dbb0336","name":"Ancho Chilli Beef with Butternut Stew","calories":409,"protein":36,"carbs":28,"fats":17,"category":"dinner","time":"1 hr 20 mins","serves":4,"book":"Book 25","ingredients":["500g butternut squash cut into 2cm cubes","2 tbsp olive oil","1 large dried ancho chilli","1 large red onion finely chopped","3 cloves garlic crushed","500g lean diced steak","33g tomato puree","1 tsp ground cumin","1/2 tsp ground cinnamon","400g can chopped tomatoes","400g can kidney beans drained","1 lime juice and wedges"],"method":"Roast squash at 220C 20 minutes. Soak dried chilli in boiling water. Brown beef and onion in casserole, add tomato puree, cumin, cinnamon, chopped chilli with soaking liquid and tomatoes. Bake covered at 160C 30 minutes. Stir in kidney beans and roasted squash, bake uncovered 30 more minutes. Rest 10 minutes, stir in lime juice."},{"id":"dbb0337","name":"Baked
